<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXEL SOUL V44</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #1a0826; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: "Courier New", monospace;
            margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,0,255,0.05));
            background-size: 100% 3px, 3px 100%;
        }

        /* 陪伴师特有：全屏提示 */
        #companion-notice { 
            position: fixed; inset: 0; background: rgba(163, 51, 255, 0.3); z-index: 15000; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; backdrop-filter: blur(2px);
        }
        .companion-msg-box { 
            background: var(--purple); color: #fff; padding: 15px 30px; border: 4px solid #fff; 
            font-weight: 900; box-shadow: 0 0 30px var(--purple); animation: msg-pulse 1s infinite;
        }
        @keyframes msg-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* 玩家头像与名字：垂直分布 */
        .player-bar { height: 95px; padding: 10px; display: flex; gap: 15px; overflow-x: auto; background: rgba(0,0,0,0.7); z-index: 1001; border-bottom: 1px solid #333; }
        .p-item { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; gap: 5px; }
        .p-avatar { width: 44px; height: 44px; border: 3px solid #444; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; background: #000; transition: 0.3s; }
        .p-avatar.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .p-avatar.companion { border-color: var(--purple); box-shadow: 0 0 10px var(--purple); }
        .p-avatar.speaking::after { content: "🎙️"; position: absolute; top: -10px; right: -10px; font-size: 0.8rem; }
        .p-item .name { font-size: 0.55rem; color: #888; width: 60px; text-align: center; overflow: hidden; text-overflow: ellipsis; }

        /* 基础布局 */
        .main-deck { flex: 1; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; overflow-y: auto; align-content: start; }
        .card { aspect-ratio: 2/3; background: #4d1b7b; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; background-image: repeating-conic-gradient(#5e2a7e 0 25%, #4d1b7b 0 50%); background-size: 10px 10px; }
        .card.flipped { opacity: 0.05; pointer-events: none; }

        #focused-overlay { position: fixed; top: 120px; left: 0; right: 0; height: 350px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; pointer-events: none; }
        .focused-card { width: 85%; max-width: 280px; min-height: 280px; background: #fff; color: #1a1a2e; border-radius: 20px; border: 6px solid #1a1a2e; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; pointer-events: auto; transform: rotate(-1deg); box-shadow: 10px 10px 0px rgba(0,0,0,0.6); }

        .footer-console { height: 195px; background: #000; border-top: 3px solid var(--pink); display: flex; flex-direction: column; z-index: 10000; position: relative; }
        #c-msgs { flex: 1; overflow-y: auto; padding: 8px; font-size: 0.7rem; color: var(--blue); }
        .btn-grid { height: 75px; border-top: 2px solid var(--blue); display: flex; padding: 8px; gap: 8px; }

        .p-btn { background: #111; color: var(--blue); border: 3px solid var(--blue); border-radius: 10px; font-family: inherit; font-weight: bold; font-size: 0.7rem; box-shadow: 3px 3px 0px #000; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .p-btn:active:not(:disabled) { transform: translate(1px, 1px); box-shadow: 0px 0px 0px #000; }
        .p-btn.gold { color: var(--gold); border-color: var(--gold); }
        .p-btn.purple { color: var(--purple); border-color: var(--purple); }
        .p-btn.active { background: var(--green); color: #000; border-color: #fff; }

        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
    </style>
</head>
<body>

<div id="companion-notice">
    <div class="companion-msg-box">陪伴师有话说...</div>
</div>

<div id="setup">
    <h1 style="color:var(--pink); font-size: 2.2rem; text-shadow: 5px 5px 0 #000; margin-bottom: 20px;">PIXEL SOUL</h1>
    <div id="step-1-ui" style="width:100%; max-width:280px; display:flex; flex-direction:column; gap:10px;">
        <input type="text" id="nick-in" placeholder="NICKNAME..." style="padding:15px; border:3px solid var(--blue); background:#000; color:#fff; font-family: inherit; text-align: center; width:100%;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="p-btn pink" onclick="startApp('host')">创建房间</button>
            <button class="p-btn" onclick="showJoin('join')">加入房间</button>
        </div>
        <button class="p-btn purple" style="padding:12px;" onclick="showJoin('companion')">陪伴师入口</button>
        <button class="p-btn gold" id="rejoin-btn" style="padding:10px; display:none;" onclick="startApp('rejoin')">回到游戏</button>
    </div>
    <div id="step-2-ui" style="display:none; width:100%; max-width:280px;">
        <input type="text" id="id-in" placeholder="6位数房号..." style="padding:15px; border:3px solid var(--gold); background:#000; color:#fff; font-family: inherit; text-align: center; width:100%;">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top:15px;">
            <button class="p-btn" onclick="hideJoin()">返回</button>
            <button class="p-btn gold" onclick="startApp(pendingMode)">确认进入</button>
        </div>
    </div>
</div>

<div id="v-gate" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:38000; display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="color:var(--gold); margin-bottom: 20px;">信号已就绪</h2>
    <p style="color:#888; font-size: 0.7rem; margin-bottom: 30px;">[ 移动端点击下方进入语音网路 ]</p>
    <button class="p-btn gold" style="padding:20px 50px;" onclick="activateVoice()">进入灵魂对讲</button>
</div>

<div class="player-bar" id="p-bar"></div>
<div class="main-deck" id="deck"></div>

<div id="focused-overlay">
    <div class="focused-card" id="f-card">
        <div style="color:var(--pink); font-weight: 900; font-size: 0.6rem;">[ SOUL FILE ]</div>
        <div id="q-text" style="font-size: 0.95rem; line-height: 1.4; font-weight: bold; color: #1a1a2e;"></div>
        <div id="vote-display" style="display:flex; gap:8px; font-size:1.5rem;"></div>
        <button id="f-btn" class="p-btn gold" style="width:100%; height:45px; flex:none;" disabled onclick="confirmEnd()">等待评价</button>
    </div>
</div>

<div class="footer-console">
    <div id="c-msgs"></div>
    <div style="padding:5px; border-top:1px solid #333;"><input type="text" id="c-in" placeholder="吐槽..." style="width:100%; background:#000; border:2px solid var(--blue); color:var(--blue); padding:10px; font-family:inherit;" onkeypress="if(event.keyCode==13) sendChat()"></div>
    <div class="btn-grid" id="main-btns">
        <button id="mic-btn" class="p-btn" onclick="toggleMic()">麦克风:关</button>
        <button id="h-btn" class="p-btn green" onclick="vote('H')" disabled>👍 诚实</button>
        <button id="comp-btn" class="p-btn purple" style="display:none;" onclick="toggleCompanionSpeech()">陪伴卡</button>
        <button id="l-btn" class="p-btn pink" onclick="vote('L')" disabled>👎 撒谎</button>
        <button id="start-btn" class="p-btn gold" style="display:none;" onclick="hostStartGame()">开始审判</button>
    </div>
</div>

<div id="audio-bridge" style="display:none;"></div>

<script>
    const questions = ["找一位玩家问ta“你觉得我是一个什么样的人？”", "描述一个你最恨自己的瞬间。", "如果玩家这几个人里必须断绝一段关系，你会最先放弃谁？", "回忆一个你“这辈子也就这样了”念头的瞬间。", "你觉得你灵魂里最“贪婪”的那部分，如果放出来，它会做出什么事？", "如果你明天陷入绝境，你觉得在座谁会是那个“避难所”？", "找一位玩家问“说出一个你观察到我身上的缺点”", "在座谁的离去，会让你觉得我们这个圈子彻底失去了存在的意义？", "找一位玩家问“你曾为了维护我们的面子，吞下了哪句最想爆粗口的真心话？”", "如果生命交换24小时，你最想体验在座哪位的哪一段人生？", "如果时间重来，你最想改变的一件事是什么？", "分享你最绝望的瞬间。", "撇开工作上的联系，你觉得我们可以成为好朋友吗？", "如果你有一张1000万的彩票，必须送出去，你会给在座的谁？", "谁是你曾经最看不起、但现在由衷佩服的人？", "如果你明天就要消失，你最想坦白的一个关于自己的负面真相是什么？", "找一位玩家问“你觉得我性格里的哪部分，其实是你一直都看不惯？”", "描述一个你觉得你最“孤独”时刻。", "如果我们合伙干一件坏事，你会选谁当搭档？", "在座谁的哪句评价，曾让你在深夜里反复咀嚼？", "如果可以从某人身上“偷”走一种天赋，你最想偷谁的？", "说出一个你删除的一条信息，为什么删除？"];
    const emojis = ["🃏", "💀", "👁️", "🌙", "🧿", "🔥", "🔮"];
    const iceCfg = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.anyfirewall.com:3478' }] };

    let peer, conns = [], myNick = "", isHost = false, isCompanion = false;
    let players = [], flipped = [], turnIdx = 0, isShowing = false, curQIdx = -1;
    let votes = [], liarId = "", gameState = 'WAIT', localStream = null, isMuted = true, isCompanionSpeechActive = false;

    window.onload = () => { if(localStorage.getItem('ps_nick')) document.getElementById('rejoin-btn').style.display='block'; };

    function showJoin(m){ pendingMode=m; document.getElementById('step-1-ui').style.display='none'; document.getElementById('step-2-ui').style.display='flex'; }
    function hideJoin(){ document.getElementById('step-1-ui').style.display='flex'; document.getElementById('step-2-ui').style.display='none'; }

    function startApp(mode) {
        if(mode === 'rejoin') { myNick = localStorage.getItem('ps_nick'); document.getElementById('id-in').value = localStorage.getItem('ps_room'); isCompanion = localStorage.getItem('ps_iscomp')==='true'; }
        else { myNick = document.getElementById('nick-in').value || "ANON"; isHost = (mode==='host'); isCompanion = (mode==='companion'); }
        document.getElementById('setup').style.display = 'none'; document.getElementById('v-gate').style.display = 'flex';
        peer = new Peer({ config: iceCfg, secure: true });
        peer.on('open', id => {
            if(isHost) { players = [{id, nick: myNick, avatar: emojis[0], isCompanion, lieVotes: 0, isSpeaking: false}]; document.getElementById('start-btn').style.display = 'flex'; sync(); saveLocal(id); } 
            else { connect(document.getElementById('id-in').value.trim()); saveLocal(document.getElementById('id-in').value.trim()); }
        });
        peer.on('connection', setupConn);
        peer.on('call', call => { call.answer(localStream); handleVoiceStream(call); });
    }

    function saveLocal(r){ localStorage.setItem('ps_nick', myNick); localStorage.setItem('ps_room', r); localStorage.setItem('ps_iscomp', isCompanion); }

    // 核心语音补丁：移动端强制授权激活
    async function activateVoice() {
        document.getElementById('v-gate').style.display = 'none';
        try {
            // 物理唤醒音轨
            const wakeAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA== ");
            wakeAudio.play().catch(()=>{});

            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            localStream.getAudioTracks()[0].enabled = false;
            if(isHost) conns.forEach(c => peer.call(c.peer, localStream));
        } catch(e) { alert("麦克风权限开启失败"); }
    }

    function toggleMic() {
        if(!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks()[0].enabled = !isMuted;
        document.getElementById('mic-btn').innerText = isMuted ? "麦克风:关" : "麦克风:开";
        document.getElementById('mic-btn').className = isMuted ? "p-btn" : "p-btn active";
        let me = players.find(p => p.id === peer.id);
        if(me) { me.isSpeaking = !isMuted; }
        if(isHost) sync(); else conns.forEach(c => c.send({type:'VOICE_STATE', from:peer.id, state:!isMuted}));
    }

    function handleVoiceStream(call) {
        call.on('stream', stream => {
            let a = document.createElement('audio'); a.autoplay=true; a.setAttribute('playsinline','true'); a.srcObject=stream;
            document.getElementById('audio-bridge').appendChild(a);
            // 移动端点击强刷逻辑
            document.body.addEventListener('click',()=> a.play(),{once:true});
        });
    }

    // 陪伴卡逻辑
    function toggleCompanionSpeech() {
        if(!isCompanion) return;
        isCompanionSpeechActive = !isCompanionSpeechActive;
        const data = { type: 'COMPANION_SPEECH', active: isCompanionSpeechActive };
        if(isHost) { handleCompanionSpeech(isCompanionSpeechActive); sync(); }
        else { conns.forEach(c => c.send(data)); }
    }

    function handleCompanionSpeech(active) {
        document.getElementById('companion-notice').style.display = active ? 'flex' : 'none';
        isCompanionSpeechActive = active;
    }

    function setupConn(c) {
        c.on('open', () => { if(!conns.find(x => x.peer === c.peer)) conns.push(c); c.send({type:'JOIN', nick: myNick, isComp: isCompanion}); if(localStream) peer.call(c.peer, localStream); });
        c.on('data', data => {
            if(data.type === 'JOIN' && isHost) {
                players.push({id: c.peer, nick: data.nick, avatar: emojis[players.length % emojis.length], isCompanion: data.isComp, lieVotes: 0, isSpeaking: false});
                c.send({type: 'PEER_LIST', list: players.map(p => p.id)}); sync();
            }
            else if(data.type === 'SYNC') {
                players = data.players; flipped = data.flipped; turnIdx = data.turnIdx;
                isShowing = data.isShowing; votes = data.votes; curQIdx = data.curQIdx;
                gameState = data.gameState; handleCompanionSpeech(data.compSpeech);
                applyState();
            }
            else if(data.type === 'COMPANION_SPEECH' && isHost) { handleCompanionSpeech(data.active); sync(); }
            else if(data.type === 'VOTE' && isHost) { votes.push({from: data.from, type: data.val}); if(data.val === 'L') players[turnIdx].lieVotes++; sync(); }
            else if(data.type === 'DRAW' && isHost) { isShowing = true; curQIdx = data.index; flipped.push(data.index); sync(); }
            else if(data.type === 'FINISH' && isHost) nextTurn();
            else if(data.type === 'VOICE_STATE') { let p = players.find(x => x.id === data.from); if(p){ p.isSpeaking = data.state; renderPlayers(); } }
        });
        c.on('close', () => { if(isHost) handleDisconnect(c.peer); });
    }

    function applyState() {
        const overlay = document.getElementById('focused-overlay');
        if(isShowing && curQIdx !== -1) { overlay.style.display = 'flex'; document.getElementById('q-text').innerText = questions[curQIdx]; } else { overlay.style.display = 'none'; }
        
        if(isCompanion) document.getElementById('comp-btn').style.display = 'flex';
        renderPlayers(); renderDeck(); updateTurnStatus(); updateVoteDisplay();
    }

    function sync() { if(isHost) broadcast({type:'SYNC', players, flipped, turnIdx, isShowing, votes, curQIdx, gameState, compSpeech: isCompanionSpeechActive}); applyState(); }
    function broadcast(d) { conns.forEach(c => { if(c.open) c.send(d); }); }
    function nextTurn() { 
        if(!isHost) return; 
        do { turnIdx = (turnIdx + 1) % players.length; } while (players[turnIdx].isCompanion); 
        isShowing = false; votes = []; sync(); 
    }
    function draw(i) { if(players[turnIdx]?.id !== peer.id || isShowing || isCompanion) return; if(isHost) { isShowing = true; curQIdx = i; flipped.push(i); sync(); } else { conns.forEach(c => c.send({type:'DRAW', index: i})); } }
    function renderPlayers() { document.getElementById('p-bar').innerHTML = players.map((p, i) => `<div class="p-item"><div class="p-avatar ${i===turnIdx?'active':''} ${p.isSpeaking?'speaking':''} ${p.isCompanion?'companion':''}"><div class="emoji">${p.avatar}</div></div><div class="name">${p.isCompanion?'[陪]':''}${p.nick}</div></div>`).join(''); }
    function updateTurnStatus() { let isM = (players[turnIdx]?.id === peer.id); document.getElementById('h-btn').disabled = isM || !isShowing || isCompanion || votes.find(v=>v.from===peer.id); document.getElementById('l-btn').disabled = isM || !isShowing || isCompanion || votes.find(v=>v.from===peer.id); }
    function renderDeck() { let d = document.getElementById('deck'); d.innerHTML = ""; for(let i=0; i<questions.length; i++) { d.innerHTML += `<div class="card ${flipped.includes(i)?'flipped':''}" onclick="draw(${i})"></div>`; } }
    function confirmEnd() { if(isHost) nextTurn(); else conns.forEach(c => c.send({type:'FINISH'})); }
    function vote(val) { if(isHost) { votes.push({from: peer.id, type: val}); if(val==='L') players[turnIdx].lieVotes++; sync(); } else { conns.forEach(c => c.send({type:'VOTE', from: peer.id, val})); } }
    function updateVoteDisplay() {
        const box = document.getElementById('vote-display'); box.innerHTML = "";
        votes.forEach(v => { box.innerHTML += `<span style="color:${v.type==='H'?'var(--green)':'var(--pink)'}">${v.type==='H'?'👍':'👎'}</span>`; });
        const b = document.getElementById('f-btn');
        if(players[turnIdx]?.id === peer.id) {
            const others = players.filter(p => !p.isCompanion && p.id !== peer.id);
            b.disabled = votes.length < others.length;
            b.innerText = b.disabled ? `等待投票(${votes.length}/${others.length})` : "确认结束";
        }
    }
    function connect(rid) { let c = peer.connect(rid, { reliable: true }); setupConn(c); }
</script>
</body>
</html>
