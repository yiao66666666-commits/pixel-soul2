<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - BALATRO</title>
    <style>
        /* Balatro 邪典配色 */
        :root { --bg: #050505; --neon-red: #ff3c3c; --gold: #efb82d; --blue: #3c9dff; --card: #1a1a1a; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background: var(--bg); color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* 顶部房间与玩家：Balatro 筹码风格 */
        .room-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        .players { display: flex; gap: 15px; }
        .avatar { width: 45px; height: 45px; border: 2px solid #444; border-radius: 4px; position: relative; display: flex; align-items: center; justify-content: center; background: #111; }
        .avatar.active { border-color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
        .avatar.active::after { content: 'SPEAKING'; position: absolute; bottom: -12px; font-size: 8px; color: var(--neon-red); }

        /* 核心卡牌区：带点 Glitch 效果 */
        .table { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background-image: radial-gradient(circle, #1a0a0a 0%, #050505 100%); }
        .balatro-card {
            width: 240px; height: 340px; background: #fff; color: #000; border-radius: 12px;
            padding: 20px; position: relative; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 60, 60, 0.2); transition: 0.3s;
            background-image: repeating-linear-gradient(45deg, #f0f0f0, #f0f0f0 10px, #ffffff 10px, #ffffff 20px);
            border: 8px solid #000;
        }
        .card-inner { border: 2px solid #000; flex: 1; display: flex; align-items: center; padding: 15px; text-align: center; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }

        /* 聊天与弹幕区 */
        .chat-layer { position: absolute; bottom: 120px; left: 15px; right: 15px; height: 150px; pointer-events: none; mask-image: linear-gradient(to top, black 80%, transparent); }
        .msg { font-size: 0.8rem; color: var(--gold); margin-bottom: 5px; animation: slideUp 0.3s forwards; }

        /* 底部操作区：霓虹控制台 */
        .controls { height: 100px; background: #111; display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); border-top: 4px solid #222; }
        .game-btn { padding: 10px 20px; border: 2px solid var(--blue); color: var(--blue); background: transparent; font-weight: bold; cursor: pointer; }
        .game-btn.draw { background: var(--blue); color: #000; box-shadow: 4px 4px 0 var(--gold); }
        .game-btn.mic { border-color: var(--neon-red); color: var(--neon-red); }
        .game-btn.mic.active { background: var(--neon-red); color: #000; animation: blink 0.5s infinite; }

        /* 点赞支持小动画 */
        .reaction-area { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 10px; }
        .react-icon { font-size: 1.5rem; filter: drop-shadow(0 0 5px var(--gold)); cursor: pointer; }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="room-header">
    <div style="color: var(--gold); font-weight: bold;">ROOM: NO.047</div>
    <div class="players">
        <div class="avatar active">P1</div>
        <div class="avatar">P2</div>
        <div class="avatar">P3</div>
    </div>
</div>

<div class="table">
    <div class="balatro-card" id="card">
        <div class="card-inner" id="qText">
            WAITING FOR DEALER...
        </div>
    </div>

    <div class="chat-layer" id="chat">
        <div class="msg">[系统] 陌生人 A 进入了房间</div>
        <div class="msg">[系统] 牌局准备就绪</div>
    </div>

    <div class="reaction-area">
        <div class="react-icon" onclick="sendMsg('❤️')">❤️</div>
        <div class="react-icon" onclick="sendMsg('🔥')">🔥</div>
        <div class="react-icon" onclick="sendMsg('☕')">☕</div>
    </div>
</div>

<div class="controls">
    <button class="game-btn draw" onclick="nextTurn()">DRAW / 抽牌</button>
    <button class="game-btn mic" id="mic" onmousedown="toggleMic(true)" onmouseup="toggleMic(false)">VOICE / 语音</button>
    <input type="text" placeholder="CHAT..." id="input" style="background:#000; border:1px solid #444; color:var(--gold); padding:8px; width:100px;" onkeyup="if(event.keyCode==13) sendMsg(this.value)">
</div>

<script>
    const questions = ["你上一次哭，是因为什么？", "你觉得这辈子最对不起的人是谁？", "如果你有一件隐身衣你想利用它去做什么？", "如果明天公司突然倒闭了，你长舒一口气还是恐慌？"]; // 缩略34题
    let turn = 0;

    function nextTurn() {
        const card = document.getElementById('card');
        card.style.transform = "rotateY(90deg) scale(1.1)";
        setTimeout(() => {
            document.getElementById('qText').innerText = questions[Math.floor(Math.random()*questions.length)];
            card.style.transform = "rotateY(0deg) scale(1)";
            sendMsg(`[系统] 轮到玩家 P${(turn%3)+1} 抽牌并回答`);
            turn++;
        }, 300);
    }

    function sendMsg(txt) {
        if(!txt) return;
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.innerText = `P1: ${txt}`;
        document.getElementById('chat').appendChild(msg);
        document.getElementById('input').value = '';
    }

    function toggleMic(on) {
        const mic = document.getElementById('mic');
        on ? mic.classList.add('active') : mic.classList.remove('active');
    }
</script>
</body>
</html>
