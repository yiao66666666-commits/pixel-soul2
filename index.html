<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - V46.3 语音修复版</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 首页底图 --- */
        #login-screen { position: fixed; inset: 0; z-index: 50000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .plasma-bg { position: absolute; inset: 0; z-index: -1; opacity: 0.4; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 语音/同步解锁遮罩 (关键修复) --- */
        #sync-overlay { position: fixed; inset: 0; z-index: 60000; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

        /* --- 顶部状态栏 --- */
        #status-bar { height: 36px; background: var(--pink); color: #000; display: flex; align-items: center; padding: 0 15px; font-weight: 900; font-size: 0.75rem; gap: 8px; z-index: 10000; }
        .room-tag { background: #000; color: var(--gold); padding: 2px 8px; border-radius: 4px; }

        /* --- 玩家头像栏 --- */
        .player-bar { height: 95px; padding: 10px; display: flex; gap: 12px; background: rgba(0,0,0,0.9); border-bottom: 2px solid #222; overflow-x: auto; flex-shrink: 0; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; position: relative; }
        .p-avatar { width: 44px; height: 44px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.2rem; }
        .p-item.active .p-avatar { border-color: var(--gold); box-shadow: 0 0 12px var(--gold); }
        .is-companion { border-color: var(--purple) !important; box-shadow: 0 0 12px var(--purple) !important; }
        .voice-wave { position: absolute; top: -5px; right: -5px; font-size: 0.8rem; display: none; }

        /* --- 档案卡与舞台 --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; width: auto; height: 68vh; aspect-ratio: 9 / 16; 
            background: #fff; color: #111; border: 5px solid #000; border-radius: 12px; 
            padding: 25px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.6);
            transform: translateY(100%) rotateX(-180deg);
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s; opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-5%) rotateX(0deg); opacity: 1; }

        /* --- 操作控制 --- */
        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.75rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 10px; align-items: center; }
        .ctrl-btn { flex: 1; height: 55px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
        .mic-btn { border-radius: 50%; width: 70px; height: 70px; flex: none; font-size: 1.8rem; color: #fff; border: 3px solid var(--blue); background: #111; }
        .mic-btn.active { background: var(--pink); border-color: #fff; box-shadow: 0 0 15px var(--pink); }

        .run-btn { width: 100%; padding: 18px; background: var(--pink); border: 3px solid #fff; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="plasma-bg"></div>
    <div style="font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px;">SPEAK</div>
    <div style="width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="nick-in" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center;" placeholder="输入代号">
        <input type="text" id="room-in" maxlength="6" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center;" placeholder="6位房号">
        <button class="run-btn" onclick="start('player')">加入房间</button>
        <button class="run-btn" style="background:var(--purple);" onclick="start('companion')">陪伴师入口</button>
    </div>
    <div style="position:absolute; bottom:30px; left:20px; display:flex; flex-direction:column; gap:8px;">
        <button onclick="restore('nick')" style="font-size:0.6rem; color:#666; text-decoration:underline; background:none;">使用旧代号</button>
        <button onclick="restore('room')" style="font-size:0.6rem; color:#666; text-decoration:underline; background:none;">回到上个房间</button>
    </div>
</div>

<div id="sync-overlay">
    <button class="run-btn" style="width:240px; background:var(--gold); color:#000;" onclick="unlockAudio()">点击同步灵魂频段</button>
    <p style="margin-top:20px; font-size:0.7rem; color:#888;">(此动作将接通语音通道)</p>
</div>

<div id="status-bar" style="display:none;">
    <span>当前频段:</span>
    <span id="room-id-val" class="room-tag">------</span>
</div>

<div class="player-bar" id="p-bar"></div>

<div class="stage">
    <div id="card-podium"></div>
    <div id="focus-board">
        <div style="font-size:0.6rem; color:#999;">[ SENSITIVE FILE ]</div>
        <div id="q-text" style="font-size:1.15rem; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center;">内容加载中...</div>
        <button class="ctrl-btn" style="width:100%; height:44px; border-color:var(--gold); color:var(--gold);" onclick="closeCard()">我已回答完毕</button>
    </div>
    <div id="deck" style="display:flex; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="btn-panel">
        <button class="ctrl-btn" onclick="talk('👍')">点赞</button>
        <button class="ctrl-btn" style="border-color:#444;" onclick="talk('❌')">异议</button>
        <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);">转移</button>
    </div>
</div>

<div id="audio-bridge" style="display:none;"></div>

<script>
    const qs = ["你最对不起的人是谁？", "如果你明天突然消失...", "你此时此刻最焦虑什么？"];
    let peer, localStream, myNick, myRoom, isComp = false, players = [], conns = [];

    function restore(t) { 
        if(t==='nick') document.getElementById('nick-in').value = localStorage.getItem('sn') || "";
        if(t==='room') document.getElementById('room-in').value = localStorage.getItem('sr') || "";
    }

    async function start(mode) {
        myNick = document.getElementById('nick-in').value || "ANON";
        myRoom = document.getElementById('room-in').value;
        if(!myRoom) return alert("房号必填");
        
        isComp = (mode === 'companion');
        localStorage.setItem('sn', myNick); localStorage.setItem('sr', myRoom);
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('sync-overlay').style.display = 'flex';
    }

    async function unlockAudio() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getAudioTracks()[0].enabled = false; // 初始静音
        } catch(e) { console.log("麦克风受限"); }
        
        document.getElementById('sync-overlay').style.display = 'none';
        initPeer();
    }

    function initPeer() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        
        peer.on('open', (id) => {
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('room-id-val').innerText = myRoom;
            if(isComp) {
                players = [{nick: myNick, isComp: true}]; renderP();
            } else {
                const c = peer.connect(`SPEAK-${myRoom}`);
                setupConn(c);
                // 核心：主动呼叫房主建立音频流
                peer.call(`SPEAK-${myRoom}`, localStream);
            }
        });

        peer.on('connection', (c) => { conns.push(c); setupConn(c); });
        
        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (remoteStream) => {
                const audio = document.createElement('audio');
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.getElementById('audio-bridge').appendChild(audio);
            });
        });
    }

    function setupConn(conn) {
        conn.on('open', () => conn.send({type: 'JOIN', nick: myNick}));
        conn.on('data', (data) => {
            if(data.type === 'JOIN' && isComp) {
                players.push({nick: data.nick, isComp: false});
                conns.forEach(c => c.send({type: 'SYNC', list: players}));
                renderP();
            }
            if(data.type === 'SYNC') { players = data.list; renderP(); }
            if(data.type === 'CHAT') appendChat(data.nick, data.msg);
        });
    }

    function toggleMic() {
        if(!localStream) return;
        const active = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
        document.getElementById('mic-btn').classList.toggle('active', active);
    }

    function renderP() {
        document.getElementById('p-bar').innerHTML = players.map(p => `
            <div class="p-item">
                <div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div>
                <div style="font-size:0.5rem; margin-top:4px;">${p.nick}</div>
            </div>
        `).join('');
    }

    function talk(m) {
        appendChat(myNick, m);
        conns.forEach(c => c.send({type: 'CHAT', nick: myNick, msg: m}));
    }

    function appendChat(n, m) {
        const b = document.getElementById('chat-flow');
        b.innerHTML += `<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    // 初始化卡池
    let h = "";
    for(let i=0; i<40; i++) h += `<div onclick="draw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:6px;"></div>`;
    document.getElementById('deck').innerHTML = h;

    function draw(i) {
        if(isComp) return;
        const b = document.getElementById('focus-board');
        document.getElementById('q-text').innerText = qs[i % qs.length];
        document.getElementById('card-podium').style.display = 'block';
        b.style.display = 'flex';
        setTimeout(() => b.classList.add('show'), 50);
    }

    function closeCard() {
        const b = document.getElementById('focus-board');
        b.classList.remove('show');
        setTimeout(() => { b.style.display = 'none'; document.getElementById('card-podium').style.display = 'none'; }, 800);
    }
</script>
</body>
</html>
