<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - 沉浸引导版</title>
    <style>
        :root { --bg: #0a0510; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; --dark: #000; }
        * { image-rendering: pixelated; box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* 顶部向导栏 - 解决不知道干啥的问题 */
        #guide-bar { height: 40px; background: var(--pink); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; letter-spacing: 1px; z-index: 2000; }

        /* 玩家栏：发言态高亮 */
        .player-bar { height: 90px; padding: 10px; display: flex; gap: 15px; background: var(--dark); border-bottom: 2px solid #222; }
        .p-item { display: flex; flex-direction: column; align-items: center; width: 60px; transition: 0.3s; }
        .p-avatar { width: 46px; height: 46px; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #111; position: relative; }
        .p-item.is-speaking { transform: scale(1.15); }
        .p-item.is-speaking .p-avatar { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .p-item.is-speaking::after { content: "SPEAKING"; font-size: 0.5rem; color: var(--gold); margin-top: 2px; }
        .name { font-size: 0.55rem; color: #888; margin-top: 4px; }

        /* 卡牌区 */
        .main-deck { flex: 1; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; overflow-y: auto; }
        .card { aspect-ratio: 2/3; background: #2a104a; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
        .card.flipped { opacity: 0.05; pointer-events: none; }

        /* 聚焦展示卡 */
        #focused-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        .focused-card { width: 85%; max-width: 320px; background: #f0f0f0; color: #111; border-radius: 12px; border: 5px solid #000; padding: 20px; text-align: center; }
        #q-text { font-size: 1.1rem; font-weight: bold; margin: 25px 0; line-height: 1.5; }

        /* 底部控制台：露出聊天 */
        .footer-console { height: 200px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #c-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: var(--blue); background: rgba(0,0,0,0.3); }
        .btn-grid { height: 70px; display: flex; padding: 8px; gap: 8px; }
        .p-btn { flex: 1; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-family: inherit; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .p-btn:disabled { opacity: 0.2; }
        .p-btn.gold { border-color: var(--gold); color: var(--gold); }
        .p-btn.pink { border-color: var(--pink); color: var(--pink); }
        
        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="guide-bar">>>> 载入中...</div>

<div id="setup">
    <button class="p-btn gold" style="max-width:200px; height:50px;" onclick="startDemo()">开启 AI 仿真测试</button>
</div>

<div class="player-bar" id="p-bar"></div>

<div class="main-deck" id="deck"></div>

<div id="focused-overlay">
    <div class="focused-card">
        <div style="color:var(--pink); font-size: 0.6rem; font-weight: 900;">[ SPEAKING NOW ]</div>
        <div id="q-text">问题加载中...</div>
        <div id="vote-area" style="font-size: 1.2rem; margin-bottom: 15px;"></div>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button id="transfer-btn" class="p-btn pink" onclick="transferCard()">转移卡</button>
            <button id="close-btn" class="p-btn gold" onclick="nextTurn()">完成发言</button>
        </div>
    </div>
</div>

<div class="footer-console">
    <div id="c-msgs"></div>
    <div class="btn-grid">
        <button id="like-btn" class="p-btn" onclick="vote('👍')">点赞</button>
        <button id="disagree-btn" class="p-btn" style="border-color:#555; color:#555;" onclick="vote('❌')">不同意</button>
    </div>
</div>

<script>
    const questions = [
        "你上一次哭，是因为什么？", "你觉得这辈子最对不起的人是谁？", "童年里哪一件小事负面影响你到现在？", 
        "此时此刻最大的焦虑源头是什么？", "如果生命只剩24小时，你会去见谁？", "谁曾对你特别好但后来断了联系？",
        "你最想收到谁的一句“对不起”？", "摘下面具你有多累？(1-10分)", "对最亲近的人撒的谎是什么？",
        "哪个瞬间觉得这份工作把你榨干了？", "谁的微信消息会让你生理性不适？", "哪一天打死不想经历第二次？",
        "如果明天公司倒闭，你是恐慌还是解脱？", "工资减半换准时下班，你换吗？", "清空某人的记忆按钮，你会按吗？"
    ];
    const bots = ["阿强", "小美", "老王", "Emma", "大刘"];
    let players = [], turnIdx = 0, flipped = [], votes = [];

    function startDemo() {
        document.getElementById('setup').style.display = 'none';
        players = [{nick: '我', isBot: false, avatar: '🃏'}];
        bots.forEach(n => players.push({nick: n, isBot: true, avatar: '🤖'}));
        renderPlayers();
        renderDeck();
        setGuide("请点击卡片，抽取你的命运问题");
        checkTurn();
    }

    function setGuide(txt) { document.getElementById('guide-bar').innerText = `>>> ${txt}`; }

    function renderPlayers() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item ${i===turnIdx?'is-speaking':''}">
                <div class="p-avatar">${p.avatar}</div>
                <div class="name">${p.nick}</div>
            </div>
        `).join('');
    }

    function renderDeck() {
        let d = document.getElementById('deck'); d.innerHTML = "";
        for(let i=0; i<40; i++) d.innerHTML += `<div class="card ${flipped.includes(i)?'flipped':''}" onclick="userDraw(${i})"></div>`;
    }

    function userDraw(i) {
        if(players[turnIdx].isBot || flipped.includes(i)) return;
        draw(i);
    }

    function draw(i) {
        flipped.push(i);
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('q-text').innerText = q;
        document.getElementById('focused-overlay').style.display = 'flex';
        renderDeck();
        setGuide(`${players[turnIdx].nick} 正在发言，其他人请倾听并评价`);
        
        // 发言者不能点赞
        const isMeSpeaking = !players[turnIdx].isBot;
        document.getElementById('like-btn').disabled = isMeSpeaking;
        document.getElementById('disagree-btn').disabled = isMeSpeaking;
        document.getElementById('transfer-btn').style.display = isMeSpeaking ? 'block' : 'none';

        if(players[turnIdx].isBot) {
            setTimeout(() => appendChat(players[turnIdx].nick, "关于这个，我想说的是..."), 1000);
            autoBotVotes();
        }
    }

    function transferCard() {
        let next;
        do { next = Math.floor(Math.random()*players.length); } while(next === turnIdx);
        appendChat("系统", `${players[turnIdx].nick} 使用了转移卡，问题移交给 ${players[next].nick}`);
        turnIdx = next;
        renderPlayers();
        draw(flipped[flipped.length-1]);
    }

    function vote(type) {
        votes.push(type);
        document.getElementById('vote-area').innerHTML += type;
        appendChat("我", `发送了 ${type === '👍' ? '点赞' : '不同意'}`);
    }

    function autoBotVotes() {
        votes = []; document.getElementById('vote-area').innerHTML = "";
        players.forEach((p, i) => {
            if(i !== turnIdx && p.isBot) {
                setTimeout(() => {
                    const v = Math.random() > 0.2 ? '👍' : '❌';
                    votes.push(v);
                    document.getElementById('vote-area').innerHTML += v;
                }, 1000 + Math.random()*2000);
            }
        });
    }

    function nextTurn() {
        document.getElementById('focused-overlay').style.display = 'none';
        turnIdx = (turnIdx + 1) % players.length;
        renderPlayers();
        checkTurn();
    }

    function checkTurn() {
        if(players[turnIdx].isBot) {
            setGuide(`正在等待 ${players[turnIdx].nick} 抽牌...`);
            setTimeout(() => {
                let idx; do { idx = Math.floor(Math.random()*40); } while(flipped.includes(idx));
                draw(idx);
            }, 2000);
        } else {
            setGuide("轮到你了，请在卡池中抽取一张牌");
        }
    }

    function appendChat(n, m) {
        let b = document.getElementById('c-msgs');
        b.innerHTML += `<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
