<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V46.5 - 逻辑闭环版</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        .plasma-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 弹窗与遮罩 --- */
        .overlay { position: fixed; inset: 0; z-index: 70000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .modal { width: 85%; max-width: 320px; background: #eee; color: #111; border: 4px solid #000; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 10px 10px 0 var(--pink); }

        /* --- 玩家分布布局 --- */
        .header-bar { height: 110px; display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #222; }
        #player-area { display: flex; gap: 10px; overflow-x: auto; flex: 1; }
        #companion-area { width: 70px; display: flex; flex-direction: column; align-items: center; border-left: 1px solid #333; padding-left: 10px; }

        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 55px; opacity: 0.5; transition: 0.3s; }
        .p-item.online { opacity: 1; }
        .p-avatar { width: 42px; height: 42px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.2rem; position: relative; }
        .p-item.active .p-avatar { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.1); }
        .p-avatar.is-companion { border-color: var(--purple); box-shadow: 0 0 10px var(--purple); }
        .p-batt-val { font-size: 0.55rem; color: var(--green); font-weight: bold; height: 12px; margin-bottom: 2px; }

        /* --- 档案卡舞台 --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; height: 65vh; aspect-ratio: 9 / 16; background: #fff; color: #111; border: 5px solid #000; border-radius: 12px;
            padding: 25px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.6);
            transform: translateY(100%) rotateX(-180deg); transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s; opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-5%) rotateX(0deg); opacity: 1; }

        /* --- 底部控制 --- */
        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 50px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .ctrl-btn:disabled { opacity: 0.2; }
        .mic-btn { border-radius: 50%; width: 66px; height: 66px; flex: none; font-size: 1.5rem; color: #fff; border: 3px solid var(--blue); background: #111; }
        .mic-btn.active { background: var(--pink); border-color: #fff; box-shadow: 0 0 15px var(--pink); }

        #host-start-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 10000; display: none; padding: 15px 30px; background: var(--gold); color: #000; font-weight: 900; border-radius: 50px; border: 4px solid #fff; }
    </style>
</head>
<body>

<div class="plasma-bg"></div>

<div id="login-screen" style="position:fixed; inset:0; z-index:80000; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div style="font-size:3.5rem; font-weight:900; color:#fff; text-shadow:4px 4px 0 var(--pink); margin-bottom:40px;">SPEAK</div>
    <div style="width:85%; max-width:300px; display:flex; flex-direction:column; gap:15px;">
        <input type="text" id="nick-in" style="padding:15px; background:#111; border:2px solid #333; color:var(--gold); text-align:center;" placeholder="代号">
        <input type="text" id="room-in" style="padding:15px; background:#111; border:2px solid #333; color:var(--gold); text-align:center;" placeholder="6位房号">
        <button onclick="preStart('join')" style="padding:18px; background:var(--pink); color:#fff; font-weight:900; border:3px solid #fff;">加入房间</button>
        <button onclick="preStart('companion')" style="padding:18px; background:var(--purple); color:#fff; font-weight:900; border:3px solid #fff; margin-top:10px;">陪伴师入口</button>
    </div>
</div>

<div id="sync-overlay" class="overlay">
    <button onclick="unlockAudio()" style="padding:20px 40px; background:var(--gold); font-weight:900; border:4px solid #fff; border-radius:50px;">同步灵魂频段</button>
</div>

<div id="waiting-overlay" class="overlay">
    <div class="modal" style="background:#000; color:var(--gold);">
        <h2 id="wait-msg">等待其他玩家标注电量...</h2>
        <div class="battery-container" style="margin-top:20px;"><div class="battery-level" style="height:100%; opacity:0.3;"></div></div>
    </div>
</div>

<div id="rule-overlay" class="overlay">
    <div class="modal">
        <h3>- 游戏规则 -</h3>
        <p style="font-size:0.8rem; margin:15px 0;">陪伴师引导，玩家轮流开启档案。</p>
        <button onclick="showBattery()" style="width:100%; padding:15px; background:var(--pink); color:#fff;">确认并继续</button>
    </div>
</div>

<div id="battery-overlay" class="overlay">
    <div class="modal" style="background:#000; color:#fff; border-color:var(--green);">
        <p>当前电量？</p>
        <div id="batt-text" style="font-size:2rem; color:var(--green); font-weight:900;">50%</div>
        <div class="battery-container">
            <div id="batt-fill" class="battery-level" style="height:50%;"></div>
        </div>
        <input type="range" min="1" max="100" value="50" oninput="updateBatt(this.value)" style="width:100%; accent-color:var(--green);">
        <button onclick="confirmBatt()" style="width:100%; padding:15px; background:var(--green); color:#000; margin-top:15px;">确认电量</button>
    </div>
</div>

<div id="wheel-overlay" class="overlay">
    <div class="modal" style="background:transparent; border:none; box-shadow:none;">
        <div class="wheel"></div>
        <h2 style="margin-top:40px; color:#fff;">命运正在选择首位发言者...</h2>
    </div>
</div>

<button id="host-start-btn" onclick="hostAction('START_FLOW')">[ 开启灵魂审判 ]</button>

<div class="header-bar">
    <div id="player-area"></div>
    <div id="companion-area"></div>
</div>

<div class="stage">
    <div id="card-podium"></div>
    <div id="focus-board">
        <div style="font-size:0.5rem; color:#999;">[ SENSITIVE FILE ]</div>
        <div id="q-text" style="font-size:1.1rem; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center;"></div>
        <button class="ctrl-btn" style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="userAction('CLOSE')">完成回答</button>
    </div>
    <div id="deck" style="display:none; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="btn-panel">
        <button id="like-btn" class="ctrl-btn" disabled onclick="react('👍')">点赞</button>
        <button id="no-btn" class="ctrl-btn" style="border-color:#444;" disabled onclick="react('❌')">异议</button>
        <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
        <button id="trans-btn" class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);" disabled>转移</button>
    </div>
</div>

<div id="audio-bridge" style="display:none;"></div>

<script>
    const qs = ["你最对不起的人是谁？", "如果你有一件隐身衣...", "你此时最焦虑什么？", "如果明天突然消失..."];
    let peer, localStream, myNick, myRoom, isComp=false, players=[], conns=[], currentSpeaker=null;

    function preStart(mode) {
        myNick = document.getElementById('nick-in').value;
        myRoom = document.getElementById('room-in').value;
        if(!myNick || !myRoom) return alert("代号房号必填");
        isComp = (mode === 'companion');
        document.getElementById('login-screen').style.display='none';
        document.getElementById('sync-overlay').style.display='flex';
    }

    async function unlockAudio() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); localStream.getAudioTracks()[0].enabled = false; } catch(e) {}
        document.getElementById('sync-overlay').style.display='none';
        initPeer();
    }

    function initPeer() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        peer.on('open', () => {
            if(isComp) {
                players = [{nick:myNick, isComp:true, batt:'-'}]; 
                renderPlayers();
                document.getElementById('host-start-btn').style.display='block';
            } else {
                const c = peer.connect(`SPEAK-${myRoom}`);
                setupConn(c);
                peer.call(`SPEAK-${myRoom}`, localStream);
            }
        });
        peer.on('connection', (c) => { conns.push(c); setupConn(c); });
        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (s) => { 
                const a=document.createElement('audio'); a.srcObject=s; a.autoplay=true; 
                document.getElementById('audio-bridge').appendChild(a); 
            });
        });
    }

    function setupConn(c) {
        c.on('open', () => c.send({type:'JOIN', nick:myNick}));
        c.on('data', (d) => {
            if(d.type==='JOIN' && isComp) {
                players.push({nick:d.nick, isComp:false, batt:''});
                broadcast({type:'SYNC', list:players});
            }
            if(d.type==='SYNC') { players=d.list; renderPlayers(); }
            if(d.type==='START_FLOW') document.getElementById('rule-overlay').style.display='flex';
            if(d.type==='BATT_READY') { 
                players.find(p=>p.nick===d.nick).batt=d.val; 
                renderPlayers();
                if(isComp && players.filter(p=>!p.isComp && p.batt==='').length === 0) broadcast({type:'ALL_READY'});
            }
            if(d.type==='ALL_READY') {
                document.getElementById('waiting-overlay').style.display='none';
                document.getElementById('wheel-overlay').style.display='flex';
                setTimeout(() => { 
                    document.getElementById('wheel-overlay').style.display='none';
                    document.getElementById('deck').style.display='flex';
                    if(isComp) currentSpeaker = players.find(p=>!p.isComp).nick;
                    updateSpeakerUI();
                }, 3000);
            }
            if(d.type==='DRAW') { showCard(d.idx); currentSpeaker = d.nick; updateSpeakerUI(); }
            if(d.type==='CLOSE') { hideCard(); }
        });
    }

    function broadcast(d) { conns.forEach(c=>c.send(d)); if(peer && !isComp) peer.connect(`SPEAK-${myRoom}`).send(d); }

    function updateBatt(v) { document.getElementById('batt-text').innerText=v+'%'; document.getElementById('batt-fill').style.height=v+'%'; }
    
    function showBattery() { document.getElementById('rule-overlay').style.display='none'; document.getElementById('battery-overlay').style.display='flex'; }
    
    function confirmBatt() {
        document.getElementById('battery-overlay').style.display='none';
        if(!isComp) {
            document.getElementById('waiting-overlay').style.display='flex';
            broadcast({type:'BATT_READY', nick:myNick, val:document.getElementById('batt-text').innerText});
        }
    }

    function hostAction(type) { if(isComp) broadcast({type}); if(type==='START_FLOW') document.getElementById('rule-overlay').style.display='flex'; document.getElementById('host-start-btn').style.display='none'; }

    function renderPlayers() {
        const pArea = document.getElementById('player-area');
        const cArea = document.getElementById('companion-area');
        pArea.innerHTML = ""; cArea.innerHTML = "";
        players.forEach(p => {
            const html = `<div class="p-item online ${p.nick===currentSpeaker?'active':''}">
                <div class="p-batt-val">${p.batt}</div>
                <div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div>
                <div style="font-size:0.5rem; margin-top:4px;">${p.nick}</div>
            </div>`;
            if(p.isComp) cArea.innerHTML = html; else pArea.innerHTML += html;
        });
    }

    function draw(idx) {
        if(isComp || (currentSpeaker && currentSpeaker !== myNick)) return;
        broadcast({type:'DRAW', idx, nick:myNick});
        showCard(idx);
    }

    function showCard(idx) {
        document.getElementById('q-text').innerText = qs[idx % qs.length];
        document.getElementById('card-podium').style.display='block';
        const b = document.getElementById('focus-board');
        b.style.display='flex'; setTimeout(()=>b.classList.add('show'), 50);
    }

    function userAction(type) { if(type==='CLOSE') { hideCard(); broadcast({type:'CLOSE'}); } }
    
    function hideCard() { 
        const b=document.getElementById('focus-board'); b.classList.remove('show'); 
        setTimeout(()=>{b.style.display='none'; document.getElementById('card-podium').style.display='none';}, 800); 
    }

    function updateSpeakerUI() {
        const isMe = (myNick === currentSpeaker);
        document.getElementById('like-btn').disabled = isMe;
        document.getElementById('no-btn').disabled = isMe;
        document.getElementById('trans-btn').disabled = !isMe;
        renderPlayers();
    }

    function toggleMic() { if(!localStream) return; const a = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('active', a); }

    // 初始化40张牌
    let h=""; for(let i=0; i<40; i++) h+=`<div onclick="draw(${i})" class="poker-card"></div>`;
    document.getElementById('deck').innerHTML = h;
</script>
</body>
</html>
