<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - 实战内测</title>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --purple: #a333ff; --dark: #000; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 登录页：Balatro 迷幻质感 --- */
        #login-screen { position: fixed; inset: 0; z-index: 50000; background: radial-gradient(circle at center, #1a0826 0%, #050505 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .plasma-bg { position: absolute; inset: 0; z-index: -1; opacity: 0.3; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        .title { font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink), -2px -2px 0 var(--blue); margin-bottom: 40px; letter-spacing: -3px; }
        .setup-box { width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .balatro-input { width: 100%; padding: 14px; background: #000; border: 2px solid #333; color: var(--gold); text-align: center; font-family: inherit; font-size: 1.1rem; outline: none; }
        .run-btn { width: 100%; padding: 16px; background: var(--pink); border: 3px solid #fff; color: #fff; font-size: 1.3rem; font-weight: 900; box-shadow: 6px 6px 0 #000; cursor: pointer; }
        
        .bottom-links { position: absolute; bottom: 30px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .link-btn { font-size: 0.65rem; color: #666; text-decoration: underline; cursor: pointer; background: none; border: none; font-family: inherit; }
        .companion-link { color: var(--purple); font-weight: bold; border: 1px solid var(--purple); padding: 5px 12px; }

        /* --- 主界面布局 --- */
        #status-bar { height: 36px; background: var(--pink); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.75rem; gap: 8px; }
        .copy-btn { background: #000; color: var(--gold); padding: 1px 6px; font-size: 0.6rem; border: 1px solid var(--gold); cursor: pointer; }

        .player-bar { height: 85px; padding: 10px; display: flex; gap: 12px; background: var(--dark); border-bottom: 2px solid #222; overflow-x: auto; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 55px; opacity: 0.4; transition: 0.3s; }
        .p-item.active { opacity: 1; transform: scale(1.1); }
        .p-avatar { width: 44px; height: 44px; border: 2px solid #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.2rem; }
        .active .p-avatar { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .p-avatar.companion { border-color: var(--purple); box-shadow: 0 0 10px var(--purple); }

        /* 卡牌：16:9 黄金比例 */
        .stage { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; justify-content: center; }
        .deck-scroll { display: flex; gap: 16px; padding: 20px 30px; overflow-x: scroll; scroll-snap-type: x mandatory; }
        .deck-scroll::-webkit-scrollbar { display: none; }
        .poker-card { 
            flex: 0 0 105px; height: 186px; 
            background: #2a104a; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); 
            scroll-snap-align: center; background-image: repeating-linear-gradient(45deg, #3d1563, #3d1563 10px, #2a104a 10px, #2a104a 20px);
        }
        .poker-card.flipped { opacity: 0.05; pointer-events: none; }

        #focus-board { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 85%; background: #fff; color: #111; border: 4px solid #000; padding: 20px; display: none; z-index: 3000; box-shadow: 12px 12px 0 #000; }
        #q-text { font-size: 1.1rem; font-weight: bold; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.6; }

        /* 聊天与控制 */
        .footer { height: 280px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 12px; font-size: 0.75rem; color: var(--blue); border-bottom: 1px solid #222; }
        .chat-input { height: 42px; display: flex; background: #111; border-bottom: 1px solid #222; }
        #chat-in { flex: 1; background: transparent; border: none; color: #fff; padding: 0 15px; font-family: inherit; font-size: 0.85rem; outline: none; }
        
        .btn-panel { height: 100px; display: flex; padding: 10px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 60px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 6px; font-weight: bold; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ctrl-btn.mic { border-radius: 50%; width: 72px; height: 72px; flex: none; font-size: 1.8rem; color: #fff; }
        .ctrl-btn.mic.active { background: var(--pink); border-color: #fff; box-shadow: 0 0 20px var(--pink); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="plasma-bg"></div>
    <div class="title">SPEAK</div>
    <div class="setup-box">
        <input type="text" id="nick-in" class="balatro-input" placeholder="代号" autocomplete="off">
        <input type="text" id="room-in" class="balatro-input" placeholder="房号" autocomplete="off">
        <button class="run-btn" onclick="init('player')">RUN GAME</button>
    </div>
    <div class="bottom-links">
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="link-btn" onclick="restore('nick')">使用旧名登录</button>
            <button class="link-btn" onclick="restore('room')">回到房间</button>
        </div>
        <button class="link-btn companion-link" onclick="init('companion')">陪伴师入口</button>
    </div>
</div>

<div id="status-bar">
    <span id="guide-msg">>>> 系统启动</span>
    <div id="room-id-box" style="display:none; align-items:center; gap:5px; margin-left: 10px;">
        <span style="color:#000;">ID:</span>
        <span id="cur-room-id" style="color:#000; font-weight:bold;">------</span>
        <div class="copy-btn" onclick="copyID()">复制</div>
    </div>
</div>

<div class="player-bar" id="p-bar"></div>

<div class="stage">
    <div id="focus-board">
        <div style="font-size:0.5rem; color:#999; text-align:center; border-bottom:1px solid #ddd; margin-bottom:10px;">[ FILE OPEN ]</div>
        <div id="q-text">档案内容...</div>
        <button class="ctrl-btn" style="width:100%; height:44px; margin-top:10px; border-color:var(--gold); color:var(--gold);" onclick="next()">关闭并继续</button>
    </div>
    <div class="deck-scroll" id="deck"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="chat-input">
        <input type="text" id="chat-in" placeholder="输入吐槽或提问..." onkeypress="if(event.keyCode==13) sendMsg()">
    </div>
    <div class="btn-panel">
        <button class="ctrl-btn" onclick="reaction('👍')">点赞</button>
        <button class="ctrl-btn" style="border-color:#444;" onclick="reaction('❌')">不同意</button>
        <button id="mic-btn" class="ctrl-btn mic" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);">转移</button>
        <button class="ctrl-btn" onclick="next()">跳过</button>
    </div>
</div>

<script>
    const qs = ["你觉得这辈子最对不起的人是谁？为什么？", "如果你有一件隐身衣，你最想去做什么？", "如果工资减半但每天准时5点下班且没人找你，你会换吗？", "你现在极度怀念却再也找不到的一种感觉是什么？"];
    let players = [], turnIdx = 0, flipped = [], isMicOn = false, role = 'player';

    function restore(type) {
        if(type==='nick') document.getElementById('nick-in').value = localStorage.getItem('s_nick') || "";
        if(type==='room') document.getElementById('room-in').value = localStorage.getItem('s_room') || "";
    }

    function init(m) {
        role = m;
        const nick = document.getElementById('nick-in').value || "ANON";
        let room = document.getElementById('room-in').value;

        if(role === 'companion') {
            room = Math.floor(100000 + Math.random() * 900000).toString();
            players = [{nick: nick, avatar: '🧿', isComp: true}];
            document.getElementById('guide-msg').innerText = ">>> 陪伴师已就位";
        } else {
            if(!room) { alert("请输入房号"); return; }
            players = [{nick: nick, avatar: '🃏', isComp: false}];
            document.getElementById('guide-msg').innerText = ">>> 等待抽牌";
        }

        localStorage.setItem('s_nick', nick);
        localStorage.setItem('s_room', room);
        document.getElementById('cur-room-id').innerText = room;
        document.getElementById('room-id-box').style.display = 'flex';
        document.getElementById('login-screen').style.display = 'none';
        
        renderP(); renderD();
    }

    function copyID() {
        navigator.clipboard.writeText(document.getElementById('cur-room-id').innerText);
        const b = document.querySelector('.copy-btn');
        b.innerText = "已复制"; setTimeout(() => b.innerText = "复制", 2000);
    }

    function renderP() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item ${i===turnIdx?'active':''}">
                <div class="p-avatar ${p.isComp?'companion':''}">${p.avatar}</div>
                <div class="name">${p.nick}</div>
            </div>
        `).join('');
    }

    function renderD() {
        let h = "";
        for(let i=0; i<40; i++) h += `<div class="poker-card ${flipped.includes(i)?'flipped':''}" onclick="tap(${i})"></div>`;
        document.getElementById('deck').innerHTML = h;
    }

    function tap(i) {
        if(role==='companion' || flipped.includes(i)) return;
        flipped.push(i);
        document.getElementById('q-text').innerText = qs[Math.floor(Math.random()*qs.length)];
        document.getElementById('focus-board').style.display = 'flex';
        renderD();
    }

    function toggleMic() {
        isMicOn = !isMicOn;
        document.getElementById('mic-btn').classList.toggle('active', isMicOn);
    }

    function sendMsg() {
        let i = document.getElementById('chat-in'); if(!i.value) return;
        let b = document.getElementById('chat-flow');
        b.innerHTML += `<div><span style="color:var(--gold)">${localStorage.getItem('s_nick')}:</span> ${i.value}</div>`;
        b.scrollTop = b.scrollHeight; i.value = "";
    }

    function next() {
        document.getElementById('focus-board').style.display = 'none';
        turnIdx = (turnIdx + 1) % players.length;
        if(players[turnIdx]?.isComp) turnIdx = (turnIdx + 1) % players.length;
        renderP();
    }

    function reaction(e) { 
        let b = document.getElementById('chat-flow');
        b.innerHTML += `<div style="color:var(--pink)">>>> 评价: ${e}</div>`;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
