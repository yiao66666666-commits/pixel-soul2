<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PIXEL SOUL V45 - 心灵酒馆</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0c10; --pink: #f08a5d; --blue: #66fcf1; --gold: #f9a826; --dark: #1f2833; --light: #c5c6c7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background: var(--bg); color: var(--light); font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 30%, #1f2833 0%, #0b0c10 70%);
        }

        /* 顶部状态与排队栏 */
        .header { height: 70px; background: rgba(11, 12, 16, 0.8); border-bottom: 1px solid #333; display: flex; flex-direction: column; justify-content: center; padding: 0 15px; flex-shrink: 0; z-index: 10; backdrop-filter: blur(5px); }
        .status-text { font-size: 0.75rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .queue-bar { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .queue-item { font-size: 0.7rem; background: var(--dark); padding: 3px 10px; border-radius: 12px; color: #aaa; border: 1px solid #444; white-space: nowrap; }
        .queue-item.active { background: rgba(249, 168, 38, 0.2); color: var(--gold); border-color: var(--gold); }

        /* 中央篝火与舞台区 */
        .stage { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
        
        /* 卡牌样式重构 */
        .card-container { perspective: 1000px; width: 100%; max-width: 280px; height: 380px; display: none; z-index: 5; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; border: 2px solid #444; }
        .card-front { background: linear-gradient(135deg, #1f2833, #0b0c10); color: var(--gold); background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px); }
        .card-back { background: #e5e5e6; color: #111; transform: rotateY(180deg); border: 4px solid var(--dark); }
        .card-back.healer-card { background: #1a1a2e; color: var(--blue); border-color: var(--blue); box-shadow: 0 0 30px rgba(102, 252, 241, 0.2); }
        
        .card-title { font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.6; }
        .card-content { font-size: 1.1rem; line-height: 1.6; font-weight: bold; }
        .healer-content { font-size: 1.3rem; margin-bottom: 10px; color: var(--blue); }
        .healer-desc { font-size: 0.85rem; color: #888; line-height: 1.5; }

        /* 光遇式交互粒子 */
        .particle { position: absolute; bottom: 0; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); animation: floatUp 2s ease-out forwards; pointer-events: none; z-index: 20; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-300px) scale(0); opacity: 0; } }
        .ripple { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border: 2px solid var(--pink); border-radius: 50%; animation: rippleAnim 1.5s ease-out forwards; pointer-events: none; z-index: 1; }
        @keyframes rippleAnim { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 300px; height: 300px; opacity: 0; } }

        /* 底部交互舱 */
        .footer-console { height: 130px; background: rgba(11, 12, 16, 0.95); border-top: 1px solid #222; display: flex; flex-direction: column; flex-shrink: 0; padding: 10px 15px; gap: 10px; z-index: 10; backdrop-filter: blur(10px); }
        
        .btn-row { display: flex; gap: 10px; height: 50px; }
        .p-btn { flex: 1; background: var(--dark); border: 1px solid #444; color: var(--light); border-radius: 8px; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; outline: none; }
        .p-btn:active { transform: scale(0.95); background: #333; }
        .p-btn:disabled { opacity: 0.4; pointer-events: none; }
        .p-btn.gold { color: var(--gold); border-color: var(--gold); }
        .p-btn.blue { color: var(--blue); border-color: var(--blue); }
        .p-btn.pink { color: var(--pink); border-color: var(--pink); }
        .p-btn.active-mic { background: rgba(102, 252, 241, 0.2); color: var(--blue); border-color: var(--blue); animation: micPulse 1.5s infinite; }
        @keyframes micPulse { 0% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(102, 252, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0); } }

        /* 匿名递纸条区 */
        .chat-input-bar { display: flex; gap: 10px; height: 40px; }
        #c-in { flex: 1; background: #000; border: 1px solid #333; border-radius: 20px; padding: 0 15px; color: #fff; outline: none; font-size: 0.8rem; }
        #c-in:focus { border-color: var(--blue); }
        .send-btn { background: transparent; border: none; color: #888; font-weight: bold; padding: 0 10px; }
        
        /* 弹幕流 */
        #danmaku-container { position: absolute; top: 20px; left: 0; width: 100%; height: 150px; pointer-events: none; z-index: 100; overflow: hidden; }
        .danmaku { position: absolute; white-space: nowrap; color: rgba(255,255,255,0.8); font-size: 0.85rem; text-shadow: 1px 1px 2px #000; animation: passBy 8s linear forwards; }
        @keyframes passBy { from { left: 100%; } to { left: -100%; } }

        /* 登录界面的蒙版 */
        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .setup-input { width: 100%; max-width: 280px; padding: 15px; border: 2px solid #444; background: #000; color: #fff; text-align: center; font-size: 1rem; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .setup-input:focus { border-color: var(--blue); }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color:var(--light); font-size: 2rem; margin-bottom: 5px; letter-spacing: 2px;">SOUL TAVERN</h1>
    <p style="color:#666; font-size: 0.8rem; margin-bottom: 40px;">- 卸下防御，点燃篝火 -</p>
    
    <div id="step-1" style="width:100%; max-width:280px; display:flex; flex-direction:column; gap:10px;">
        <input type="text" id="nick-in" class="setup-input" placeholder="输入你的名字..." autocomplete="off">
        <button class="p-btn blue" style="height:50px;" onclick="initRoom('healer')">我是疗愈师 (开启酒馆)</button>
        <button class="p-btn" style="height:50px;" onclick="document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='flex';">我是酒客 (推门进入)</button>
    </div>
    
    <div id="step-2" style="width:100%; max-width:280px; display:none; flex-direction:column; gap:10px;">
        <input type="text" id="id-in" class="setup-input" placeholder="输入疗愈师的酒馆口令..." autocomplete="off">
        <div style="display:flex; gap:10px;">
            <button class="p-btn" style="height:50px;" onclick="document.getElementById('step-2').style.display='none'; document.getElementById('step-1').style.display='flex';">返回</button>
            <button class="p-btn gold" style="height:50px;" onclick="initRoom('guest')">推门</button>
        </div>
    </div>
</div>

<div class="header">
    <div class="status-bar" style="display:flex; justify-content: space-between; align-items: center;">
        <div class="status-text" id="status-text">酒馆营业中 | 自由交流</div>
        <div style="font-size:0.6rem; color:#555;">ROOM: <span id="room-id">----</span></div>
    </div>
    <div class="queue-bar" id="queue-bar">
        </div>
</div>

<div class="stage" id="stage">
    <div id="danmaku-container"></div>
    
    <div id="idle-state" style="color:#444; font-size: 0.9rem; letter-spacing: 1px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <div style="font-size: 3rem; opacity: 0.5;">🔥</div>
        <div>篝火燃烧中，等待下一位诉说者...</div>
    </div>

    <div class="card-container" id="card-container">
        <div class="card" id="the-card">
            <div class="card-face card-front">
                <div style="font-size:3rem; margin-bottom:20px;">🃏</div>
                <div style="font-size:0.9rem; color:#888;">正在抽取灵魂档案...</div>
            </div>
            <div class="card-face card-back" id="card-back-face">
                <div class="card-title" id="c-title">问题卡</div>
                <div class="card-content" id="c-content">描述一个你最恨自己的瞬间。</div>
            </div>
        </div>
    </div>
</div>

<div class="footer-console">
    <div class="btn-row" id="guest-controls" style="display:none;">
        <button class="p-btn" id="queue-btn" onclick="toggleQueue()">排队上台</button>
        <button class="p-btn gold" id="light-btn" onmousedown="sendParticle()" ontouchstart="sendParticle()">✨ 送出光芒</button>
        <button class="p-btn pink" id="res-btn" onclick="sendRipple()">💓 我也经历过</button>
    </div>
    
    <div class="btn-row" id="healer-controls" style="display:none;">
        <button class="p-btn active-mic" id="h-mic" onclick="toggleMic()">🎙️ 疗愈师麦克风</button>
        <button class="p-btn blue" onclick="nextInQueue()">邀请下一位</button>
        <button class="p-btn gold" onclick="drawHealerCard()">🔮 抽取疗愈卡</button>
    </div>

    <div class="btn-row" id="speaker-controls" style="display:none;">
        <button class="p-btn active-mic" id="s-mic" onclick="toggleMic()">🎙️ 我的麦克风</button>
        <button class="p-btn gold" id="s-draw" onclick="drawQuestionCard()">抽取问题卡</button>
        <button class="p-btn" onclick="finishSpeaking()">结束发言</button>
    </div>

    <div class="chat-input-bar">
        <input type="text" id="c-in" placeholder="递一张匿名纸条..." onkeypress="if(event.keyCode==13) sendDanmaku()">
        <button class="send-btn" onclick="sendDanmaku()">发送</button>
    </div>
</div>

<div id="audio-bridge" style="display:none;"></div>

<script>
    // 40张 问题卡 (用于酒客)
    const questions = [
        "描述一个你最恨自己的瞬间。","分享一个你最绝望、觉得自己撑不下去的时刻。","哪一次你为了合群，假装自己很开心？","回忆一个你觉得“这辈子也就这样了”的瞬间。","如果必须切断一段现有关系，你会放弃谁？为什么？",
        "说出一个你最不敢向别人承认的自私念头。","你在哪段感情里，觉得自己变得最面目可憎？","你曾用什么方式，残忍地推开过一个真正在乎你的人？","分享一个你明知道是错的，但依然去做了的决定。","你心里一直没有原谅的那个人是谁？",
        "描述一个你在深夜里会反复咀嚼的遗憾。","你曾在什么事情上，感受过彻头彻尾的无能为力？","哪一句无心的话，曾像刀子一样扎进你心里？","你最害怕自己最终变成什么样的人？","为了获得别人的认可，你丢掉过什么最宝贵的东西？"
    ]; // 截取前15个做演示，系统自动循环

    // 40张 疗愈师神谕卡 (用于老板解读)
    const oracleCards = [
        { title: "【01】破碎之镜", desc: "你放不下的不是他，而是镜子里那个曾经被偏爱的自己。重建自我，而非修补镜子。" },
        { title: "【07】深渊回响", desc: "恐惧的本质是你在吓自己。当你凝视深渊，其实深渊也在等待你的拥抱。" },
        { title: "【13】蜕皮期", desc: "成长伴随着撕裂的痛楚。你不是在失去，你只是在褪去不适合你的旧壳。" },
        { title: "【22】倒吊人", desc: "当你觉得无路可走时，试着把世界倒过来看。停止挣扎，臣服于当下的停滞。" },
        { title: "【39】愚者的行囊", desc: "你背负了太多别人的期待。清空行囊，你随时拥有从零开始的特权。" }
    ];

    const iceCfg = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun.anyfirewall.com:3478' }] };

    // 房间核心状态机 (Single Source of Truth)
    let state = {
        phase: 'IDLE', // IDLE, SPEAKING, HEALING
        queue: [],     // 排队名单 [{id, nick}]
        currentSpeaker: null, // 当前主讲人 {id, nick}
        currentCard: null,    // 当前展示的卡牌内容
        isHealerCard: false
    };

    let peer, conns = [], myNick = "", isHealer = false;
    let localStream = null, isMuted = false;
    let audioUnlocked = false;

    // --- 硬件与连接初始化 ---
    async function initRoom(role) {
        if(!audioUnlocked) { try { let a = new AudioContext(); a.createOscillator().start(0); audioUnlocked=true; } catch(e){} }
        
        myNick = document.getElementById('nick-in').value || (role==='healer'?"主理人":"匿名酒客");
        isHealer = (role === 'healer');
        
        document.getElementById('setup').style.display = 'none';
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            localStream.getAudioTracks()[0].enabled = false; // 初始全员静音
        } catch(e) { console.warn("Mic auth failed."); }

        peer = new Peer({ config: iceCfg, secure: true });
        
        peer.on('open', id => {
            document.getElementById('room-id').innerText = id;
            if(isHealer) {
                localStream.getAudioTracks()[0].enabled = true; // 疗愈师永远开麦
                syncState(); 
            } else {
                let rid = document.getElementById('id-in').value.trim();
                let c = peer.connect(rid, { reliable: true });
                setupConn(c);
            }
        });
        peer.on('connection', setupConn);
        peer.on('call', call => { call.answer(localStream); handleVoice(call); });
    }

    function setupConn(c) {
        c.on('open', () => { 
            if(!conns.find(x => x.peer === c.peer)) conns.push(c); 
            c.send({ type: 'JOIN', id: peer.id, nick: myNick }); 
            if(localStream) peer.call(c.peer, localStream);
        });
        
        c.on('data', data => {
            // 疗愈师处理中心逻辑
            if(isHealer) {
                if(data.type === 'JOIN') { syncState(); }
                if(data.type === 'REQ_QUEUE') { 
                    if(!state.queue.find(p => p.id === data.id)) state.queue.push({id: data.id, nick: data.nick}); 
                    syncState(); 
                }
                if(data.type === 'DEQUEUE') { state.queue = state.queue.filter(p => p.id !== data.id); syncState(); }
                if(data.type === 'REQ_FINISH' && state.currentSpeaker?.id === data.id) { 
                    state.phase = 'IDLE'; state.currentSpeaker = null; state.currentCard = null; syncState(); 
                }
                if(data.type === 'DRAW_CARD' && state.currentSpeaker?.id === data.id) {
                    state.currentCard = questions[Math.floor(Math.random()*questions.length)];
                    state.isHealerCard = false; syncState();
                }
            }
            
            // 全员接收同步指令
            if(data.type === 'SYNC') { 
                state = data.state; renderUI(); 
            }
            if(data.type === 'DANMAKU') { spawnDanmaku(data.msg); }
            if(data.type === 'PARTICLE') { spawnParticle(); }
            if(data.type === 'RIPPLE') { spawnRipple(); }
        });
        
        c.on('close', () => { 
            if(isHealer) { state.queue = state.queue.filter(p => p.id !== c.peer); syncState(); } 
        });
    }

    function handleVoice(call) {
        call.on('stream', stream => {
            let a = document.createElement('audio'); a.autoplay=true; a.srcObject=stream;
            document.getElementById('audio-bridge').appendChild(a);
        });
    }

    // --- 状态同步与 UI 渲染 (核心) ---
    function syncState() {
        if(isHealer) { conns.forEach(c => { if(c.open) c.send({type: 'SYNC', state}); }); renderUI(); }
    }

    function renderUI() {
        // 1. 渲染排队栏
        const qBar = document.getElementById('queue-bar');
        qBar.innerHTML = state.queue.map(p => `<div class="queue-item ${p.id===peer.id?'active':''}">${p.nick}</div>`).join('');
        if(state.queue.length === 0) qBar.innerHTML = `<div class="queue-item">当前无人在排队</div>`;

        // 2. 渲染状态文本
        const statusEl = document.getElementById('status-text');
        if(state.phase === 'IDLE') statusEl.innerText = "酒馆营业中 | 自由倾听";
        else if(state.phase === 'SPEAKING') statusEl.innerText = `🎙️ [${state.currentSpeaker.nick}] 正在讲述...`;
        else if(state.phase === 'HEALING') statusEl.innerText = `🔮 疗愈师正在解读...`;

        // 3. 控制面板显示权限 (权限彻底隔离)
        document.getElementById('guest-controls').style.display = 'none';
        document.getElementById('healer-controls').style.display = 'none';
        document.getElementById('speaker-controls').style.display = 'none';

        let isMyTurn = (state.currentSpeaker?.id === peer.id);

        if(isHealer) {
            document.getElementById('healer-controls').style.display = 'flex';
        } else if (isMyTurn) {
            document.getElementById('speaker-controls').style.display = 'flex';
            // 只有轮到我，且没抽卡时才能抽
            document.getElementById('s-draw').disabled = (state.currentCard !== null);
        } else {
            document.getElementById('guest-controls').style.display = 'flex';
            let inQueue = state.queue.find(p=>p.id===peer.id);
            document.getElementById('queue-btn').innerText = inQueue ? "取消排队" : "排队上台";
            // 只有有人讲话时，才能发光和共振
            document.getElementById('light-btn').disabled = (state.phase === 'IDLE');
            document.getElementById('res-btn').disabled = (state.phase === 'IDLE');
        }

        // 4. 麦克风物理锁死
        if(localStream) {
            if(isHealer) localStream.getAudioTracks()[0].enabled = true; // 疗愈师常开
            else if(isMyTurn) localStream.getAudioTracks()[0].enabled = !isMuted; // 讲述者按键控制
            else localStream.getAudioTracks()[0].enabled = false; // 其他人强制闭麦
        }

        // 5. 渲染中央舞台卡牌
        const cardContainer = document.getElementById('card-container');
        const idleState = document.getElementById('idle-state');
        const card = document.getElementById('the-card');
        const cardBack = document.getElementById('card-back-face');

        if(state.currentCard) {
            idleState.style.display = 'none';
            cardContainer.style.display = 'block';
            
            if(state.isHealerCard) {
                cardBack.className = "card-face card-back healer-card";
                document.getElementById('c-title').innerText = "🔮 " + state.currentCard.title;
                document.getElementById('c-content').innerHTML = `<div class="healer-desc">${state.currentCard.desc}</div>`;
            } else {
                cardBack.className = "card-face card-back";
                document.getElementById('c-title').innerText = "问题卡";
                document.getElementById('c-content').innerText = state.currentCard;
            }
            
            // 触发翻牌动画
            setTimeout(() => card.classList.add('flipped'), 100);
        } else {
            card.classList.remove('flipped');
            setTimeout(() => { cardContainer.style.display = 'none'; idleState.style.display = 'flex'; }, 600);
        }
    }

    // --- 业务操作指令 ---
    function toggleQueue() {
        let inQ = state.queue.find(p=>p.id===peer.id);
        conns.forEach(c => c.send({type: inQ ? 'DEQUEUE' : 'REQ_QUEUE', id: peer.id, nick: myNick}));
    }

    function nextInQueue() {
        if(!isHealer) return;
        if(state.queue.length === 0) { alert("队列为空"); return; }
        let nextP = state.queue.shift();
        state.currentSpeaker = nextP;
        state.phase = 'SPEAKING';
        state.currentCard = null; // 重置卡牌
        syncState();
    }

    function drawQuestionCard() {
        conns.forEach(c => c.send({type: 'DRAW_CARD', id: peer.id}));
    }

    function drawHealerCard() {
        if(!isHealer) return;
        state.phase = 'HEALING';
        state.currentCard = oracleCards[Math.floor(Math.random() * oracleCards.length)];
        state.isHealerCard = true;
        syncState();
    }

    function finishSpeaking() {
        conns.forEach(c => c.send({type: 'REQ_FINISH', id: peer.id}));
    }

    function toggleMic() {
        isMuted = !isMuted;
        let btn = isHealer ? document.getElementById('h-mic') : document.getElementById('s-mic');
        btn.innerText = isMuted ? "🎙️ 麦克风已关" : "🎙️ 麦克风收音中";
        btn.className = isMuted ? "p-btn" : "p-btn active-mic";
        renderUI(); // 更新物理轨道
    }

    // --- 光遇式交互与弹幕 ---
    function sendParticle() {
        spawnParticle();
        conns.forEach(c => { if(c.open) c.send({type: 'PARTICLE'}); });
    }
    function spawnParticle() {
        let p = document.createElement('div'); p.className = 'particle';
        p.style.left = (Math.random() * 80 + 10) + '%';
        document.getElementById('stage').appendChild(p);
        setTimeout(() => p.remove(), 2000);
    }

    function sendRipple() {
        spawnRipple();
        conns.forEach(c => { if(c.open) c.send({type: 'RIPPLE'}); });
    }
    function spawnRipple() {
        let r = document.createElement('div'); r.className = 'ripple';
        document.getElementById('card-container').appendChild(r);
        setTimeout(() => r.remove(), 1500);
    }

    function sendDanmaku() {
        let val = document.getElementById('c-in').value.trim();
        if(!val) return;
        spawnDanmaku(val);
        conns.forEach(c => { if(c.open) c.send({type: 'DANMAKU', msg: val}); });
        document.getElementById('c-in').value = "";
    }
    function spawnDanmaku(text) {
        let d = document.createElement('div'); d.className = 'danmaku';
        d.innerText = text;
        d.style.top = (Math.random() * 120) + 'px';
        document.getElementById('danmaku-container').appendChild(d);
        setTimeout(() => d.remove(), 8000);
    }
</script>
</body>
</html>
