<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V44.5 - 博弈操控</title>
    <style>
        :root { --bg: #0a0510; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --dark: #000; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 顶部向导 */
        #guide-bar { height: 32px; background: var(--pink); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.7rem; z-index: 2000; text-transform: uppercase; }

        /* 玩家栏 */
        .player-bar { height: 75px; padding: 8px; display: flex; gap: 10px; background: var(--dark); border-bottom: 2px solid #222; overflow-x: auto; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 50px; opacity: 0.5; }
        .p-avatar { width: 36px; height: 36px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; }
        .p-item.active { opacity: 1; transform: scale(1.1); }
        .p-item.active .p-avatar { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .name { font-size: 0.5rem; color: #888; margin-top: 3px; }

        /* 滑动卡池区 */
        .stage { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .deck-scroll { 
            display: flex; gap: 15px; padding: 40px 20px; overflow-x: scroll; 
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .deck-scroll::-webkit-scrollbar { display: none; }
        .big-card { 
            flex: 0 0 120px; aspect-ratio: 2/3; background: #2a104a; border-radius: 8px; 
            border: 2px solid rgba(255,255,255,0.2); scroll-snap-align: center;
            background-image: repeating-linear-gradient(45deg, #3d1563, #3d1563 10px, #2a104a 10px, #2a104a 20px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .big-card.flipped { opacity: 0.1; transform: scale(0.9); pointer-events: none; }

        /* 问题面板 */
        #focus-board { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; background: #f0f0f0; color: #111; border: 4px solid #000; border-radius: 8px; 
            padding: 15px; display: none; flex-direction: column; z-index: 500; 
        }
        #q-text { font-size: 1rem; font-weight: bold; margin: 10px 0; text-align: center; color: #000; }

        /* 转移人选框 */
        #transfer-selector {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .selector-box { background: #222; border: 2px solid var(--pink); padding: 20px; border-radius: 12px; width: 80%; }
        .target-p { padding: 12px; border: 1px solid #444; margin: 8px 0; text-align: center; color: var(--gold); }

        /* 动画粒子 */
        .particle { position: fixed; pointer-events: none; animation: flyOut 0.8s ease-out forwards; z-index: 9999; font-size: 2rem; }
        @keyframes flyOut { 0% { transform: scale(1) translate(0,0); opacity: 1; } 100% { transform: scale(2) translate(var(--dx), var(--dy)); opacity: 0; } }

        /* 底部操作 */
        .footer-console { height: 260px; background: var(--dark); border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #c-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 10px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 60px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 6px; font-weight: bold; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ctrl-btn.mic { border-radius: 50%; width: 70px; height: 70px; flex: none; font-size: 1.5rem; background: #111; }
        .ctrl-btn.mic.on { background: var(--pink); border-color: #fff; box-shadow: 0 0 20px var(--pink); color: #fff; }
    </style>
</head>
<body>

<div id="guide-bar">>>> SPEAK V44.5 READY</div>

<div id="setup" style="position:fixed; inset:0; background:var(--bg); z-index:20000; display:flex; align-items:center; justify-content:center;">
    <button class="ctrl-btn" style="width:200px; border-color:var(--gold); color:var(--gold);" onclick="startDemo()">开启博弈测试</button>
</div>

<div id="transfer-selector">
    <div class="selector-box">
        <h3 style="text-align:center; margin-bottom:15px; color:var(--pink);">选择转移目标</h3>
        <div id="target-list"></div>
        <button class="ctrl-btn" style="width:100%; margin-top:10px;" onclick="closeTransfer()">取消</button>
    </div>
</div>

<div class="player-bar" id="p-bar"></div>

<div class="stage">
    <div id="focus-board">
        <div style="font-size:0.5rem; color:#666; text-align:center;">[ ARCHIVE OPEN ]</div>
        <div id="q-text"></div>
        <div id="vote-monitor" style="text-align:center;"></div>
        <button class="ctrl-btn" style="width:100%; height:35px; margin-top:10px; border-color:var(--gold); color:var(--gold);" onclick="nextTurn()">完成并进入下一轮</button>
    </div>
    <div class="deck-scroll" id="deck"></div>
</div>

<div class="footer-console">
    <div id="c-msgs"></div>
    <div class="btn-panel">
        <button id="like-btn" class="ctrl-btn" onclick="spawnEmoji('👍')">👍点赞</button>
        <button id="disagree-btn" class="ctrl-btn" style="border-color:#555; color:#555;" onclick="spawnEmoji('❌')">❌不同意</button>
        <button id="mic-btn" class="ctrl-btn mic" onclick="toggleMic()">🎙️</button>
        <button id="trans-btn" class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);" onclick="openTransfer()">🔄转移</button>
        <button class="ctrl-btn" style="border-color:#444; color:#444;" onclick="nextTurn()">✅跳过</button>
    </div>
</div>

<script>
    const questions = ["你上一次哭是因为什么？", "如果你有一件隐身衣你想去做什么？", "如果你死后手机数据被公开，你最怕谁看到？", "此时此刻最大的焦虑源头是什么？"];
    const bots = ["阿强", "小美", "老王", "Emma", "大刘"];
    let players = [], turnIdx = 0, flipped = [], isMicOn = false;

    function startDemo() {
        document.getElementById('setup').style.display = 'none';
        players = [{nick: '我', isBot: false, avatar: '🃏'}];
        bots.forEach(n => players.push({nick: n, isBot: true, avatar: '🤖'}));
        renderPlayers();
        renderDeck();
        setGuide("请左右滑动卡池，点击抽取你的问题");
    }

    function setGuide(txt) { document.getElementById('guide-bar').innerText = `>>> ${txt}`; }

    function renderPlayers() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item ${i===turnIdx?'active':''}">
                <div class="p-avatar">${p.avatar}</div>
                <div class="name">${p.nick}</div>
            </div>
        `).join('');
    }

    function renderDeck() {
        let d = document.getElementById('deck'); d.innerHTML = "";
        for(let i=0; i<40; i++) {
            d.innerHTML += `<div class="big-card ${flipped.includes(i)?'flipped':''}" onclick="userDraw(${i})"></div>`;
        }
    }

    function userDraw(i) {
        if(players[turnIdx].isBot || flipped.includes(i)) return;
        draw(i);
    }

    function draw(i) {
        flipped.push(i);
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('q-text').innerText = q;
        document.getElementById('focus-board').style.display = 'flex';
        renderDeck();
        setGuide(`${players[turnIdx].nick} 正在发言...`);
        const isMe = !players[turnIdx].isBot;
        document.getElementById('like-btn').disabled = isMe;
        document.getElementById('trans-btn').disabled = !isMe;
    }

    // 转移卡：选择人
    function openTransfer() {
        if(players[turnIdx].isBot) return;
        const list = document.getElementById('target-list');
        list.innerHTML = "";
        players.forEach((p, i) => {
            if(i !== turnIdx) {
                list.innerHTML += `<div class="target-p" onclick="doTransfer(${i})">${p.nick}</div>`;
            }
        });
        document.getElementById('transfer-selector').style.display = 'flex';
    }

    function doTransfer(idx) {
        appendChat("系统", `${players[turnIdx].nick} 将问题甩给了 ${players[idx].nick}！`);
        turnIdx = idx;
        closeTransfer();
        renderPlayers();
        draw(flipped[flipped.length-1]);
    }

    function closeTransfer() { document.getElementById('transfer-selector').style.display = 'none'; }

    // 点击语音
    function toggleMic() {
        isMicOn = !isMicOn;
        const btn = document.getElementById('mic-btn');
        btn.classList.toggle('on', isMicOn);
        setGuide(isMicOn ? "麦克风已开启 - 正在说话" : "麦克风已关闭");
    }

    // 点赞动画
    function spawnEmoji(type) {
        for(let i=0; i<6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = type;
            p.style.left = '50%'; p.style.top = '50%';
            p.style.setProperty('--dx', (Math.random()*400-200)+'px');
            p.style.setProperty('--dy', (Math.random()*-400-100)+'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
        appendChat("我", `发送了 ${type==='👍'?'赞':'不同意'}`);
    }

    function nextTurn() {
        document.getElementById('focus-board').style.display = 'none';
        turnIdx = (turnIdx + 1) % players.length;
        renderPlayers();
        checkTurn();
    }

    function checkTurn() {
        if(players[turnIdx].isBot) {
            setGuide(`等待 ${players[turnIdx].nick} 选牌...`);
            setTimeout(() => {
                let idx; do { idx = Math.floor(Math.random()*40); } while(flipped.includes(idx));
                draw(idx);
            }, 2000);
        } else { setGuide("请左右滑动并选牌"); }
    }

    function appendChat(n, m) {
        let b = document.getElementById('c-msgs');
        b.innerHTML += `<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
