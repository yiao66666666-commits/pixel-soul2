<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - V45.8</title>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 首页底图与动画 --- */
        #login-screen { position: fixed; inset: 0; z-index: 50000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); }
        .plasma-bg { position: absolute; inset: 0; z-index: -1; opacity: 0.4; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 顶部状态栏 (显示房号) --- */
        #status-bar { height: 36px; background: var(--pink); color: #000; display: flex; align-items: center; padding: 0 15px; font-weight: 900; font-size: 0.75rem; gap: 10px; z-index: 2000; }
        .room-tag { background: #000; color: var(--gold); padding: 2px 8px; border-radius: 4px; font-family: monospace; }

        /* --- 弹窗与表单校验 --- */
        .overlay { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .modal { width: 85%; max-width: 320px; background: #eee; color: #111; border: 4px solid #000; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 10px 10px 0 var(--pink); }
        
        /* 输入框校验错误时的震动动画 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .error-shake { animation: shake 0.2s ease-in-out 2; border: 2px solid var(--pink) !important; }

        /* 玩家头像栏 */
        .player-bar { height: 100px; padding: 10px; display: flex; gap: 12px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; overflow-x: auto; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; opacity: 0.4; transition: 0.5s; }
        .p-item.online { opacity: 1; }
        .p-batt-val { font-size: 0.6rem; color: var(--green); font-weight: bold; height: 12px; }
        .p-avatar { width: 44px; height: 44px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; }
        .p-item.active .p-avatar { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* --- 卡牌仪式感 --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; width: 75%; aspect-ratio: 9 / 16; background: #fff; color: #111; border: 5px solid #000; 
            border-radius: 12px; padding: 25px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.6);
            transform: translateY(100%) rotateX(-180deg) scale(0.4);
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s;
            opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-5%) rotateX(0deg) scale(1); opacity: 1; }

        /* 按钮与footer */
        .footer { height: 240px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.75rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 10px; align-items: center; justify-content: center; }
        .ctrl-btn { flex: 1; height: 50px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
        .mic { border-radius: 50%; width: 70px; height: 70px; flex: none; font-size: 1.8rem; color: #fff; border: 3px solid var(--blue); }

        /* 房主发令枪 */
        #host-start-trigger { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 6000; display: none; width: 220px; padding: 18px; background: var(--gold); color: #000; font-weight: 900; border: 4px solid #fff; border-radius: 50px; box-shadow: 0 0 30px var(--gold); }

        .run-btn { width: 100%; padding: 18px; background: var(--pink); border: 3px solid #fff; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="plasma-bg"></div>
    <div style="font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px; letter-spacing: -2px;">SPEAK</div>
    <div style="width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="nick-in" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center; font-size:1.1rem;" placeholder="你的代号 (必填)">
        <input type="text" id="room-in" maxlength="6" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center; font-size:1.1rem;" placeholder="6位房号 (必填)">
        <button class="run-btn" onclick="validateAndJoin('player')">加入房间</button>
        <button class="run-btn" style="background:var(--purple);" onclick="validateAndJoin('companion')">陪伴师入口</button>
    </div>
</div>

<button id="host-start-trigger" onclick="broadcastStart()">[ 开启灵魂审判 ]</button>

<div id="battery-overlay" class="overlay">
    <div class="modal" style="background:#000; color:#fff; border-color:var(--green);">
        <p>如果精力比做电池...</p>
        <div id="batt-text" style="font-size:2rem; color:var(--green); font-weight:900; margin:10px 0;">50%</div>
        <div style="width: 80px; height: 160px; border: 4px solid #fff; margin: 20px auto; position: relative; padding: 3px;">
            <div id="batt-fill" style="width:100%; background:var(--green); position:absolute; bottom:0; transition:0.3s; height:50%;"></div>
        </div>
        <input type="range" min="1" max="100" value="50" oninput="document.getElementById('batt-text').innerText=this.value+'%'; document.getElementById('batt-fill').style.height=this.value+'%'" style="width:100%; accent-color:var(--green);">
        <button class="run-btn" style="background:var(--green); color:#000;" onclick="confirmBatt()">同步电量</button>
    </div>
</div>

<div id="status-bar" style="display:none;">
    <span>ROOM:</span>
    <span id="display-room-id" class="room-tag">------</span>
    <span style="margin-left:auto; font-size:0.6rem; opacity:0.7;">SPEAK V45.8</span>
</div>

<div class="player-bar" id="p-bar"></div>

<div class="stage">
    <div id="card-podium"></div>
    <div id="focus-board">
        <div style="font-size:0.6rem; color:#999; letter-spacing:2px;">[ SENSITIVE FILE ]</div>
        <div id="q-text" style="font-size:1.2rem; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center;"></div>
        <button class="ctrl-btn" style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="closeCard()">回答完毕，关闭档案</button>
    </div>
    <div id="deck" style="display:flex; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="btn-panel">
        <button class="ctrl-btn" onclick="talk('👍')">点赞</button>
        <button class="ctrl-btn" style="border-color:#444;" onclick="talk('❌')">反对</button>
        <button class="ctrl-btn mic" onclick="this.classList.toggle('active')">🎙️</button>
        <button class="ctrl-btn" style="border-color:var(--gold); color:var(--gold);" onclick="closeCard()">下一题</button>
    </div>
</div>

<script>
    let myRole = "player", myNick = "", roomID = "", players = [], flipped = [];
    const questions = ["你觉得这辈子最对不起的人是谁？", "如果你有一件隐身衣你想去做什么？", "你此时此刻最大的焦虑源头是什么？"];

    function validateAndJoin(mode) {
        const nInput = document.getElementById('nick-in');
        const rInput = document.getElementById('room-in');
        
        // 校验逻辑
        let hasError = false;
        if(!nInput.value.trim()) { nInput.classList.add('error-shake'); hasError = true; }
        else { nInput.classList.remove('error-shake'); }
        
        if(!rInput.value.trim() || rInput.value.length < 4) { rInput.classList.add('error-shake'); hasError = true; }
        else { rInput.classList.remove('error-shake'); }

        if(hasError) {
            alert("请完整填写代号和房号才能开启旅程。");
            return;
        }

        // 校验通过
        myNick = nInput.value;
        roomID = rInput.value;
        myRole = mode;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('status-bar').style.display = 'flex';
        document.getElementById('display-room-id').innerText = roomID;

        // 初始化大厅
        players = [{nick: myNick, batt: '??', online: true, isComp: (mode==='companion')}];
        if(mode === 'companion') {
            document.getElementById('host-start-trigger').style.display = 'block';
        }
        renderP();
    }

    function renderP() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item online">
                <div class="p-batt-val">${p.batt}</div>
                <div class="p-avatar">${p.isComp?'🧿':'🃏'}</div>
                <div style="font-size:0.5rem; margin-top:4px; color:#888;">${p.nick}</div>
            </div>
        `).join('');
    }

    function broadcastStart() {
        document.getElementById('host-start-trigger').style.display = 'none';
        document.getElementById('battery-overlay').style.display = 'flex';
    }

    function confirmBatt() {
        document.getElementById('battery-overlay').style.display = 'none';
        players[0].batt = document.getElementById('batt-text').innerText;
        // 模拟其他玩家加入
        players.push({nick:'玩家阿强', batt:'80%', online:true, isComp:false});
        renderP(); renderDeck();
    }

    function renderDeck() {
        let h = "";
        for(let i=0; i<40; i++) h += `<div onclick="draw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:6px; opacity:${flipped.includes(i)?0.1:1}"></div>`;
        document.getElementById('deck').innerHTML = h;
    }

    function draw(i) {
        if(flipped.includes(i) || myRole==='companion') return;
        flipped.push(i);
        document.getElementById('q-text').innerText = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('card-podium').style.display = 'block';
        const b = document.getElementById('focus-board');
        b.style.display = 'flex';
        setTimeout(() => b.classList.add('show'), 50);
        renderDeck();
    }

    function closeCard() {
        const b = document.getElementById('focus-board');
        b.classList.remove('show');
        setTimeout(() => {
            b.style.display = 'none';
            document.getElementById('card-podium').style.display = 'none';
        }, 800);
    }

    function talk(m) {
        const flow = document.getElementById('chat-flow');
        flow.innerHTML += `<div><span style="color:var(--gold)">${myNick}:</span> ${m}</div>`;
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
