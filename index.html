<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - V45.6</title>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 首页底图动画 (Balatro Style) --- */
        .plasma-bg { position: absolute; inset: 0; z-index: -1; opacity: 0.3; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 引导与弹窗 --- */
        .overlay { position: fixed; inset: 0; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); background: rgba(0,0,0,0.95); }
        .modal { width: 85%; max-width: 320px; background: #eee; color: #111; border: 4px solid #000; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 10px 10px 0 var(--pink); }

        /* 绿色电量设计 */
        .battery-container { width: 80px; height: 160px; border: 4px solid #000; margin: 20px auto; position: relative; padding: 3px; background: #fff; }
        .battery-cap { width: 24px; height: 8px; background: #000; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); }
        .battery-level { width: 100%; background: var(--green); position: absolute; bottom: 0; transition: 0.3s; box-shadow: 0 0 15px var(--green); }
        .battery-text { font-size: 1.5rem; font-weight: 900; color: var(--green); text-shadow: 2px 2px 0 #000; margin: 10px 0; }

        /* 玩家头像栏：增加电量显示 */
        .player-bar { height: 100px; padding: 10px; display: flex; gap: 12px; background: #000; border-bottom: 2px solid #222; overflow-x: auto; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; transition: 0.3s; opacity: 0.5; }
        .p-item.active { opacity: 1; transform: scale(1.1); }
        .p-batt-val { font-size: 0.6rem; color: var(--green); font-weight: bold; margin-bottom: 2px; }
        .p-avatar { width: 44px; height: 44px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; }
        .active .p-avatar { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* --- 仪式感卡牌动画 --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 1500px; }
        #focus-board { 
            position: absolute; width: 75%; aspect-ratio: 9 / 16; background: #fff; color: #111; border: 5px solid #000; 
            border-radius: 12px; padding: 25px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5000; box-shadow: 20px 20px 0 rgba(0,0,0,0.5);
            /* 慢速反转入场动画 */
            transform: translateY(100%) rotateX(-180deg) scale(0.5);
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s;
            opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(0) rotateX(0deg) scale(1); opacity: 1; }

        /* 底部操作 */
        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 6px; align-items: center; }
        .ctrl-btn { flex: 1; height: 55px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .ctrl-btn.mic { border-radius: 50%; width: 66px; height: 66px; flex: none; font-size: 1.5rem; color: #fff; }
        .ctrl-btn.gold { border-color: var(--gold); color: var(--gold); }

        /* 登录页 */
        #login-screen { position: fixed; inset: 0; z-index: 50000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .run-btn { width: 100%; padding: 16px; background: var(--pink); border: 3px solid #fff; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="plasma-bg"></div>
    <div style="font-size: 3.5rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px;">SPEAK</div>
    <div style="width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="nick-in" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center;" placeholder="代号">
        <input type="text" id="room-in" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center;" placeholder="房号">
        <button class="run-btn" onclick="init('join')">加入房间</button>
        <button class="run-btn" style="background:var(--purple);" onclick="init('companion')">陪伴师入口</button>
    </div>
</div>

<div id="wait-overlay" class="overlay">
    <div class="modal" style="background:#111; color:var(--gold); border-color:var(--gold);">
        <h3>房间已建立</h3>
        <p style="margin:20px 0; font-size:0.8rem;">等待参与者加入... 当人员齐备后，点击下方开启灵魂审判。</p>
        <button class="run-btn" style="background:var(--gold); color:#000;" onclick="hostStart()">开启审判 (START)</button>
    </div>
</div>

<div id="battery-overlay" class="overlay">
    <div class="modal" style="background:#000; color:#fff; border-color:var(--green);">
        <p>如果现在的精力比做电池...</p>
        <div id="battery-val-display" class="battery-text">50%</div>
        <div class="battery-container">
            <div class="battery-cap"></div>
            <div id="battery-fill" class="battery-level" style="height: 50%;"></div>
        </div>
        <input type="range" min="1" max="100" value="50" oninput="updateBatteryUI(this.value)" style="width:100%; accent-color:var(--green);">
        <button class="run-btn" style="background:var(--green); color:#000; margin-top:20px;" onclick="finishBattery()">确认电量</button>
    </div>
</div>

<div id="guide-bar">>>> 档案室未开启</div>
<div class="player-bar" id="p-bar"></div>
<div class="stage">
    <div id="focus-board">
        <div style="font-size:0.6rem; color:#999; text-transform:uppercase;">[ Private Archive ]</div>
        <div id="q-text"></div>
        <button class="ctrl-btn" style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="closeCard()">回答完毕，关闭档案</button>
    </div>
    <div id="deck" style="display:flex; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="btn-panel">
        <button class="ctrl-btn" onclick="reaction('👍')">点赞</button>
        <button class="ctrl-btn" style="border-color:#444;" onclick="reaction('❌')">反对</button>
        <button class="ctrl-btn mic" onclick="this.classList.toggle('on')">🎙️</button>
        <button class="ctrl-btn gold" onclick="nextTurn()">下一位</button>
    </div>
</div>

<script>
    let players = [], myNick = "", myBatt = "50%", turnIdx = -1, isHost = false, flipped = [];
    const qs = ["你上一次哭是因为什么？", "如果你有一件隐身衣你想去做什么？", "此时此刻最大的焦虑源头是什么？"];

    function init(mode) {
        myNick = document.getElementById('nick-in').value || "ANON";
        isHost = (mode === 'companion');
        document.getElementById('login-screen').style.display = 'none';
        if(isHost) {
            document.getElementById('wait-overlay').style.display = 'flex';
        } else {
            appendChat("系统", "已进入房间，等待陪伴师开启...");
        }
    }

    function hostStart() {
        // 模拟广播全员：进入电量环节
        document.getElementById('wait-overlay').style.display = 'none';
        document.getElementById('battery-overlay').style.display = 'flex';
    }

    function updateBatteryUI(v) {
        myBatt = v + "%";
        document.getElementById('battery-val-display').innerText = myBatt;
        document.getElementById('battery-fill').style.height = v + "%";
    }

    function finishBattery() {
        document.getElementById('battery-overlay').style.display = 'none';
        players = [{nick: myNick, batt: myBatt, isComp: isHost}];
        if(isHost) players.push({nick:'测试人A', batt:'80%', isComp:false});
        turnIdx = 0;
        renderPlayers();
        renderDeck();
        document.getElementById('guide-bar').innerText = ">>> 游戏正式开始";
    }

    function renderPlayers() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item ${i===turnIdx?'active':''}">
                <div class="p-batt-val">${p.batt}</div>
                <div class="p-avatar">${p.isComp?'🧿':'🃏'}</div>
                <div style="font-size:0.5rem; margin-top:4px; color:#888;">${p.nick}</div>
            </div>
        `).join('');
    }

    function renderDeck() {
        let h = "";
        for(let i=0; i<40; i++) h += `<div onclick="draw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:6px; opacity:${flipped.includes(i)?0.1:1}"></div>`;
        document.getElementById('deck').innerHTML = h;
    }

    function draw(i) {
        if(flipped.includes(i)) return;
        flipped.push(i);
        const board = document.getElementById('focus-board');
        document.getElementById('q-text').innerText = qs[Math.floor(Math.random()*qs.length)];
        
        // 仪式感动画开启
        board.style.display = 'flex';
        void board.offsetWidth; // 触发回流
        board.classList.add('show');
        renderDeck();
    }

    function closeCard() {
        const board = document.getElementById('focus-board');
        board.classList.remove('show');
        setTimeout(() => board.style.display = 'none', 1000);
    }

    function nextTurn() {
        closeCard();
        turnIdx = (turnIdx + 1) % players.length;
        renderPlayers();
    }

    function reaction(e) { appendChat("我", `发送评价: ${e}`); }
    function appendChat(n, m) {
        const b = document.getElementById('chat-flow');
        b.innerHTML += `<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
