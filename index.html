<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - BALATRO EDITION</title>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --dark: #000; --fire: #3d1563; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 小丑牌风格登录页 --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 50000; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* 迷幻火焰背景动画 */
            background: radial-gradient(circle at center, #1a0826 0%, #050505 100%);
        }
        
        /* 模拟 Balatro 背景流体感 */
        .plasma-bg {
            position: absolute; inset: 0; z-index: -1; opacity: 0.4;
            background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 10%, #3d1563 20%, #050505 30%);
            background-size: 200% 200%; animation: plasma 20s linear infinite;
        }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        .login-box { text-align: center; z-index: 10; width: 85%; max-width: 320px; }
        
        .balatro-title {
            font-size: 4rem; font-weight: 900; color: #fff; letter-spacing: -5px;
            text-shadow: 4px 4px 0 var(--pink), -2px -2px 0 var(--blue);
            animation: title-float 3s ease-in-out infinite; margin-bottom: 50px;
        }
        @keyframes title-float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-15px) rotate(2deg); } }

        .input-wrap { margin-bottom: 20px; position: relative; }
        .balatro-input {
            width: 100%; padding: 15px; background: #000; border: 3px solid #333;
            color: var(--gold); font-family: inherit; font-size: 1.2rem; text-align: center;
            outline: none; transition: 0.3s;
        }
        .balatro-input:focus { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }

        .run-btn {
            width: 100%; padding: 18px; background: var(--pink); border: 4px solid #fff;
            color: #fff; font-size: 1.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 6px 6px 0 #000; transition: 0.1s; position: relative;
        }
        .run-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0 #000; }
        .run-btn::after { content: '>'; position: absolute; left: 15px; opacity: 0.5; }

        /* 屏幕闪烁特效 */
        .flash { position: fixed; inset: 0; background: #fff; z-index: 60000; display: none; }

        /* --- 游戏主界面 (承袭 V44.8) --- */
        #guide-bar { height: 32px; background: var(--pink); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.75rem; }
        .player-bar { height: 80px; padding: 10px; display: flex; gap: 12px; background: var(--dark); border-bottom: 2px solid #222; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 55px; opacity: 0.4; }
        .p-item.active { opacity: 1; transform: scale(1.1); }
        .p-avatar { width: 40px; height: 40px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.2rem; }
        .active .p-avatar { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        .stage { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; justify-content: center; }
        .deck-scroll { display: flex; gap: 16px; padding: 20px; overflow-x: scroll; scroll-snap-type: x mandatory; }
        .deck-scroll::-webkit-scrollbar { display: none; }
        .poker-card { 
            flex: 0 0 110px; height: 154px; /* 5:7 扑克比例 */
            background: #2a104a; border-radius: 6px; border: 2px solid rgba(255,255,255,0.2); 
            scroll-snap-align: center; transition: 0.3s;
            background-image: repeating-linear-gradient(45deg, #3d1563, #3d1563 8px, #2a104a 8px, #2a104a 16px);
        }
        .poker-card.flipped { opacity: 0.05; pointer-events: none; }

        #focus-board { 
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 88%; 
            background: #fff; color: #111; border: 4px solid #000; padding: 20px; 
            display: none; flex-direction: column; z-index: 3000; box-shadow: 10px 10px 0 #000;
        }

        .footer-console { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #c-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: var(--blue); }
        .input-row { height: 40px; background: #111; display: flex; }
        #c-in { flex: 1; background: transparent; border: none; color: #fff; padding: 0 15px; font-family: inherit; }

        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 6px; align-items: center; }
        .ctrl-btn { flex: 1; height: 55px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.6rem; }
        .ctrl-btn.mic { border-radius: 50%; width: 66px; height: 66px; flex: none; font-size: 1.5rem; color: #fff; }
        .ctrl-btn.mic.on { background: var(--pink); border-color: #fff; box-shadow: 0 0 20px var(--pink); }
    </style>
</head>
<body>

<div class="flash" id="flash"></div>

<div id="login-screen">
    <div class="plasma-bg"></div>
    <div class="login-box">
        <div class="balatro-title">SPEAK</div>
        <div class="input-wrap">
            <input type="text" id="nick-in" class="balatro-input" placeholder="输入玩家代号" autocomplete="off">
        </div>
        <button class="run-btn" onclick="runGame()">RUN GAME</button>
        <p style="margin-top: 20px; font-size: 0.6rem; color: var(--text-dim); letter-spacing: 2px; opacity: 0.5;">VERSION 44.9 - PIXEL SOUL</p>
    </div>
</div>

<div id="guide-bar">>>> 系统就绪</div>
<div class="player-bar" id="p-bar"></div>

<div class="stage">
    <div id="focus-board">
        <div style="font-size:0.5rem; color:#999; text-align:center;">[ ARCHIVE OPEN ]</div>
        <div id="q-text">档案内容...</div>
        <button class="ctrl-btn" style="width:100%; height:40px; margin-top:10px; border-color:var(--gold); color:var(--gold);" onclick="nextTurn()">关闭档案</button>
    </div>
    <div class="deck-scroll" id="deck"></div>
</div>

<div class="footer-console">
    <div id="c-msgs"></div>
    <div class="input-row">
        <input type="text" id="c-in" placeholder="输入吐槽..." onkeypress="if(event.keyCode==13) sendChat()">
    </div>
    <div class="btn-panel">
        <button class="ctrl-btn" onclick="spawnEmoji('👍')">点赞</button>
        <button class="ctrl-btn" style="border-color:#444;" onclick="spawnEmoji('❌')">不同意</button>
        <button id="mic-btn" class="ctrl-btn mic" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);">转移</button>
        <button class="ctrl-btn" onclick="nextTurn()">跳过</button>
    </div>
</div>

<script>
    const questions = ["你觉得这辈子最对不起的人是谁？", "如果你有一件隐身衣你想去做什么？", "明天公司倒闭，你是恐慌还是解脱？", "此时此刻最大的焦虑源头是什么？", "工资减半换准时下班，你换吗？"];
    let players = [], turnIdx = 0, flipped = [], isMicOn = false;

    function runGame() {
        const nick = document.getElementById('nick-in').value || "ANON";
        const flash = document.getElementById('flash');
        flash.style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('login-screen').style.display = 'none';
            flash.style.display = 'none';
            players = [{nick: nick, avatar: '🃏'}, {nick: '玩家B', avatar: '🧿'}, {nick: '玩家C', avatar: '🎭'}];
            renderPlayers();
            renderDeck();
            setGuide("滑动卡池并点击抽牌");
        }, 200);
    }

    function setGuide(txt) { document.getElementById('guide-bar').innerText = `>>> ${txt}`; }

    function renderPlayers() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item ${i===turnIdx?'active':''}">
                <div class="p-avatar">${p.avatar}</div>
                <div style="font-size:0.5rem; margin-top:4px;">${p.nick}</div>
            </div>
        `).join('');
    }

    function renderDeck() {
        let d = document.getElementById('deck'); d.innerHTML = "";
        for(let i=0; i<40; i++) d.innerHTML += `<div class="poker-card ${flipped.includes(i)?'flipped':''}" onclick="draw(${i})"></div>`;
    }

    function draw(i) {
        if(turnIdx !== 0 || flipped.includes(i)) return;
        flipped.push(i);
        document.getElementById('q-text').innerText = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('focus-board').style.display = 'flex';
        renderDeck();
    }

    function toggleMic() {
        isMicOn = !isMicOn;
        document.getElementById('mic-btn').classList.toggle('on', isMicOn);
    }

    function sendChat() {
        let i = document.getElementById('c-in'); if(!i.value) return;
        appendChat("我", i.value); i.value = "";
    }

    function appendChat(n, m) {
        let b = document.getElementById('c-msgs');
        b.innerHTML += `<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    function nextTurn() {
        document.getElementById('focus-board').style.display = 'none';
        turnIdx = (turnIdx + 1) % players.length;
        renderPlayers();
        setGuide(turnIdx === 0 ? "轮到你了" : `等待 ${players[turnIdx].nick}`);
    }

    function spawnEmoji(e) {
        appendChat("我", `发送了 ${e}`);
    }
</script>
</body>
</html>
