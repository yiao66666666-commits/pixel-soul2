<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V47.1</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 首页迷幻底图 --- */
        .plasma-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 登录层 --- */
        #login-screen { position: fixed; inset: 0; z-index: 100000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .balatro-input { padding: 15px; background: #111; border: 2px solid #333; color: var(--gold); text-align: center; font-size: 1rem; border-radius: 4px; }
        
        /* 陪伴师入口微缩到右下角 */
        .companion-link { position: absolute; bottom: 20px; right: 20px; color: var(--purple); font-size: 0.65rem; text-decoration: underline; background: none; cursor: pointer; opacity: 0.8; }
        .history-panel { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 5px; }
        .h-link { font-size: 0.6rem; color: #666; text-decoration: underline; background: none; cursor: pointer; text-align: left; }

        /* --- 游戏主体 --- */
        #main-game { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        #status-bar { height: 36px; background: var(--pink); color: #000; display: flex; align-items: center; padding: 0 15px; font-weight: 900; font-size: 0.75rem; }
        .header-bar { height: 100px; display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #222; }
        #player-area { display: flex; gap: 10px; overflow-x: auto; flex: 1; }
        #companion-area { width: 70px; display: flex; flex-direction: column; align-items: center; border-left: 1px solid #333; padding-left: 10px; }

        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 50px; }
        .p-avatar { width: 40px; height: 40px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.1rem; }
        .is-companion { border-color: var(--purple) !important; box-shadow: 0 0 8px var(--purple) !important; }

        /* --- 档案卡舞台 --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; height: 68vh; aspect-ratio: 9 / 16; background: #fff; color: #111; border: 5px solid #000; border-radius: 12px; padding: 25px;
            display: none; flex-direction: column; align-items: center; justify-content: space-between; z-index: 5001; 
            transform: translateY(100%) rotateX(-180deg); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-5%) rotateX(0deg); opacity: 1; }

        /* --- 弹窗层 --- */
        .overlay { position: fixed; inset: 0; z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .modal { width: 85%; max-width: 320px; background: #eee; color: #111; border: 4px solid #000; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 10px 10px 0 var(--pink); }

        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.75rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 50px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .mic-btn { border-radius: 50%; width: 66px; height: 66px; flex: none; font-size: 1.5rem; color: #fff; border: 3px solid var(--blue); background: #111; }
        .mic-btn.active { background: var(--pink); border-color: #fff; }

        #host-start-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 150000; display: none; padding: 15px 40px; background: var(--gold); color: #000; font-weight: 900; border-radius: 50px; border: 4px solid #fff; box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

<div class="plasma-bg"></div>

<div id="login-screen">
    <div style="font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px;">SPEAK</div>
    <div class="setup-box">
        <input type="text" id="nick-in" class="balatro-input" placeholder="代号">
        <input type="text" id="room-in" class="balatro-input" placeholder="房号">
        <button onclick="entry('join')" style="padding:18px; background:var(--pink); color:#fff; font-weight:900; border:3px solid #fff; cursor:pointer; border-radius:4px;">进入游戏</button>
    </div>
    <div class="history-panel">
        <button class="h-link" onclick="restore('nick')">使用旧代号</button>
        <button class="h-link" onclick="restore('room')">回到房间</button>
    </div>
    <button class="companion-link" onclick="entry('companion')">陪伴师入口</button>
</div>

<div id="audio-overlay" class="overlay"><button onclick="unlockAudio()" style="padding:20px 40px; background:var(--gold); font-weight:900; border:4px solid #fff; border-radius:50px;">同步灵魂频段</button></div>
<div id="rule-overlay" class="overlay">
    <div class="modal">
        <h3>- 游戏规则 -</h3>
        <p style="font-size:0.8rem; margin:15px 0; line-height:1.6;">陪伴师引导，玩家轮流开启档案。<br>确认后即刻开启抽牌环节。</p>
        <button onclick="confirmRules()" style="width:100%; padding:15px; background:var(--pink); color:#fff; font-weight:900;">确认</button>
    </div>
</div>

<div id="main-game">
    <div id="status-bar"><span>ROOM:</span><span id="room-id-val" style="background:#000; color:var(--gold); margin-left:10px; padding:2px 8px;">---</span></div>
    <div class="header-bar">
        <div id="player-area"></div>
        <div id="companion-area"></div>
    </div>
    <div class="stage">
        <div id="card-podium"></div>
        <div id="focus-board">
            <div style="font-size:0.5rem; color:#999;">[ SENSITIVE FILE ]</div>
            <div id="q-text" style="font-size:1.15rem; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center;">档案内容加载中...</div>
            <button class="ctrl-btn" style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="closeCard()">完成回答</button>
        </div>
        <div id="deck" style="display:none; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
    </div>
    <div class="footer">
        <div id="chat-flow"></div>
        <div class="btn-panel">
            <button class="ctrl-btn" onclick="say('👍')">点赞</button>
            <button class="ctrl-btn" style="border-color:#444;" onclick="say('❌')">异议</button>
            <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
            <button class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);">转移</button>
        </div>
    </div>
</div>

<button id="host-start-btn" onclick="hostGo()">[ 开启灵魂审判 ]</button>
<div id="audio-bridge" style="display:none;"></div>

<script>
    const qs = ["你觉得最对不起谁？", "描述一个最恨自己的瞬间。", "如果你有一件隐身衣你想做什么？", "明天消失，你最想坦白的一个真相？"];
    let peer, localStream, myNick, myRoom, isComp=false, players=[], conns=[];

    function restore(t) {
        if(t==='nick') document.getElementById('nick-in').value = localStorage.getItem('sn') || "";
        if(t==='room') document.getElementById('room-in').value = localStorage.getItem('sr') || "";
    }

    function entry(m) {
        myNick = document.getElementById('nick-in').value; myRoom = document.getElementById('room-in').value;
        if(!myNick || !myRoom) return alert("代号和房号必填");
        isComp = (m==='companion'); localStorage.setItem('sn', myNick); localStorage.setItem('sr', myRoom);
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-game').style.display='flex';
        document.getElementById('audio-overlay').style.display='flex';
    }

    async function unlockAudio() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); localStream.getAudioTracks()[0].enabled = false; } catch(e) {}
        document.getElementById('audio-overlay').style.display='none';
        initPeer();
    }

    function initPeer() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        peer.on('open', (id) => {
            document.getElementById('room-id-val').innerText = myRoom;
            if(isComp) {
                players = [{nick:myNick, isComp:true}]; renderUI();
                document.getElementById('host-start-btn').style.display='block';
            } else {
                const c = peer.connect(`SPEAK-${myRoom}`); setupConn(c);
            }
        });
        peer.on('connection', (c) => { conns.push(c); setupConn(c); });
    }

    function setupConn(c) {
        c.on('open', () => c.send({type:'JOIN', nick:myNick}));
        c.on('data', (d) => {
            if(d.type==='JOIN' && isComp) {
                players.push({nick:d.nick, isComp:false});
                sendAll({type:'SYNC', list:players});
            }
            if(d.type==='SYNC') { players=d.list; renderUI(); }
            if(d.type==='START') document.getElementById('rule-overlay').style.display='flex';
            if(d.type==='UNLOCK') {
                document.getElementById('deck').style.display='flex';
                renderDeck();
                appendChat("系统", "审判正式开始，档案室已解锁。");
            }
            if(d.type==='CHAT') appendChat(d.nick, d.msg);
        });
    }

    function sendAll(d) { conns.forEach(c=>c.send(d)); if(!isComp && peer) peer.connect(`SPEAK-${myRoom}`).send(d); }
    
    function hostGo() { 
        document.getElementById('host-start-btn').style.display='none'; 
        sendAll({type:'START'}); 
        document.getElementById('rule-overlay').style.display='flex'; 
    }

    function confirmRules() {
        document.getElementById('rule-overlay').style.display='none';
        if(!isComp) sendAll({type:'READY'}); 
        // 简化逻辑：点确认直接告诉所有人解锁
        sendAll({type:'UNLOCK'});
    }

    function renderUI() {
        const pA = document.getElementById('player-area'); const cA = document.getElementById('companion-area');
        pA.innerHTML = ""; cA.innerHTML = "";
        players.forEach(p => {
            const h = `<div class="p-item"><div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div><div style="font-size:0.5rem;margin-top:4px;color:#888;">${p.nick}</div></div>`;
            if(p.isComp) cA.innerHTML = h; else pA.innerHTML += h;
        });
    }

    function renderDeck() {
        let h=""; for(let i=0; i<40; i++) h+=`<div onclick="draw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:6px; background-image:repeating-linear-gradient(45deg, #3d1563, #3d1563 8px, #2a104a 8px, #2a104a 16px);"></div>`;
        document.getElementById('deck').innerHTML = h;
    }

    function draw(i) {
        if(isComp) return;
        document.getElementById('q-text').innerText = qs[i%qs.length];
        document.getElementById('card-podium').style.display='block';
        const b = document.getElementById('focus-board'); b.style.display='flex'; setTimeout(()=>b.classList.add('show'), 50);
    }

    function closeCard() { 
        document.getElementById('focus-board').classList.remove('show'); 
        setTimeout(()=>{document.getElementById('focus-board').style.display='none';document.getElementById('card-podium').style.display='none';}, 800); 
    }

    function say(m) { appendChat(myNick, m); sendAll({type:'CHAT', nick:myNick, msg:m}); }
    function appendChat(n, m) { const b=document.getElementById('chat-flow'); b.innerHTML+=`<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`; b.scrollTop=b.scrollHeight; }
    function toggleMic() { if(!localStream) return; const a = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('active', a); }
</script>
</body>
</html>
