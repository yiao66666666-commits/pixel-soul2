<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V46.8</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        .plasma-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        #login-screen { position: fixed; inset: 0; z-index: 80000; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .balatro-input { padding: 15px; background: rgba(0,0,0,0.8); border: 2px solid #333; color: var(--gold); text-align: center; font-size: 1rem; }
        .history-panel { position: absolute; bottom: 40px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .h-link { font-size: 0.65rem; color: #888; text-decoration: underline; background: none; cursor: pointer; text-align: left; }

        .overlay { position: fixed; inset: 0; z-index: 70000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .modal { width: 85%; max-width: 320px; background: #eee; color: #111; border: 4px solid #000; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 10px 10px 0 var(--pink); }
        .battery-container { width: 80px; height: 150px; border: 4px solid #000; margin: 20px auto; position: relative; padding: 3px; background: #fff; }
        .battery-level { width: 100%; background: var(--green); position: absolute; bottom: 0; transition: 0.3s; box-shadow: 0 0 15px var(--green); }

        .header-bar { height: 110px; display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #222; z-index: 10; }
        #player-area { display: flex; gap: 10px; overflow-x: auto; flex: 1; }
        #companion-area { width: 80px; display: flex; flex-direction: column; align-items: center; border-left: 1px solid #333; padding-left: 10px; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 55px; }
        .p-avatar { width: 42px; height: 42px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.2rem; }
        .active .p-avatar { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .is-companion { border-color: var(--purple) !important; box-shadow: 0 0 10px var(--purple) !important; }

        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; height: 68vh; aspect-ratio: 9 / 16; background: #fff; color: #111; border: 5px solid #000; border-radius: 12px;
            padding: 25px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.6);
            transform: translateY(100%) rotateX(-180deg); transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s; opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-5%) rotateX(0deg); opacity: 1; }

        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.75rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 50px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .mic-btn { border-radius: 50%; width: 66px; height: 66px; flex: none; font-size: 1.5rem; color: #fff; border: 3px solid var(--blue); background: #111; }
        .mic-btn.active { background: var(--pink); border-color: #fff; box-shadow: 0 0 15px var(--pink); }

        #host-launch-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 10000; display: none; padding: 15px 35px; background: var(--gold); color: #000; font-weight: 900; border-radius: 50px; border: 4px solid #fff; box-shadow: 0 0 20px var(--gold); cursor: pointer; }

        .run-btn { padding: 18px; background: var(--pink); border: 3px solid #fff; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="plasma-bg"></div>

<div id="login-screen">
    <div style="font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px;">SPEAK</div>
    <div class="setup-box">
        <input type="text" id="nick-in" class="balatro-input" placeholder="代号">
        <input type="text" id="room-in" class="balatro-input" placeholder="房号">
        <button class="run-btn" onclick="preStart('join')">加入游戏</button>
        <button class="run-btn" style="background:var(--purple);" onclick="preStart('companion')">陪伴师入口</button>
    </div>
    <div class="history-panel">
        <button class="h-link" onclick="restore('nick')">使用旧名</button>
        <button class="h-link" onclick="restore('room')">回到房间</button>
    </div>
</div>

<div id="audio-overlay" class="overlay"><button class="run-btn" style="background:var(--gold); color:#000;" onclick="unlockAll()">同步灵魂频段</button></div>

<div id="rule-overlay" class="overlay">
    <div class="modal">
        <h3>- 游戏规则 -</h3>
        <p style="font-size:0.8rem; margin:20px 0;">陪伴师引导，玩家轮流开启档案。</p>
        <button class="run-btn" style="width:100%;" onclick="openBatt()">确认并继续</button>
    </div>
</div>

<div id="batt-overlay" class="overlay">
    <div class="modal" style="background:#000; color:#fff; border-color:var(--green);">
        <p>当前电量？</p>
        <div id="batt-text" style="font-size:2rem; color:var(--green); font-weight:900;">50%</div>
        <div class="battery-container"><div id="batt-fill" class="battery-level" style="height:50%;"></div></div>
        <input type="range" min="1" max="100" value="50" oninput="updateBattUI(this.value)" style="width:100%; accent-color:var(--green);">
        <button class="run-btn" style="background:var(--green); color:#000; width:100%; margin-top:15px;" onclick="confirmBatt()">确认状态</button>
    </div>
</div>

<div id="wait-overlay" class="overlay">
    <div class="modal" style="background:#000; color:var(--gold);"><h2>等待全员标注电量...</h2></div>
</div>

<button id="host-launch-btn" onclick="hostCmd('GO_RULES')">[ 开启灵魂审判 ]</button>

<div class="header-bar">
    <div id="player-area"></div>
    <div id="companion-area"></div>
</div>

<div class="stage">
    <div id="card-podium"></div>
    <div id="focus-board">
        <div style="font-size:0.5rem; color:#999;">[ SENSITIVE FILE ]</div>
        <div id="q-text" style="font-size:1.15rem; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center;"></div>
        <button class="ctrl-btn" style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="userCmd('CLOSE')">回答完毕</button>
    </div>
    <div id="deck" style="display:none; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="btn-panel">
        <button id="like-btn" class="ctrl-btn" disabled onclick="reaction('👍')">点赞</button>
        <button id="no-btn" class="ctrl-btn" style="border-color:#444;" disabled onclick="reaction('❌')">异议</button>
        <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
        <button id="trans-btn" class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);" disabled>转移</button>
    </div>
</div>

<div id="audio-bridge" style="display:none;"></div>

<script>
    const qs = ["你最对不起谁？", "描述一个最恨自己的瞬间。", "此时此刻最大的焦虑？", "如果明天消失，最想坦白什么？"];
    let peer, localStream, myNick, myRoom, isComp=false, players=[], conns=[], curSpeaker=null, handledIds=new Set();

    function restore(t) { 
        if(t==='nick') document.getElementById('nick-in').value = localStorage.getItem('s_n') || "";
        if(t==='room') document.getElementById('room-in').value = localStorage.getItem('s_r') || "";
    }

    function preStart(m) {
        myNick = document.getElementById('nick-in').value; myRoom = document.getElementById('room-in').value;
        if(!myNick || !myRoom) return alert("代号和房号必填");
        isComp = (m==='companion'); localStorage.setItem('s_n', myNick); localStorage.setItem('s_r', myRoom);
        document.getElementById('login-screen').style.display='none';
        document.getElementById('audio-overlay').style.display='flex';
    }

    async function unlockAll() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); localStream.getAudioTracks()[0].enabled = false; } catch(e) {}
        document.getElementById('audio-overlay').style.display='none';
        initNetwork();
    }

    function initNetwork() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        peer.on('open', (id) => {
            if(isComp) {
                players = [{nick:myNick, isComp:true, batt:'-', peerId: id}]; renderUI();
                document.getElementById('host-launch-btn').style.display='block';
            } else {
                const c = peer.connect(`SPEAK-${myRoom}`); setupConn(c);
            }
        });
        peer.on('connection', (c) => { conns.push(c); setupConn(c); });
        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (s) => {
                const a=document.createElement('audio'); a.srcObject=s; a.autoplay=true; document.getElementById('audio-bridge').appendChild(a);
            });
        });
    }

    function setupConn(c) {
        c.on('open', () => c.send({type:'JOIN', nick:myNick, peerId: peer.id}));
        c.on('data', (d) => {
            if(d.type==='JOIN' && isComp) {
                if(!players.find(p=>p.peerId===d.peerId)) {
                    players.push({nick:d.nick, isComp:false, batt:'', peerId: d.peerId});
                    sendAll({type:'SYNC', list:players, allIds: players.map(p=>p.peerId)});
                    appendChat("系统", d.nick+"进入房间");
                }
            }
            if(d.type==='SYNC') { 
                players=d.list; renderUI(); 
                d.allIds.forEach(id => {
                    if(id !== peer.id && !handledIds.has(id)) {
                        peer.call(id, localStream);
                        handledIds.add(id);
                    }
                });
            }
            if(d.type==='GO_RULES') document.getElementById('rule-overlay').style.display='flex';
            if(d.type==='BATT_DONE') {
                const target = players.find(p=>p.nick===d.nick);
                if(target) target.batt=d.val; 
                renderUI();
                // 房主逻辑：只检查普通玩家（非陪伴师）是否填完
                if(isComp) {
                    const ready = players.filter(p=>!p.isComp).every(p=>p.batt !== '');
                    if(ready && players.length > 1) sendAll({type:'ALL_READY'});
                }
            }
            if(d.type==='ALL_READY') {
                document.getElementById('wait-overlay').style.display='none';
                document.getElementById('deck').style.display='flex';
                renderDeck();
                appendChat("系统", "全员电量同步完成，审判开启。");
            }
            if(d.type==='DRAW') { showArchive(d.idx); curSpeaker = d.nick; syncState(); }
            if(d.type==='CLOSE') hideArchive();
            if(d.type==='CHAT') appendChat(d.nick, d.msg);
        });
    }

    function sendAll(d) { conns.forEach(c=>c.send(d)); if(!isComp) peer.connect(`SPEAK-${myRoom}`).send(d); }
    function hostCmd(type) { if(isComp) sendAll({type}); if(type==='GO_RULES') document.getElementById('rule-overlay').style.display='flex'; document.getElementById('host-launch-btn').style.display='none'; }
    function updateBattUI(v) { document.getElementById('batt-text').innerText=v+'%'; document.getElementById('batt-fill').style.height=v+'%'; }
    function openBatt() { document.getElementById('rule-overlay').style.display='none'; document.getElementById('batt-overlay').style.display='flex'; }
    function confirmBatt() {
        document.getElementById('batt-overlay').style.display='none';
        if(!isComp) {
            document.getElementById('wait-overlay').style.display='flex';
            sendAll({type:'BATT_DONE', nick:myNick, val:document.getElementById('batt-text').innerText});
        } else { players[0].batt = '-'; renderUI(); }
    }

    function renderUI() {
        const pA = document.getElementById('player-area'); const cA = document.getElementById('companion-area');
        pAreaHtml = ""; cAreaHtml = "";
        players.forEach(p => {
            const h = `<div class="p-item ${p.nick===curSpeaker?'active':''}">
                <div class="p-batt-val">${p.batt}</div>
                <div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div>
                <div style="font-size:0.5rem; margin-top:4px;">${p.nick}</div>
            </div>`;
            if(p.isComp) cAreaHtml = h; else pAreaHtml += h;
        });
        pA.innerHTML = pAreaHtml; cA.innerHTML = cAreaHtml;
    }

    function syncState() {
        const isMe = (myNick === curSpeaker);
        document.getElementById('like-btn').disabled = isMe;
        document.getElementById('no-btn').disabled = isMe;
        document.getElementById('trans-btn').disabled = !isMe;
        renderUI();
    }

    function drawCard(idx) {
        if(isComp || (curSpeaker && curSpeaker !== myNick)) return;
        sendAll({type:'DRAW', idx, nick:myNick}); showArchive(idx);
    }

    function showArchive(idx) {
        document.getElementById('q-text').innerText = qs[idx % qs.length];
        document.getElementById('card-podium').style.display='block';
        const b = document.getElementById('focus-board');
        b.style.display='flex'; setTimeout(()=>b.classList.add('show'), 50);
    }

    function userCmd(t) { if(t==='CLOSE') { hideArchive(); sendAll({type:'CLOSE'}); } }
    function hideArchive() { 
        const b=document.getElementById('focus-board'); b.classList.remove('show'); 
        setTimeout(()=>{b.style.display='none'; document.getElementById('card-podium').style.display='none';}, 800); 
    }

    function toggleMic() { if(!localStream) return; const a = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('active', a); }

    function reaction(e) { 
        appendChat(myNick, e); sendAll({type:'CHAT', nick:myNick, msg:e}); 
        for(let i=0; i<8; i++) {
            const p=document.createElement('div'); p.className='particle'; p.innerText=e; p.style.left='50%'; p.style.top='40%';
            p.style.setProperty('--dx',(Math.random()*400-200)+'px'); p.style.setProperty('--dy',(Math.random()*-400-100)+'px');
            document.body.appendChild(p); setTimeout(()=>p.remove(), 800);
        }
    }

    function appendChat(n, m) { const b=document.getElementById('chat-flow'); b.innerHTML+=`<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`; b.scrollTop=b.scrollHeight; }

    function renderDeck() {
        let deckHtml=""; for(let i=0; i<40; i++) deckHtml+=`<div onclick="drawCard(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:6px; background-image:repeating-linear-gradient(45deg, #3d1563, #3d1563 8px, #2a104a 8px, #2a104a 16px);"></div>`;
        document.getElementById('deck').innerHTML = deckHtml;
    }
</script>
</body>
</html>
