<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V47.5</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
        
        /* --- 核心：确保背景永远可见 --- */
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .plasma-bg { 
            position: fixed; inset: 0; z-index: -1; opacity: 0.5; 
            background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); 
            background-size: 200% 200%; animation: plasma 15s linear infinite; 
        }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 1. 登录层：改为半透明，露出底图 --- */
        #login-screen { position: fixed; inset: 0; z-index: 100000; background: rgba(5,5,5,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .pixel-input { padding: 15px; background: rgba(0,0,0,0.8); border: 3px solid #333; color: var(--gold); text-align: center; font-size: 1.1rem; box-shadow: 4px 4px 0 #000; }
        
        .history-panel { position: absolute; bottom: 30px; left: 20px; display: flex; flex-direction: column; gap: 8px; }
        .h-link { font-size: 0.7rem; color: #aaa; text-decoration: underline; background: none; cursor: pointer; text-align: left; }
        .companion-link { position: absolute; bottom: 30px; right: 30px; color: var(--purple); font-size: 0.7rem; text-decoration: underline; background: none; cursor: pointer; }

        /* --- 2. 游戏舞台与 13:16 像素卡牌 --- */
        #main-game { display: none; flex-direction: column; height: 100vh; width: 100vw; background: transparent; }
        
        .header-bar { height: 100px; display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.6); border-bottom: 2px solid #222; }
        #player-area { display: flex; gap: 10px; overflow-x: auto; flex: 1; }
        #companion-area { width: 80px; display: flex; flex-direction: column; align-items: center; border-left: 1px solid #333; padding-left: 10px; }
        
        .p-avatar { width: 44px; height: 44px; border: 3px solid #333; background: #111; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 8px; }
        .active .p-avatar { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.1); }
        .is-companion { border-color: var(--purple) !important; box-shadow: 0 0 10px var(--purple); }

        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        
        #focus-board { 
            position: absolute; width: 80%; aspect-ratio: 13 / 16; 
            background: #fff; color: #111; border: 6px solid #000; border-radius: 24px; 
            padding: 30px 20px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.5);
            transform: translateY(100%) rotateX(-180deg); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-3%) rotateX(0deg); opacity: 1; }

        /* --- 3. 像素按钮 --- */
        .pixel-btn { padding: 12px 24px; background: #000; color: #fff; border: 3px solid #444; box-shadow: 4px 4px 0 #000; font-weight: 900; font-size: 0.95rem; cursor: pointer; }
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
        
        .footer { height: 260px; background: rgba(0,0,0,0.9); border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.75rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 10px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 50px; border: 3px solid var(--blue); background: #000; color: var(--blue); font-weight: bold; font-size: 0.8rem; border-radius: 4px; }
        .ctrl-btn:disabled { opacity: 0.2; }
        
        .mic-btn { border-radius: 50%; width: 66px; height: 66px; flex: none; font-size: 1.6rem; color: #fff; border: 4px solid var(--blue); background: #000; }
        .mic-btn.active { background: var(--pink); border-color: #fff; box-shadow: 0 0 15px var(--pink); }

        /* --- 4. 覆盖层 --- */
        .overlay { position: fixed; inset: 0; z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); }
        #host-start-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 150000; display: none; background: var(--gold); color: #000; padding: 16px 40px; border-radius: 50px; font-weight: 900; border: 4px solid #fff; box-shadow: 0 0 30px var(--gold); }
    </style>
</head>
<body>

<div class="plasma-bg"></div>

<div id="login-screen">
    <div style="font-size: 4.5rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px; letter-spacing: -3px;">SPEAK</div>
    <div class="setup-box">
        <input type="text" id="nick-in" class="pixel-input" placeholder="代号">
        <input type="text" id="room-in" class="pixel-input" placeholder="房号">
        <button class="pixel-btn" style="background:var(--pink);" onclick="entry('join')">进入游戏</button>
    </div>
    <div class="history-panel">
        <button class="h-link" onclick="restore('nick')">使用旧代号</button>
        <button class="h-link" onclick="restore('room')">回到房间</button>
    </div>
    <button class="companion-link" onclick="entry('companion')">陪伴师入口</button>
</div>

<div id="audio-overlay" class="overlay"><button class="pixel-btn" style="background:var(--gold); color:#000; padding:20px 40px;" onclick="unlockAudio()">同步灵魂频段</button></div>
<div id="rule-overlay" class="overlay">
    <div style="background:#eee; color:#111; padding:30px; border-radius:12px; border:4px solid #000; text-align:center; width:85%; max-width:320px;">
        <h3 style="margin-bottom:15px;">- 游戏规则 -</h3>
        <p style="font-size:0.9rem; line-height:1.6; margin-bottom:20px;">陪伴师引导全场。<br>档案卡开启时，全员实时同步。<br>确认即刻连接频段。</p>
        <button class="pixel-btn" style="background:var(--pink); width:100%;" onclick="confirmRules()">确认</button>
    </div>
</div>

<div id="main-game">
    <div style="height:36px; background:var(--pink); color:#000; display:flex; align-items:center; padding:0 15px; font-weight:900; font-size:0.8rem;">
        <span>ROOM:</span><span id="room-id-val" style="margin-left:10px; background:#000; color:var(--gold); padding:2px 8px;">---</span>
        <span id="lock-tag" style="margin-left:auto; display:none;">🔒 已锁定</span>
    </div>
    <div class="header-bar">
        <div id="player-area"></div>
        <div id="companion-area"></div>
    </div>
    <div class="stage">
        <div id="card-podium"></div>
        <div id="focus-board">
            <div style="font-size:0.6rem; color:#999; letter-spacing:2px;">[ SENSITIVE FILE ]</div>
            <div id="q-text" style="font-size:1.4rem; font-weight:bold; text-align:center; padding:20px;">读取中...</div>
            <button class="pixel-btn" style="background:#111; color:var(--gold); border:2px solid var(--gold);" onclick="userCmd('CLOSE')">完成回答</button>
        </div>
        <div id="deck" style="display:none; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
    </div>
    <div class="footer">
        <div id="chat-flow"></div>
        <div class="btn-panel">
            <button id="btn-like" class="ctrl-btn" disabled onclick="actionReact('👍')">点赞</button>
            <button id="btn-dis" class="ctrl-btn" disabled onclick="actionReact('❌')">异议</button>
            <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
            <button id="btn-trans" class="ctrl-btn" disabled style="border-color:var(--pink); color:var(--pink);">转移</button>
        </div>
    </div>
</div>

<button id="host-start-btn" onclick="hostGo()">[ 开启灵魂审判 ]</button>
<div id="audio-bridge" style="display:none;"></div>

<script>
    const qs = ["你最对不起的人是谁？", "描述一个你最恨自己的瞬间。", "如果你有一件隐身衣...", "明天消失你最想坦白什么？"];
    let peer, localStream, myNick, myRoom, isComp=false, players=[], conns=[], curSpeaker=null, handledIds=new Set(), isLocked=false;

    function restore(t) {
        if(t==='nick') document.getElementById('nick-in').value = localStorage.getItem('sn') || "";
        if(t==='room') document.getElementById('room-in').value = localStorage.getItem('sr') || "";
    }

    function entry(m) {
        myNick = document.getElementById('nick-in').value; myRoom = document.getElementById('room-in').value;
        if(!myNick || !myRoom) return alert("代号和房号必填");
        isComp = (m==='companion'); localStorage.setItem('sn', myNick); localStorage.setItem('sr', myRoom);
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-game').style.display='flex';
        document.getElementById('audio-overlay').style.display='flex';
    }

    async function unlockAudio() {
        try { 
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
            localStream.getAudioTracks()[0].enabled = false; 
        } catch(e) { console.log("Voice blocked"); }
        document.getElementById('audio-overlay').style.display='none';
        initNetwork();
    }

    function initNetwork() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        peer.on('open', (id) => {
            document.getElementById('room-id-val').innerText = myRoom;
            if(isComp) {
                players = [{nick:myNick, isComp:true, peerId: id}]; renderUI();
                document.getElementById('host-start-btn').style.display='block';
            } else {
                const c = peer.connect(`SPEAK-${myRoom}`, {metadata: {nick: myNick}}); setupConn(c);
            }
        });
        peer.on('connection', (c) => { 
            if(isComp && isLocked && !players.find(p=>p.nick===c.metadata.nick)) {
                setTimeout(()=> c.send({type:'REJECT'}), 500); return;
            }
            conns.push(c); setupConn(c); 
        });
        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (s) => {
                const a = document.createElement('audio'); a.srcObject = s; a.autoplay = true;
                document.getElementById('audio-bridge').appendChild(a);
            });
        });
    }

    function setupConn(c) {
        c.on('open', () => c.send({type:'JOIN', nick:myNick, peerId: peer.id}));
        c.on('data', (d) => {
            if(d.type==='REJECT') { alert("审判已开始，新玩家无法加入。"); window.location.reload(); }
            if(d.type==='JOIN' && isComp) {
                if(!players.find(p=>p.peerId===d.peerId)) players.push({nick:d.nick, isComp:false, peerId: d.peerId});
                sendAll({type:'SYNC', list:players, allIds: players.map(p=>p.peerId), locked: isLocked});
            }
            if(d.type==='SYNC') { 
                players=d.list; isLocked=d.locked; renderUI();
                if(isLocked) document.getElementById('lock-tag').style.display='inline';
                d.allIds.forEach(id => {
                    if(id !== peer.id && !handledIds.has(id)) { peer.call(id, localStream); handledIds.add(id); }
                });
            }
            if(d.type==='START_SIG') document.getElementById('rule-overlay').style.display='flex';
            if(d.type==='UNLOCK') { document.getElementById('deck').style.display='flex'; renderDeck(); isLocked=true; document.getElementById('lock-tag').style.display='inline'; }
            if(d.type==='DRAW') { curSpeaker = d.nick; showCard(d.idx); }
            if(d.type==='CLOSE') hideCard();
            if(d.type==='CHAT') { appendChat(d.nick, d.msg); }
        });
    }

    function sendAll(d) { conns.forEach(c=>c.send(d)); if(!isComp && peer) peer.connect(`SPEAK-${myRoom}`).send(d); }
    function hostGo() { document.getElementById('host-start-btn').style.display='none'; sendAll({type:'START_SIG'}); document.getElementById('rule-overlay').style.display='flex'; }
    function confirmRules() { document.getElementById('rule-overlay').style.display='none'; sendAll({type:'UNLOCK'}); }

    function renderUI() {
        const pA = document.getElementById('player-area'); const cA = document.getElementById('companion-area');
        pA.innerHTML = ""; cA.innerHTML = "";
        players.forEach(p => {
            const h = `<div class="p-item ${p.nick===curSpeaker?'active':''}">
                <div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div>
                <div style="font-size:0.55rem;margin-top:5px;color:#999;">${p.nick}</div>
            </div>`;
            if(p.isComp) cA.innerHTML = h; else pA.innerHTML += h;
        });
    }

    function renderDeck() {
        let h=""; for(let i=0; i<40; i++) h+=`<div onclick="handleDraw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:10px; background-image:repeating-linear-gradient(45deg, #3d1563, #3d1563 8px, #2a104a 8px, #2a104a 16px);"></div>`;
        document.getElementById('deck').innerHTML = h;
    }

    function handleDraw(i) {
        if(isComp || (curSpeaker && curSpeaker !== myNick)) return;
        curSpeaker = myNick; sendAll({type:'DRAW', idx:i, nick:myNick}); showCard(i);
    }

    function showCard(i) {
        document.getElementById('q-text').innerText = qs[i%qs.length];
        document.getElementById('card-podium').style.display='block';
        const b = document.getElementById('focus-board'); b.style.display='flex'; setTimeout(()=>b.classList.add('show'), 50);
        const isMe = (myNick === curSpeaker);
        document.getElementById('btn-like').disabled = isMe;
        document.getElementById('btn-dis').disabled = isMe;
        renderUI();
    }

    function userCmd(t) { if(t==='CLOSE') { hideCard(); sendAll({type:'CLOSE'}); curSpeaker = null; renderUI(); } }
    function hideCard() { document.getElementById('focus-board').classList.remove('show'); setTimeout(()=>{document.getElementById('focus-board').style.display='none';document.getElementById('card-podium').style.display='none';}, 800); }
    function actionReact(e) { appendChat(myNick, e); sendAll({type:'CHAT', nick:myNick, msg:e}); }
    function appendChat(n, m) { const b=document.getElementById('chat-flow'); b.innerHTML+=`<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`; b.scrollTop=b.scrollHeight; }
    function toggleMic() { if(!localStream) return; const a = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('active', a); }
</script>
</body>
</html>
