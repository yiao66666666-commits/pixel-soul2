<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXEL SOUL V31</title>
    <script src="https://lib.baomitu.com/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        :root { --bg: #1a0826; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; }
        * { image-rendering: pixelated; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: "Courier New", monospace;
            margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
        }
        .status-bar { height: 25px; background: #000; border-bottom: 2px solid var(--pink); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 0.6rem; color: var(--gold); z-index: 1001; }
        .player-bar { height: 70px; padding: 10px; display: flex; gap: 10px; overflow-x: auto; background: rgba(0,0,0,0.5); z-index: 1001; }
        .p-avatar { width: 40px; height: 40px; border: 3px solid #444; border-radius: 8px; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #000; }
        .p-avatar.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.1); }
        .p-avatar.speaking::after { content: "🎙️"; position: absolute; top: -10px; right: -10px; font-size: 0.8rem; }
        .p-avatar .name { position: absolute; bottom: -16px; font-size: 0.5rem; color: #777; width: 50px; text-align: center; }

        .main-deck { flex: 1; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; overflow-y: auto; align-content: start; z-index: 10; }
        .card { aspect-ratio: 2/3; background: #4d1b7b; border-radius: 10px; border: 3px solid rgba(255,255,255,0.2); cursor: pointer; position: relative; background-image: repeating-conic-gradient(#5e2a7e 0 25%, #4d1b7b 0 50%); background-size: 10px 10px; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0 #000; }
        .card::after { content: "?"; font-size: 1.8rem; color: rgba(255,255,255,0.1); font-weight: bold; }
        .card.flipped { opacity: 0.1; filter: grayscale(1); pointer-events: none; }

        /* 灵魂档案弹出层：高度物理隔离 */
        #focused-overlay { position: fixed; top: 95px; left: 0; right: 0; height: 350px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; pointer-events: none; }
        .focused-card { width: 85%; max-width: 290px; min-height: 300px; background: #fff; color: #1a1a2e; border-radius: 18px; border: 6px solid #1a1a2e; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; pointer-events: auto; transform: rotate(-1deg); box-shadow: 10px 10px 0px rgba(0,0,0,0.6); }

        /* 聊天与控制：最高优先级 10000 */
        .chat-panel { height: 110px; background: rgba(0,0,0,0.98); border-top: 3px solid var(--pink); display: flex; flex-direction: column; z-index: 10000; position: relative; }
        #c-msgs { flex: 1; overflow-y: auto; padding: 5px; font-size: 0.75rem; color: var(--blue); }
        .bottom-console { height: 80px; background: #000; border-top: 2px solid var(--blue); display: flex; padding: 10px; gap: 8px; z-index: 10000; position: relative; }

        .p-btn { background: #111; color: var(--blue); border: 3px solid var(--blue); border-radius: 8px; font-family: inherit; font-weight: bold; font-size: 0.7rem; box-shadow: 3px 3px 0px #000; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; }
        .p-btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .p-btn.gold { color: var(--gold); border-color: var(--gold); }
        .p-btn.pink { color: var(--pink); border-color: var(--pink); }
        .p-btn.active { background: var(--green); color: #000; border-color: #fff; }
        .p-btn:disabled { opacity: 0.15; }

        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        #v-gate { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 21000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="setup">

    <input type="text" id="nick-in" placeholder="NICKNAME..." style="padding:12px; border:4px solid var(--blue); background:#000; color:#fff; width:250px; margin-bottom:15px; font-family: inherit; text-align: center;">
    <div style="display: flex; gap: 10px;"><button class="p-btn pink" style="padding:15px" onclick="startApp(true)">创 建</button><button class="p-btn" style="padding:15px" onclick="startApp(false)">加 入</button></div>

<div id="v-gate">
    <h2 style="color:var(--gold); font-size: 1.5rem;">全员语音网格已就绪</h2>
    <p style="color:#888; margin-bottom:30px; font-size: 0.75rem;">[ 移动端请务必点击下方按钮 ]</p>
    <button class="p-btn gold" style="max-width:220px; padding:20px; font-size:1rem;" onclick="activateVoice()">进入灵魂对讲</button>
</div>

<div class="status-bar">
    <span>ROOM: <b id="room-text">----</b></span>
    <span id="player-count">ONLINE: 1</span>
</div>

<div class="player-bar" id="p-bar"></div>
<div class="main-deck" id="deck"></div>

<div id="focused-overlay">
    <div class="focused-card" id="f-card">
        <div style="color:var(--pink); font-weight: 900; font-size: 0.7rem;">[ SOUL FILE ]</div>

        <div id="thumb-box" style="display:flex; gap:6px; font-size:1.5rem;"></div>
        <button id="f-btn" class="p-btn gold" style="width:100%; height:45px; flex:none;" disabled onclick="confirmEnd()">等待点赞</button>
    </div>
</div>

<div class="chat-panel">
    <div id="c-msgs"></div>
    <div style="padding:5px; border-top:1px solid #333;"><input type="text" id="c-in" placeholder="吐槽..." style="width:100%; background:#000; border:2px solid var(--blue); color:var(--blue); padding:8px; font-family:inherit;" onkeypress="if(event.keyCode==13) sendChat()"></div>
</div>

<div class="bottom-console">
    <button id="mic-btn" class="p-btn" style="border-color:var(--green); color:var(--green);" onclick="toggleMic()" disabled>麦克风:关</button>
    <button id="like-btn" class="p-btn gold" style="flex:1.5;" onclick="handleLike()" disabled>👍 点赞</button>
    <button id="trans-btn" class="p-btn pink" onclick="openTrans()" disabled>转移</button>
</div>

<div id="audio-pool" style="display:none;"></div>

<div id="trans-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:20000; flex-direction:column; align-items:center; justify-content:center;">
    <div style="background:#2b0b3d; border:4px solid var(--pink); border-radius:12px; padding:25px; width:260px; text-align:center;">
        <p style="color:var(--pink); font-weight: bold; margin-bottom: 15px;">你要转移给谁？</p>
        <div id="trans-targets" style="display:flex; flex-direction:column; gap:10px;"></div>
        <button class="p-btn" style="margin-top:15px; width:100%; border-color:#666; color:#666;" onclick="closeTrans()">取消</button>
    </div>
</div>
