<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - V46.4 完全体</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; border: none; outline: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 1. 首页与底图 --- */
        #login-screen { position: fixed; inset: 0; z-index: 50000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .plasma-bg { position: absolute; inset: 0; z-index: -1; opacity: 0.4; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 2. 弹窗与引导层 (规则、电量、语音解锁) --- */
        .overlay { position: fixed; inset: 0; z-index: 60000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); background: rgba(0,0,0,0.9); }
        .modal { width: 85%; max-width: 320px; background: #eee; color: #111; border: 4px solid #000; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 10px 10px 0 var(--pink); }
        
        /* 绿色电量计 */
        .battery-container { width: 80px; height: 160px; border: 4px solid #000; margin: 20px auto; position: relative; padding: 3px; background: #fff; }
        .battery-level { width: 100%; background: var(--green); position: absolute; bottom: 0; transition: 0.3s; box-shadow: 0 0 15px var(--green); }

        /* 大转盘动画 */
        .wheel { width: 160px; height: 160px; border: 6px solid #000; border-radius: 50%; animation: spin 1s linear infinite; position: relative; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- 3. 顶部状态栏 --- */
        #status-bar { height: 36px; background: var(--pink); color: #000; display: flex; align-items: center; padding: 0 15px; font-weight: 900; font-size: 0.75rem; gap: 8px; z-index: 10000; }
        .room-tag { background: #000; color: var(--gold); padding: 2px 8px; border-radius: 4px; }

        /* --- 4. 玩家头像栏 --- */
        .player-bar { height: 110px; padding: 10px; display: flex; gap: 12px; background: rgba(0,0,0,0.9); border-bottom: 2px solid #222; overflow-x: auto; flex-shrink: 0; }
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 65px; transition: 0.3s; opacity: 0.4; }
        .p-item.online { opacity: 1; }
        .p-avatar { width: 44px; height: 44px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #111; font-size: 1.2rem; position: relative; }
        .p-item.active .p-avatar { border-color: var(--gold); box-shadow: 0 0 12px var(--gold); transform: scale(1.1); }
        .p-avatar.is-companion { border-color: var(--purple); }
        .p-batt-val { font-size: 0.6rem; color: var(--green); font-weight: bold; margin-bottom: 3px; height: 12px; }

        /* --- 5. 仪式感舞台 --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; width: auto; height: 68vh; aspect-ratio: 9 / 16; 
            background: #fff; color: #111; border: 5px solid #000; border-radius: 12px; 
            padding: 25px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.6);
            transform: translateY(100%) rotateX(-180deg);
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s; opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(-5%) rotateX(0deg); opacity: 1; }

        /* --- 6. 底部控制中心 --- */
        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.75rem; color: var(--blue); background: rgba(0,0,0,0.4); }
        .btn-panel { height: 90px; display: flex; padding: 8px; gap: 8px; align-items: center; }
        .ctrl-btn { flex: 1; height: 55px; background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 8px; font-weight: bold; font-size: 0.7rem; }
        .mic-btn { border-radius: 50%; width: 70px; height: 70px; flex: none; font-size: 1.8rem; color: #fff; border: 3px solid var(--blue); background: #111; }
        .mic-btn.on { background: var(--pink); border-color: #fff; box-shadow: 0 0 15px var(--pink); }

        /* 房主发令枪 */
        #host-start-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 10000; display: none; padding: 15px 40px; background: var(--gold); color: #000; font-weight: 900; border-radius: 50px; border: 4px solid #fff; box-shadow: 0 0 30px var(--gold); cursor: pointer; }

        /* 点赞动画粒子 */
        .particle { position: fixed; pointer-events: none; animation: fly 0.8s forwards; z-index: 70000; font-size: 2rem; }
        @keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="plasma-bg"></div>
    <div style="font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px;">SPEAK</div>
    <div style="width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="nick-in" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center; font-size:1.1rem;" placeholder="代号">
        <input type="text" id="room-in" maxlength="6" style="padding:15px; background:#000; border:2px solid #333; color:var(--gold); text-align:center; font-size:1.1rem;" placeholder="6位房号">
        <button onclick="preConnect('join')" style="padding:18px; background:var(--pink); color:#fff; font-weight:900; border:3px solid #fff; cursor:pointer;">加入房间</button>
        <button onclick="preConnect('companion')" style="padding:18px; background:var(--purple); color:#fff; font-weight:900; border:3px solid #fff; cursor:pointer; margin-top:10px;">陪伴师入口</button>
    </div>
    <div style="position:absolute; bottom:30px; left:20px; display:flex; flex-direction:column; gap:10px;">
        <button class="h-link" onclick="restore('nick')" style="color:#666; font-size:0.6rem; text-decoration:underline; background:none;">使用旧名</button>
        <button class="h-link" onclick="restore('room')" style="color:#666; font-size:0.6rem; text-decoration:underline; background:none;">回到房间</button>
    </div>
</div>

<div id="sync-overlay" class="overlay" style="z-index:70000;">
    <button onclick="unlockAudio()" style="padding:20px 40px; background:var(--gold); font-weight:900; border:4px solid #fff; border-radius:50px;">点击同步灵魂频段</button>
    <p style="margin-top:20px; font-size:0.7rem; color:#888;">(此动作将接通语音与同步通道)</p>
</div>

<div id="rule-overlay" class="overlay">
    <div class="modal">
        <h3>- 游戏规则 -</h3>
        <p style="font-size:0.8rem; text-align:left; line-height:1.6; margin:15px 0;">1.陪伴师引导,不参与抽卡。<br>2.玩家轮流开启档案,诚实作答。<br>3.全员实时点赞或异议。<br>4.答案仅留在此处。</p>
        <button onclick="showBattery()" style="width:100%; padding:15px; background:var(--pink); color:#fff; font-weight:900;">确认并继续</button>
    </div>
</div>

<div id="battery-overlay" class="overlay">
    <div class="modal" style="background:#000; color:#fff; border-color:var(--green);">
        <p>如果精力比做电池, 现在你是多少?</p>
        <div id="batt-text" style="font-size:2.5rem; color:var(--green); font-weight:900; margin:10px 0;">50%</div>
        <div class="battery-container">
            <div id="batt-fill" class="battery-level" style="height:50%;"></div>
        </div>
        <input type="range" min="1" max="100" value="50" oninput="document.getElementById('batt-text').innerText=this.value+'%'; document.getElementById('batt-fill').style.height=this.value+'%'" style="width:100%; accent-color:var(--green);">
        <button onclick="showWheel()" style="width:100%; padding:15px; background:var(--green); color:#000; font-weight:900; margin-top:20px;">同步状态</button>
    </div>
</div>

<div id="wheel-overlay" class="overlay">
    <div class="modal" style="background:transparent; border:none; box-shadow:none;">
        <div class="wheel"><div style="position:absolute; top:-20px; left:50%; transform:translateX(-50%); color:var(--pink);">▼</div></div>
        <h2 id="wheel-msg" style="margin-top:40px; color:#fff; text-shadow:0 0 10px var(--pink);">命运正在流转...</h2>
    </div>
</div>

<button id="host-start-btn" onclick="broadcastStart()">[ 开启灵魂审判 ]</button>

<div id="status-bar" style="display:none;">
    <span>当前频段:</span><span id="room-id-val" class="room-tag">------</span>
</div>

<div class="player-bar" id="p-bar"></div>

<div class="stage">
    <div id="card-podium"></div>
    <div id="focus-board">
        <div style="font-size:0.5rem; color:#999;">[ SENSITIVE FILE ]</div>
        <div id="q-text" style="font-size:1.15rem; font-weight:bold; text-align:center; flex:1; display:flex; align-items:center;"></div>
        <button class="ctrl-btn" style="width:100%; height:44px; border-color:var(--gold); color:var(--gold);" onclick="closeCard()">关闭档案</button>
    </div>
    <div id="deck" style="display:none; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
</div>

<div class="footer">
    <div id="chat-flow"></div>
    <div class="btn-panel">
        <button class="ctrl-btn" onclick="blastEmoji('👍')">点赞</button>
        <button class="ctrl-btn" style="border-color:#444;" onclick="blastEmoji('❌')">异议</button>
        <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
        <button class="ctrl-btn" style="border-color:var(--pink); color:var(--pink);">转移</button>
    </div>
</div>

<div id="audio-bridge" style="display:none;"></div>

<script>
    const qs = ["你最对不起的人是谁？", "如果你有一件隐身衣...", "此时此刻最大的焦虑...", "如果明天突然消失..."];
    let peer, conn, localStream, myNick, myRoom, isComp=false, players=[], conns=[], turnIdx=0;

    function restore(t) {
        if(t==='nick') document.getElementById('nick-in').value = localStorage.getItem('sn') || "";
        if(t==='room') document.getElementById('room-in').value = localStorage.getItem('sr') || "";
    }

    function preConnect(mode) {
        myNick = document.getElementById('nick-in').value;
        myRoom = document.getElementById('room-in').value;
        if(!myNick || !myRoom) return alert("代号和房号必填");
        isComp = (mode==='companion');
        localStorage.setItem('sn', myNick); localStorage.setItem('sr', myRoom);
        document.getElementById('login-screen').style.display='none';
        document.getElementById('sync-overlay').style.display='flex';
    }

    async function unlockAudio() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); localStream.getAudioTracks()[0].enabled = false; } catch(e) {}
        document.getElementById('sync-overlay').style.display='none';
        initPeer();
    }

    function initPeer() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        peer.on('open', () => {
            document.getElementById('status-bar').style.display='flex';
            document.getElementById('room-id-val').innerText = myRoom;
            if(isComp) {
                document.getElementById('host-start-btn').style.display='block';
                players = [{nick: myNick, isComp:true, batt:''}]; renderP();
            } else {
                conn = peer.connect(`SPEAK-${myRoom}`); setupConn(conn);
                peer.call(`SPEAK-${myRoom}`, localStream);
            }
        });
        peer.on('connection', (c) => { conns.push(c); setupConn(c); });
        peer.on('call', (call) => { call.answer(localStream); call.on('stream', (s) => { const a=document.createElement('audio'); a.srcObject=s; a.autoplay=true; document.getElementById('audio-bridge').appendChild(a); }); });
    }

    function setupConn(c) {
        c.on('open', () => c.send({type:'JOIN', nick:myNick}));
        c.on('data', (d) => {
            if(d.type==='JOIN' && isComp) { players.push({nick:d.nick, isComp:false, batt:''}); broadcast({type:'SYNC', list:players}); appendChat("系统", d.nick+"进入档案室"); }
            if(d.type==='SYNC') { players=d.list; renderP(); }
            if(d.type==='START_FLOW') { document.getElementById('rule-overlay').style.display='flex'; }
            if(d.type==='BATT_SYNC') { players.find(p=>p.nick===d.nick).batt=d.val; renderP(); }
            if(d.type==='CHAT') appendChat(d.nick, d.msg);
            if(d.type==='WHEEL_DONE') { document.getElementById('deck').style.display='flex'; renderD(); }
        });
    }

    function broadcast(d) { conns.forEach(c=>c.send(d)); if(!isComp) conn.send(d); }

    function broadcastStart() { document.getElementById('host-start-btn').style.display='none'; broadcast({type:'START_FLOW'}); document.getElementById('rule-overlay').style.display='flex'; }

    function showBattery() { document.getElementById('rule-overlay').style.display='none'; document.getElementById('battery-overlay').style.display='flex'; }

    function showWheel() {
        const val = document.getElementById('batt-text').innerText;
        broadcast({type:'BATT_SYNC', nick:myNick, val:val});
        document.getElementById('battery-overlay').style.display='none';
        document.getElementById('wheel-overlay').style.display='flex';
        setTimeout(() => { 
            document.getElementById('wheel-msg').innerText = "首位发言者已锁定!"; 
            setTimeout(() => { document.getElementById('wheel-overlay').style.display='none'; if(isComp) broadcast({type:'WHEEL_DONE'}); document.getElementById('deck').style.display='flex'; renderD(); }, 1000);
        }, 2000);
    }

    function renderP() {
        document.getElementById('p-bar').innerHTML = players.map(p=>`<div class="p-item online"><div class="p-batt-val">${p.batt}</div><div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div><div style="font-size:0.5rem; margin-top:4px;">${p.nick}</div></div>`).join('');
    }

    function renderD() {
        let h=""; for(let i=0; i<40; i++) h+=`<div onclick="draw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:6px; background-image:repeating-linear-gradient(45deg, #3d1563, #3d1563 8px, #2a104a 8px, #2a104a 16px);"></div>`;
        document.getElementById('deck').innerHTML=h;
    }

    function draw(i) {
        if(isComp) return;
        const b = document.getElementById('focus-board');
        document.getElementById('q-text').innerText = qs[i % qs.length];
        document.getElementById('card-podium').style.display='block';
        b.style.display='flex'; setTimeout(()=>b.classList.add('show'), 50);
    }

    function closeCard() { const b=document.getElementById('focus-board'); b.classList.remove('show'); setTimeout(()=>{b.style.display='none'; document.getElementById('card-podium').style.display='none';}, 800); }

    function toggleMic() { if(!localStream) return; const active = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('on', active); }

    function blastEmoji(type) {
        for(let i=0; i<10; i++) {
            const p=document.createElement('div'); p.className='particle'; p.innerText=type; p.style.left='50%'; p.style.top='40%';
            p.style.setProperty('--dx', (Math.random()*600-300)+'px'); p.style.setProperty('--dy', (Math.random()*-600-100)+'px');
            document.body.appendChild(p); setTimeout(()=>p.remove(), 800);
        }
        appendChat(myNick, type); broadcast({type:'CHAT', nick:myNick, msg:type});
    }

    function appendChat(n, m) { const b=document.getElementById('chat-flow'); b.innerHTML+=`<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`; b.scrollTop=b.scrollHeight; }
</script>
</body>
</html>
