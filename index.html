<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - AI 仿真内测</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #13061c; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --green: #00ff66; --purple: #a333ff; --dark: #0a0310; }
        * { image-rendering: pixelated; box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03)); background-size: 100% 4px, 4px 100%; }
        #companion-notice { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 15000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .comp-override-box { border: 4px solid var(--purple); padding: 20px 40px; background: rgba(163, 51, 255, 0.1); color: var(--purple); font-weight: 900; font-size: 1.2rem; text-shadow: 0 0 10px var(--purple); box-shadow: inset 0 0 20px rgba(163, 51, 255, 0.5), 0 0 30px rgba(163, 51, 255, 0.3); animation: glitch-anim 0.2s infinite; }
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 100% { transform: translate(0) } }
        .player-bar { height: 90px; padding: 12px 10px; display: flex; gap: 15px; overflow-x: auto; background: var(--dark); z-index: 1001; border-bottom: 2px solid #222; }
        .p-item { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; gap: 6px; width: 55px; }
        .p-avatar { width: 46px; height: 46px; border: 3px solid #333; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; background: #000; transition: 0.2s; }
        .p-avatar.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: translateY(-2px); }
        .p-avatar.bot { border-style: dashed; border-color: #555; }
        .p-item .name { font-size: 0.55rem; color: #aaa; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .main-deck { flex: 1; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; overflow-y: auto; }
        .card { aspect-ratio: 2/3; background: #3d1563; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; background-image: repeating-conic-gradient(#4d1b7b 0 25%, #3d1563 0 50%); background-size: 8px 8px; }
        .card.flipped { opacity: 0.1; pointer-events: none; }
        #focused-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; }
        .focused-card { width: 85%; max-width: 320px; min-height: 300px; background: #eee; color: #111; border-radius: 16px; border: 6px solid #111; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; box-shadow: 12px 12px 0px rgba(0,0,0,0.9); }
        .footer-console { height: 180px; background: var(--dark); border-top: 3px solid var(--pink); display: flex; flex-direction: column; }
        #c-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: var(--blue); }
        .btn-grid { height: 70px; border-top: 2px solid var(--blue); display: flex; padding: 8px 10px; gap: 10px; background: #000; }
        .p-btn { background: #111; color: var(--blue); border: 2px solid var(--blue); border-radius: 8px; flex: 1; font-family: inherit; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        .p-btn:disabled { opacity: 0.3; }
        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="companion-notice"><div class="comp-override-box">[ AI 影子介入中 ]</div></div>

<div id="setup">
    <h1 style="color:var(--pink); font-size: 2.5rem; margin-bottom: 20px;">SPEAK AI</h1>
    <button class="p-btn pink" style="max-width:200px; height:50px; flex:none;" onclick="startAiDemo()">开启 5 人 AI 陪玩</button>
</div>

<div class="player-bar" id="p-bar"></div>
<div class="main-deck" id="deck"></div>

<div id="focused-overlay">
    <div class="focused-card">
        <div style="color:var(--pink); font-size: 0.7rem;">[ ARCHIVE OPEN ]</div>
        <div id="q-text" style="font-size: 1.1rem; font-weight: bold; margin: 20px 0;"></div>
        <div id="vote-display" style="font-size: 1.5rem; height: 35px;"></div>
        <button id="f-btn" class="p-btn" style="width:100%; border-color:var(--gold); color:var(--gold);" onclick="nextTurn()">确认并继续</button>
    </div>
</div>

<div class="footer-console">
    <div id="c-msgs"></div>
    <div class="btn-grid">
        <button class="p-btn" onclick="vote('H')">👍 诚实</button>
        <button class="p-btn" style="border-color:var(--pink); color:var(--pink);" onclick="vote('L')">👎 撒谎</button>
    </div>
</div>

<script>
    const questions = ["你上一次哭，是因为什么？", "你觉得这辈子最对不起的人是谁？", "如果工资减半但能准时下班，你换吗？", "给在座一位玩家提个缺点。", "如果你死后手机被公开，你最怕谁看到？", "哪一首歌旋律一响，你会想起一个人？"];
    const botNames = ["冷漠的K", "碎碎念的小鱼", "杠精阿强", "深夜哲学家", "透明人"];
    const botReplies = ["这题扎心了...", "我选诚实。", "感觉有人在撒谎哦。", "这就是人生吧。", "继续下一题吧。"];

    let players = [], turnIdx = 0, flipped = [], votes = [];

    function startAiDemo() {
        document.getElementById('setup').style.display = 'none';
        players = [{id: 'me', nick: '我', avatar: '🃏', isBot: false}];
        for(let i=0; i<5; i++) {
            players.push({id: 'bot'+i, nick: botNames[i], avatar: '🤖', isBot: true});
        }
        renderPlayers();
        renderDeck();
        appendChat("系统", "5位影子玩家已加入，轮流抽牌开启。");
        checkBotTurn();
    }

    function renderPlayers() {
        document.getElementById('p-bar').innerHTML = players.map((p, i) => `
            <div class="p-item">
                <div class="p-avatar ${i===turnIdx?'active':''} ${p.isBot?'bot':''}">${p.avatar}</div>
                <div class="name">${p.nick}</div>
            </div>
        `).join('');
    }

    function renderDeck() {
        let d = document.getElementById('deck'); d.innerHTML = "";
        for(let i=0; i<40; i++) d.innerHTML += `<div class="card ${flipped.includes(i)?'flipped':''}" onclick="userDraw(${i})"></div>`;
    }

    function userDraw(i) {
        if(players[turnIdx].isBot) return;
        draw(i);
    }

    function draw(i) {
        if(flipped.includes(i)) return;
        flipped.push(i);
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('q-text').innerText = q;
        document.getElementById('focused-overlay').style.display = 'flex';
        renderDeck();
        if(players[turnIdx].isBot) {
            setTimeout(() => appendChat(players[turnIdx].nick, "关于这题，我的故事是... (此处省略500字)"), 1000);
        }
        botVoting();
    }

    function botVoting() {
        votes = [];
        document.getElementById('vote-display').innerHTML = "";
        players.forEach((p, i) => {
            if(i !== turnIdx && p.isBot) {
                setTimeout(() => {
                    const v = Math.random() > 0.2 ? 'H' : 'L';
                    votes.push(v);
                    document.getElementById('vote-display').innerHTML += v === 'H' ? '👍' : '👎';
                    if(Math.random() > 0.7) appendChat(p.nick, botReplies[Math.floor(Math.random()*botReplies.length)]);
                }, 500 + Math.random()*2000);
            }
        });
    }

    function vote(type) {
        if(players[turnIdx].isBot) {
            votes.push(type);
            document.getElementById('vote-display').innerHTML += type === 'H' ? '👍' : '👎';
        }
    }

    function nextTurn() {
        document.getElementById('focused-overlay').style.display = 'none';
        turnIdx = (turnIdx + 1) % players.length;
        renderPlayers();
        checkBotTurn();
    }

    function checkBotTurn() {
        if(players[turnIdx].isBot) {
            appendChat("系统", `轮到 ${players[turnIdx].nick} 抽牌...`);
            setTimeout(() => {
                let idx; do { idx = Math.floor(Math.random()*40); } while(flipped.includes(idx));
                draw(idx);
            }, 2000);
        } else {
            appendChat("系统", "请你点击卡片抽牌。");
        }
    }

    function appendChat(n, m) {
        let b = document.getElementById('c-msgs');
        b.innerHTML += `<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
