<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK - 深夜灵魂对话</title>
    <style>
        :root { 
            --bg: #0A0A0A; 
            --accent: #FFFFFF;
            --text-dim: #888888;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg);
            color: #FFFFFF; 
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* 顶部品牌区 */
        .header { 
            padding: 40px 20px 20px; 
            text-align: center;
        }
        .brand-logo { 
            font-size: 1.4rem; 
            font-weight: 700; 
            letter-spacing: 5px; 
            color: var(--accent);
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* 核心卡牌区 */
        .stage { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 25px;
        }
        
        .speak-card { 
            width: 100%; 
            max-width: 340px; 
            aspect-ratio: 4 / 5;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px; /* V44 特色的硬朗直角或微圆角 */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            text-align: center; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .c-text { 
            font-size: 1.3rem; 
            font-weight: 300; 
            line-height: 1.8; 
            word-break: break-all;
        }

        /* 状态标记 */
        .status-tag {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.6rem;
            color: var(--text-dim);
            border-left: 1px solid var(--text-dim);
            padding-left: 8px;
        }

        /* 底部操作区 */
        .dock { 
            padding: 40px 20px 60px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 40px;
        }

        /* 极简按钮逻辑 */
        .btn-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-dim);
            transition: 0.2s;
        }

        /* 核心语音键 - SPEAK 风格 */
        .voice-trigger {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .voice-inner {
            width: 64px;
            height: 64px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.5rem;
            transition: transform 0.2s;
        }

        .voice-trigger.active .voice-inner {
            transform: scale(0.85);
            background: #FF3B30; /* 录音时的警示色 */
        }

        /* 波动光圈 */
        .pulse {
            position: absolute;
            inset: -10px;
            border: 1px solid #FFFFFF;
            border-radius: 50%;
            opacity: 0;
        }
        .active .pulse {
            animation: pulse-ani 1.5s infinite;
        }

        @keyframes pulse-ani {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* 动画过渡 */
        .slide-out { transform: translateX(-20px); opacity: 0; }
        .slide-in { transform: translateX(20px); opacity: 0; }

    </style>
</head>
<body>

<div class="header">
    <div class="brand-logo">SPEAK</div>
    <div class="subtitle">LISTEN & BE HEARD</div>
</div>

<div class="stage">
    <div class="speak-card" id="mainCard">
        <div class="status-tag">DEEP TALK</div>
        <div class="c-text" id="questionText">准备好了吗？<br><br>点击左侧按钮切牌。</div>
    </div>
</div>

<div class="dock">
    <div class="btn-icon" onclick="drawCard()">
        <span>切牌</span>
    </div>

    <div class="voice-trigger" id="voiceBtn" onmousedown="micOn()" onmouseup="micOff()" ontouchstart="micOn()" ontouchend="micOff()">
        <div class="voice-inner">🎙️</div>
        <div class="pulse"></div>
    </div>

    <div class="btn-icon">
        <span>3/3</span>
    </div>
</div>

<script>
    const questions = [
        "你上一次哭，是因为什么？",
        "你觉得这辈子最对不起的人是谁？为什么？",
        "童年里哪一件看似很小的事情，其实一直负面影响你到现在？",
        "此时此刻，你生活中最大的焦虑源头究竟是什么？",
        "如果你的生命只剩最后 24 小时，你会去见谁？对ta说什么？",
        "谁曾经对你特别好，但后来你们却莫名其妙地断了联系？",
        "你这辈子，最想收到谁的一句“对不起”？",
        "摘下所有的面具，你觉得自己到底有多累？（1-10分）为什么？",
        "你上一次对最亲近的人撒的谎是什么？",
        "哪一个瞬间，你突然觉得这份工作/这个行业真的把你“榨干”了？",
        "谁发来的微信消息或工作群艾特，会让你一看到就瞬间心跳加速、感到生理性不适？",
        "你人生中，哪一天是你打死都不想再经历第二次的？",
        "如果明天公司突然倒闭了，你心里的第一反应是恐慌，还是长舒一口气？",
        "如果现在给你一个机会，把工资减半，但每天能准时 5 点下班且绝对没人找你，你会立刻答应吗？",
        "假如现在有个按钮，按下去能彻底清空你关于某一个人的所有记忆，你会按吗？",
        "如果今天能用你的一年寿命，换取一件你曾经极其渴望但没得到的东西，你会换什么？",
        "如果给你一千万，条件是立刻和父母和爱人孩子彻底绝交，你换吗？",
        "如果今晚睡着后，你会进入一个永远醒不来的美梦，你希望梦里的场景是什么样的？",
        "假设有一瓶吐真剂，你会给谁喝？问他什么问题？",
        "哪一句父母曾经骂过你的话，你当时很不屑，现在却悲哀地发现自己真的变成了那样？",
        "如果明天的太阳不再升起，你今晚的最后一顿饭想吃什么？身边坐着谁？",
        "如果你有一件“隐身衣”你想利用它去做什么？",
        "分享一个你的“童年阴影”可以是电影片段，或者生活打击。",
        "哪一首歌的旋律一响，你的脑子里就会立刻无条件地弹出一个人？",
        "此时此刻，如果有人递给你一张任意目的地的单程机票，你想立刻飞去哪？",
        "哪一个本来跟你毫无血缘关系的人，曾给过你一种像“亲人”一样的感觉？",
        "如果人的寿命可以像微信转账一样转给别人，你会把你的一年寿命转给谁？",
        "如果有一个快进按键，能直接跳过你现在正在熬的这段日子，代价是减寿三年，你会按吗？",
        "假设你能以上帝视角参加自己的葬礼，你觉得谁会在角落里哭得最伤心？",
        "如果现在给你一个“合法报复一次”额度，且不承担后果，你会立刻用在谁身上？",
        "假设你明天必须彻底离开，永远不再回来，走之前你只想最后去见一个人，你会见谁？",
        "如果你死后，你的手机数据会被公开展示，你最怕被谁看到里面的哪一部分？",
        "如果可以用一句话总结你上一段失败的感情，你会说什么？",
        "你现在极度怀念，却再也找不到的一种“感觉”是什么？"
    ];

    function drawCard() {
        const card = document.getElementById('mainCard');
        const textEl = document.getElementById('questionText');
        
        card.classList.add('slide-out');
        
        setTimeout(() => {
            const rand = Math.floor(Math.random() * questions.length);
            textEl.innerText = questions[rand];
            
            card.classList.remove('slide-out');
            card.classList.add('slide-in');
            
            void card.offsetWidth; 
            card.classList.remove('slide-in');
            
            if(navigator.vibrate) navigator.vibrate(15);
        }, 300);
    }

    function micOn(e) {
        if(e) e.preventDefault();
        document.getElementById('voiceBtn').classList.add('active');
        // 此处对接实时语音推流 SDK
    }

    function micOff(e) {
        if(e) e.preventDefault();
        document.getElementById('voiceBtn').classList.remove('active');
        // 此处对接实时语音停止推流接口
    }
</script>
</body>
</html>
