<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V48.7</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 背景动画 */
        .plasma-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.5; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* 登录 */
        #login-screen { position: fixed; inset: 0; z-index: 100000; background: rgba(5,5,5,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pixel-input { width: 260px; padding: 15px; background: rgba(0,0,0,0.8); border: 3px solid #333; color: var(--gold); text-align: center; font-size: 1.1rem; margin-bottom: 15px; box-shadow: 4px 4px 0 #000; }

        /* 游戏界面 */
        #main-game { display: none; flex-direction: column; height: 100vh; width: 100vw; background: transparent; }
        #process-guide { height: 32px; background: rgba(255,255,255,0.1); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; border-bottom: 1px solid #222; }
        
        .header-bar { height: 110px; display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #222; }
        #player-area { display: flex; gap: 12px; overflow-x: auto; flex: 1; align-items: center; }
        #companion-area { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #333; }
        
        .p-avatar { width: 44px; height: 44px; border: 4px solid #333; background: #111; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 12px; }
        .active-turn .p-avatar { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); animation: breathe 1s infinite alternate; }
        @keyframes breathe { from { opacity: 0.8; } to { opacity: 1; } }
        .is-companion { border-color: var(--purple) !important; }

        /* 13:16 像素卡牌 */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; }
        #focus-board { 
            position: absolute; height: 65vh; width: calc(65vh * 0.81); 
            background: #fff; color: #111; border: 6px solid #000; border-radius: 24px;
            padding: 30px 20px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.5);
            transform: translateY(100%) rotateX(-180deg); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(0) rotateX(0deg); opacity: 1; }

        /* 操作区 */
        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 12px; font-size: 0.8rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 10px; gap: 10px; align-items: center; justify-content: center; }
        .ctrl-btn { width: 80px; height: 50px; border: 4px solid var(--blue); background: #000; color: var(--blue); font-weight: 900; font-size: 0.85rem; border-radius: 8px; }
