<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPEAK V49.5</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --pink: #ff0055; --blue: #00f2ff; --gold: #ffcc00; --purple: #a333ff; }
        * { image-rendering: pixelated; box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
        body { background: var(--bg); color: #fff; font-family: "Courier New", monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* --- 首页底图动画 (锁定) --- */
        .plasma-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.5; background: repeating-radial-gradient(circle at 50% 50%, #ff0055 0%, #050505 15%, #3d1563 30%); background-size: 200% 200%; animation: plasma 15s linear infinite; }
        @keyframes plasma { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }

        /* --- 登录层 (锁定) --- */
        #login-screen { position: fixed; inset: 0; z-index: 100000; background: rgba(5,5,5,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pixel-input { width: 260px; padding: 15px; background: rgba(0,0,0,0.8); border: 3px solid #333; color: var(--gold); text-align: center; font-size: 1.1rem; margin-bottom: 15px; box-shadow: 4px 4px 0 #000; }

        /* --- 游戏主体与布局 (锁定) --- */
        #main-game { display: none; flex-direction: column; height: 100vh; width: 100vw; background: transparent; }
        #process-guide { height: 32px; background: rgba(255,255,255,0.1); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; border-bottom: 1px solid #222; }
        .header-bar { height: 110px; display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #222; }
        #player-area { display: flex; gap: 12px; overflow-x: auto; flex: 1; align-items: center; }
        #companion-area { width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #333; }
        
        .p-item { display: flex; flex-direction: column; align-items: center; min-width: 64px; padding: 6px 4px; border: 2px solid transparent; border-radius: 12px; opacity: 0.5; transition: 0.3s; }
        .p-item.online { opacity: 1; }
        .p-avatar { width: 44px; height: 44px; border: 4px solid #333; background: #111; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 12px; }
        .is-companion { border-color: var(--purple) !important; }
        
        .p-item.active-turn { border-color: var(--blue); background: rgba(0, 242, 255, 0.15); animation: breathe-blue 0.8s infinite alternate; }
        .p-item.active-turn .p-avatar { border-color: var(--blue); }
        @keyframes breathe-blue { from { box-shadow: 0 0 8px var(--blue); } to { box-shadow: 0 0 20px var(--blue); } }

        /* --- 13:16 档案卡 (锁定防撑爆) --- */
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        #card-podium { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; }
        
        /* 玩家档案卡 */
        #focus-board { 
            position: absolute; height: 65vh; max-width: 85vw; aspect-ratio: 13 / 16;
            background: #fff; color: #111; border: 6px solid #000; border-radius: 24px;
            padding: 30px 20px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 5001; box-shadow: 20px 20px 0 rgba(0,0,0,0.5);
            transform: translateY(100%) rotateX(-180deg); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0;
        }
        #focus-board.show { display: flex; transform: translateY(0) rotateX(0deg); opacity: 1; }

        /* 新增：陪伴师塔罗卡 (图层最高，霓虹风) */
        #comp-card-board {
            position: absolute; height: 65vh; max-width: 85vw; aspect-ratio: 13 / 16;
            background: #0a0a1a; color: #fff; border: 6px solid var(--purple); border-radius: 24px;
            padding: 15px; display: none; flex-direction: column; align-items: center; justify-content: space-between;
            z-index: 6001; box-shadow: 15px 15px 0 rgba(163, 51, 255, 0.4);
            transform: translateY(-100%) scale(0.8); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
            overflow: hidden;
        }
        #comp-card-board.show { display: flex; transform: translateY(0) scale(1); opacity: 1; }
        #spectrum-canvas { width: 100%; height: 100%; object-fit: contain; }

        /* --- 控制栏 (锁定细节) --- */
        .footer { height: 260px; background: #000; border-top: 2px solid var(--blue); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 12px; font-size: 0.85rem; color: var(--blue); }
        .btn-panel { height: 90px; display: flex; padding: 10px; gap: 8px; align-items: center; justify-content: center; }
        .ctrl-btn { flex:1; max-width:80px; height: 50px; border: 4px solid var(--blue); background: #000; color: var(--blue); font-weight: 900; font-size: 0.85rem; border-radius: 8px; padding:0; }
        .ctrl-btn:disabled { opacity: 0.15; border-color: #444; }
        .mic-btn { border-radius: 50%; width: 66px; height: 66px; font-size: 1.6rem; color: #fff; border: 4px solid var(--blue); background: #000; flex-shrink: 0; }
        .mic-btn.active { background: var(--pink); border-color: #fff; }

        #host-start-btn { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 150000; display: none; background: var(--gold); color: #000; padding: 18px 45px; border-radius: 50px; font-weight: 900; border: 5px solid #fff; box-shadow: 0 0 30px var(--gold); cursor: pointer; }
        .overlay { position: fixed; inset: 0; z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); background: rgba(0,0,0,0.85); }
        .particle { position: fixed; pointer-events: none; animation: fly 0.8s forwards; z-index: 300000; font-size: 2.5rem; }
        @keyframes fly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="plasma-bg"></div>

<div id="login-screen">
    <div style="font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 4px 4px 0 var(--pink); margin-bottom: 40px; letter-spacing: -3px;">SPEAK</div>
    <input type="text" id="nick-in" class="pixel-input" placeholder="昵称">
    <input type="text" id="room-in" class="pixel-input" placeholder="房号">
    <button class="ctrl-btn" style="width:260px; max-width:260px; background:var(--pink); color:#fff; height:60px;" onclick="entry('join')">进入游戏</button>
    
    <button onclick="tryCompanion()" style="position:absolute; bottom:30px; right:30px; color:var(--purple); font-size:0.7rem; text-decoration:underline; background:none;">陪伴师入口</button>
    
    <div style="position:absolute; bottom:30px; left:20px; display:flex; flex-direction:column; gap:5px;">
        <button onclick="restore('nick')" style="color:#888; font-size:0.65rem; text-decoration:underline; background:none; text-align:left;">重填旧昵称</button>
        <button onclick="restore('room')" style="color:#888; font-size:0.65rem; text-decoration:underline; background:none; text-align:left;">重填旧房号</button>
    </div>
</div>

<div id="pwd-overlay" class="overlay">
    <div style="background:#eee; color:#111; padding:30px; border-radius:12px; border:4px solid #000; text-align:center; width:85%; max-width:320px;">
        <h3 style="margin-bottom:15px; font-weight:900;">- 身份认证 -</h3>
        <input type="password" id="comp-pwd-in" style="width:100%; padding:12px; border:4px solid #333; background:#fff; color:#000; text-align:center; font-size:1.2rem; margin-bottom:20px; font-family:monospace; border-radius:6px;" placeholder="输入暗号">
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="ctrl-btn" style="background:#444; color:#fff; border-color:#222;" onclick="document.getElementById('pwd-overlay').style.display='none'">返回</button>
            <button class="ctrl-btn" style="background:var(--pink); color:#fff; border-color:var(--pink);" onclick="checkPwd()">确认</button>
        </div>
    </div>
</div>

<div id="audio-overlay" class="overlay">
    <button class="ctrl-btn" style="background:var(--gold); color:#000; width:220px; max-width:220px;" onclick="unlockAudio()">同步灵魂频段</button>
</div>

<div id="main-game">
    <div style="height:36px; background:var(--pink); color:#000; display:flex; align-items:center; padding:0 15px; font-weight:900; font-size:0.8rem;">
        <span>ROOM:</span><span id="room-id-val" style="margin-left:10px; background:#000; color:var(--gold); padding:2px 8px;">---</span>
    </div>
    <div id="process-guide">等待房主同步...</div>
    <div class="header-bar">
        <div id="player-area"></div>
        <div id="companion-area"></div>
    </div>
    <div class="stage">
        <div id="card-podium"></div>
        
        <div id="focus-board">
            <div style="font-size:0.6rem; color:#999; letter-spacing:2px;">[ SENSITIVE FILE ]</div>
            <div id="q-text" style="font-size:1.15rem; font-weight:bold; text-align:center; padding:15px; line-height:1.4;">档案读取中...</div>
            <button id="btn-close" class="ctrl-btn" style="width:180px; max-width:180px; transition:0.3s;" onclick="userCmd('CLOSE')">完成回答</button>
        </div>

        <div id="comp-card-board">
            <canvas id="spectrum-canvas" width="320" height="400"></canvas>
            <button id="btn-cc-close" class="ctrl-btn" style="width:100%; max-width:100%; display:none; border-color:var(--purple); color:var(--purple); position:absolute; bottom:10px; left:10px; width:calc(100% - 20px);" onclick="hostCmd('CLOSE_COMP')">收回塔罗</button>
        </div>

        <div id="deck" style="display:none; gap:12px; overflow-x:auto; padding:20px; width:100%;"></div>
    </div>
    <div class="footer">
        <div id="chat-flow"></div>
        
        <div style="display:flex; padding:0 10px; gap:8px;">
            <input type="text" id="chat-input" style="flex:1; padding:10px; background:#111; border:2px solid #333; color:#fff; border-radius:6px; font-size:0.85rem;" placeholder="输入文字弹幕...">
            <button class="ctrl-btn" style="width:65px; padding:8px;" onclick="sendTextChat()">发送</button>
        </div>

        <div class="btn-panel">
            <button id="btn-like" class="ctrl-btn" disabled onclick="actionReact('👍')">点赞</button>
            <button id="btn-dis" class="ctrl-btn" disabled style="border-color:#444;" onclick="actionReact('❌')">异议</button>
            <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
            <button id="btn-trans" class="ctrl-btn" disabled style="border-color:var(--pink); color:var(--pink); font-size:0.6rem;" onclick="userCmd('CLOSE')">🔄 转移</button>
            
            <button id="btn-tarot" class="ctrl-btn" style="display:none; border-color:var(--purple); color:var(--purple); position:relative;" onclick="hostCmd('DRAW_COMP')">🔮 塔罗</button>
        </div>
    </div>
</div>

<button id="host-start-btn" onclick="hostGo()">[ 开启灵魂审判 ]</button>
<div id="audio-bridge" style="display:none;"></div>

<script>
    // --- 完整植入你提供的所有34个直击灵魂的题库 (锁定) ---
    const CUSTOM_QS = [
        "你上一次哭，是因为什么？", "你觉得这辈子最对不起的人是谁？为什么？", "童年里哪一件看似很小的事情，其实一直负面影响你到现在？", "此时此刻，你生活中最大的焦虑源头究竟是什么？",
        "如果你的生命只剩最后 24 小时，你会去见谁？对ta说什么？", "谁曾经对你特别好，但后来你们却莫名其妙地断了联系？", "你这辈子，最想收到谁的一句“对不起”？", "摘下所有的面具，你觉得自己到底有多累？（1-10分）为什么？",
        "你上一次对最亲近的人撒的谎是什么？", "哪一个瞬间，你突然觉得这份工作/这个行业真的把你“榨干”了？", "谁发来的微信消息或工作群艾特，会让你一看到就瞬间心跳加速、感到生理性不适？为什么？", "你人生中，哪一天是你打死都不想再经历第二次的？",
        "如果明天公司突然倒闭了，你心里的第一反应是恐慌，还是长舒一口气？", "如果现在给你一个机会，把工资减半，但每天能准时 5 点下班且绝对没人找你，你会立刻答应，还是犹豫？", "假如现在有个按钮，按下去能彻底清空你关于某一个人的所有记忆，你会按吗？", "如果今天能用你的一年寿命，换取一件你曾经极其渴望但没得到的东西，你会换什么？",
        "如果给你一千万，条件是立刻和父母和爱人孩子彻底绝交，你换吗？", "如果今晚睡着后，你会进入一个永远醒不来的美梦，你希望梦里的场景是什么样的？", "假设有一瓶吐真剂，你会给谁喝？问他什么问题？", "哪一句父母曾经骂过你的话，你当时很不屑，现在却悲哀地发现自己真的变成了那样？",
        "如果明天的太阳不再升起，你今晚的最后一顿饭想吃什么？身边坐着谁？", "如果你有一件“隐身衣”你想利用它去做什么？", "分享一个你的“童年阴影”可以是电影片段，或者生活打击。", "哪一首歌的旋律一响，你的脑子里就会立刻无条件地弹出一个人？",
        "此时此刻，如果有人递给你一张任意目的地的单程机票，你想立刻飞去哪？", "哪一个本来跟你毫无血缘关系的人，曾给过你一种像“亲人”一样的感觉？", "如果人的寿命可以像微信转账一样转给别人，你会把你的一年寿命转给谁？", "如果有一个快进按键，能直接跳过你现在正在熬的这段日子，代价是减寿三年，你会按吗？",
        "假设你能以上帝视角参加自己的葬礼，你觉得谁会在角落里哭得最伤心？", "如果现在给你一个“合法报复一次”的额度，且绝对不用承担任何后果，你会立刻用在谁身上？", "假设你明天必须彻底离开现在的城市，永远不再回来，走之前你只想最后去见一个人，你会见谁？", "如果你死后，你的手机数据会被毫无保留地公开展示，你最怕被谁看到里面的哪一部分？",
        "如果可以用一句话总结你上一段失败的感情，你会说什么？", "你现在极度怀念，却再也找不到的一种“感觉”是什么？"
    ];

    let peer, localStream, myNick, myRoom, isComp=false, players=[], conns=[], turnIdx=0, isLocked=false, handledIds=new Set(), cardIndex=null;
    let hostConn = null; 
    let drawnCards = [];
    let compCardIndex = null; // 新增：陪伴师塔罗卡索引

    function tryCompanion() {
        if(!document.getElementById('nick-in').value || !document.getElementById('room-in').value) return alert("请先填写昵称和房号");
        document.getElementById('comp-pwd-in').value = '';
        document.getElementById('pwd-overlay').style.display = 'flex';
    }

    function checkPwd() {
        if(document.getElementById('comp-pwd-in').value === '101010') {
            document.getElementById('pwd-overlay').style.display = 'none';
            entry('companion');
        } else { alert("密码错误"); }
    }

    function restore(t) { 
        if(t==='nick') document.getElementById('nick-in').value = localStorage.getItem('sn') || "";
        if(t==='room') document.getElementById('room-in').value = localStorage.getItem('sr') || "";
    }

    function entry(m) {
        myNick = document.getElementById('nick-in').value; myRoom = document.getElementById('room-in').value;
        if(!myNick || !myRoom) return alert("必填");
        isComp = (m==='companion'); 
        localStorage.setItem('sn', myNick); localStorage.setItem('sr', myRoom);
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-game').style.display='flex';
        
        // 房主解锁专属按钮
        if(isComp) {
            document.getElementById('host-start-btn').style.display='block';
            document.getElementById('btn-tarot').style.display='block';
            document.getElementById('btn-cc-close').style.display='block';
        }
        document.getElementById('audio-overlay').style.display='flex';
    }

    async function unlockAudio() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); localStream.getAudioTracks()[0].enabled = false; } catch(e) {}
        document.getElementById('audio-overlay').style.display='none';
        initNetwork();
    }

    function initNetwork() {
        peer = new Peer(isComp ? `SPEAK-${myRoom}` : null);
        peer.on('open', (id) => {
            document.getElementById('room-id-val').innerText = myRoom;
            if(isComp) {
                players = [{nick:myNick, isComp:true, peerId: id}]; renderUI();
                setInterval(() => { sendAll({type:'SYNC', list:players, turnIdx:turnIdx, isLocked:isLocked, cardIndex:cardIndex, compCardIndex:compCardIndex, drawnCards:drawnCards, allIds: players.map(p=>p.peerId)}); }, 1000);
            } else { hostConn = peer.connect(`SPEAK-${myRoom}`, {metadata: {nick: myNick}}); setupConn(hostConn); }
        });
        peer.on('connection', (c) => { conns.push(c); setupConn(c); });
        peer.on('call', (call) => {
            handledIds.add(call.peer);
            call.answer(localStream);
            call.on('stream', (s) => {
                let el = document.getElementById(`audio-${call.peer}`);
                if(!el) { el = document.createElement('audio'); el.id = `audio-${call.peer}`; el.autoplay = true; el.playsInline = true; document.getElementById('audio-bridge').appendChild(el); }
                el.srcObject = s; el.play().catch(e => console.log("iOS交互限制"));
            });
        });
    }

    function setupConn(c) {
        c.on('open', () => c.send({type:'JOIN', nick:myNick, peerId: peer.id}));
        c.on('data', (d) => {
            if(d.type==='JOIN' && isComp) { if(!players.find(p=>p.peerId===d.peerId)) { players.push({nick:d.nick, isComp:false, peerId: d.peerId}); renderUI(); } }
            
            if(d.type==='SYNC') { 
                players=d.list; turnIdx=d.turnIdx; drawnCards = d.drawnCards || []; 
                if(d.isLocked && !isLocked) triggerUnlock();
                
                const users = players.filter(p=>!p.isComp);
                const targetNick = users[turnIdx] ? users[turnIdx].nick : null;
                
                // 档案卡同步
                if(d.cardIndex !== null && cardIndex === null) { cardIndex = d.cardIndex; showArchive(d.cardIndex, targetNick); }
                if(d.cardIndex === null && cardIndex !== null) { hideArchive(); cardIndex = null; }
                
                // 核心修复：陪伴师塔罗卡同步 (图像生成)
                if(d.compCardIndex !== null && compCardIndex === null) { compCardIndex = d.compCardIndex; showSpectrum(d.compCardIndex); }
                if(d.compCardIndex === null && compCardIndex !== null) { hideSpectrum(); compCardIndex = null; }
                
                renderUI(); updateGuide();
                if(isLocked) updateDeckVisibility();
                if(d.allIds) d.allIds.forEach(id => { if(id !== peer.id && !handledIds.has(id)) { const call = peer.call(id, localStream); if(call) handledIds.add(id); } });
            }
            if(d.type==='UNLOCK') triggerUnlock();
            if(d.type==='DRAW') { cardIndex = d.idx; if(!drawnCards.includes(d.idx)) drawnCards.push(d.idx); updateDeckVisibility(); showArchive(d.idx, d.nick); if(isComp) sendAll(d); }
            if(d.type==='CLOSE') { hideArchive(); cardIndex = null; if(isComp) { const users = players.filter(p=>!p.isComp); if(users.length > 0) turnIdx = (turnIdx + 1) % users.length; sendAll({type:'SYNC', list:players, turnIdx:turnIdx, isLocked:isLocked, cardIndex:null, compCardIndex:compCardIndex, drawnCards:drawnCards}); } }
            if(d.type==='CHAT') { if (d.nick !== myNick) { appendChat(d.nick, d.msg); if(d.isAnim) triggerAnim(d.msg); } if(isComp) sendAll(d); }
            
            // 新增：陪伴师塔罗指令同步
            if(d.type==='DRAW_COMP') { compCardIndex = d.idx; showSpectrum(d.idx); if(isComp) sendAll(d); }
            if(d.type==='CLOSE_COMP') { hideSpectrum(); compCardIndex = null; if(isComp) sendAll(d); }
        });
    }

    // --- 新增：陪伴师专属指令 (代码全 Z-index 压制) ---
    function hostCmd(t) {
        if(!isComp) return;
        if(t==='DRAW_COMP') {
            const idx = Math.floor(Math.random() * 20); // 随机抽取20张塔罗
            compCardIndex = idx;
            sendAll({type:'DRAW_COMP', idx:idx});
            showSpectrum(idx);
        }
        if(t==='CLOSE_COMP') {
            sendAll({type:'CLOSE_COMP'});
            hideSpectrum();
            compCardIndex = null;
        }
    }

    // --- 新增：纯 Canvas 像素塔罗图像绘制系统 ---
    function showSpectrum(idx) {
        const board = document.getElementById('comp-card-board');
        drawSpectrumCard(idx);
        board.style.display = 'flex';
        setTimeout(() => board.classList.add('show'), 50);
        document.getElementById('card-podium').style.display='block';
    }

    function hideSpectrum() {
        const board = document.getElementById('comp-card-board');
        board.classList.remove('show');
        setTimeout(() => { board.style.display = 'none'; document.getElementById('card-podium').style.display='none'; }, 800);
    }

    function drawSpectrumCard(idx) {
        const canvas = document.getElementById('spectrum-canvas');
        const ctx = canvas.getContext('2d');
        // 禁用平滑，实现绝对像素
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, 320, 400);

        // 深邃紫黑底色
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, 320, 400);

        // 霓虹紫边框
        ctx.strokeStyle = '#a333ff';
        ctx.lineWidth = 4;
        ctx.strokeRect(10, 10, 300, 380);

        const cardsData = [
            {t:"THE SPARK", d:"ACTION - 星火", g:"谁来点燃静默？"},
            {t:"THE CROWN", d:"VOICE - 冕", g:"请把麦克风交给戴皇冠的人"},
            {t:"THE TOWER", d:"ACTION - 崩塌", g:"让那些防备的塔崩塌。坦白吧。"},
            {t:"THE CHARIOT", d:"ACTION - 战车", g:"向下一个档案，极速冲刺！"},
            {t:"echo", d:"VOICE - Echo", g:"先让它在你们的灵魂里震动一下"},
            {t:"THE TEAR", d:"EMOTION - 泪", g:"别抗拒，它是通往真实的隧道"},
            {t:"MIRROR", d:"EMOTION - 双生镜", g:"你看见的是他，还是另一个自己？"},
            {t:"EMBRACE", d:"EMOTION - 拥抱", g:"在这个频段里，你是安全的"},
            {t:"THE OCEAN", d:"EMOTION - 深海", g:"顺着这股混乱沉下去"},
            {t:"FOUNTAIN", d:"EMOTION - 源泉", g:"痛苦过后，治愈正在涌出"},
            {t:"THE SWORD", d:"THOUGHT - 真理剑", g:"刺破迷雾，给出一个粗糙的真相"},
            {t:"THE THREAD", d:"THOUGHT - 命运线", g:"那个童年阴影，是如何连结到焦虑的？"},
            {t:"THE STORM", d:"THOUGHT - 风暴", g:"混乱中，找到绝对冷静的那个点"},
            {t:"THE GATE", d:"THOUGHT - 门扉", g:"把这扇你亲手加上锁的门打开吗？"},
            {t:"THE VORTEX", d:"THOUGHT - 回旋", g:"再深入一点，去触摸那个核心"},
            {t:"THE MASK", d:"TRUTH - 面具", g:"摘下面具。告诉我，那个你有多累？"},
            {t:"THE CLOCK", d:"TRUTH - 时钟", g:"这最后的24小时，你想对自己说什么？"},
            {t:"THE GOLD", d:"TRUTH - 金块", g:"这个代价，你的灵魂真的能承受吗？"},
            {t:"THE VOID", d:"TRUTH - 虚空", g:"你希望这个光点梦见什么？"},
            {t:"THE WORLD", d:"TRUTH - 重塑", g:"审判结束。灵魂已重塑。欢迎回来。"}
        ];

        const card = cardsData[idx];

        // 绘制标题 (金像素风)
        ctx.fillStyle = '#ffcc00';
        ctx.font = '24px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(card.t, 160, 60);

        // 绘制描述 (灰像素风)
        ctx.fillStyle = '#888';
        ctx.font = '12px "Courier New", monospace';
        ctx.fillText(card.d, 160, 90);

        // 绘制虚线框
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(30, 110, 260, 60);
        ctx.setLineDash([]);

        // 根据索引绘制不同的低像素神秘图案 (示例核心逻辑)
        drawMysticIcon(ctx, idx);

        // 绘制引导文字 (蓝霓虹像素风)
        ctx.fillStyle = '#00f2ff';
        ctx.font = 'bold 16px "Courier New", monospace';
        // 实现简单的多行文本居中
        wrapText(ctx, card.g, 160, 320, 260, 22);
    }

    function drawMysticIcon(ctx, idx) {
        // 这只是一个像素示例。在真实环境中，你需要为每张卡牌设计独特的低像素图案（如01张画个极简的粉霓虹火点）。
        // 这里提供一个通用的像素化核心作为占位图像。
        const size = 6;
        for (let y = 0; y < 10; y++) {
            for (let x = 0; x < 10; x++) {
                if (Math.random() > 0.5) {
                    // 配合Plasma背景的色调
                    ctx.fillStyle = (idx % 2 === 0) ? `rgba(255, 0, 85, ${Math.random() * 0.5 + 0.5})` : `rgba(163, 51, 255, ${Math.random() * 0.5 + 0.5})`;
                    ctx.fillRect(160 - 30 + x * size, 200 + y * size, size, size);
                }
            }
        }
    }

    // 绘制多行文本
    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const words = text.split('');
        let line = '';
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            let metrics = ctx.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                ctx.fillText(line, x, y);
                line = words[n];
                y += lineHeight;
            } else { line = testLine; }
        }
        ctx.fillText(line, x, y);
    }

    // --- (锁定保留) 之前的逻辑分毫不动 ---
    function triggerUnlock() { isLocked = true; document.getElementById('deck').style.display = 'flex'; renderDeck(); updateGuide(); }
    function sendAll(d) { if (isComp) { conns.forEach(c => { if(c.open) c.send(d); }); } else { if (hostConn && hostConn.open) hostConn.send(d); } }
    function hostGo() { document.getElementById('host-start-btn').style.display='none'; isLocked = true; sendAll({type:'SYNC', list:players, turnIdx:turnIdx, isLocked:isLocked, cardIndex:null, compCardIndex:null, drawnCards:drawnCards}); }

    function updateGuide() {
        const guide = document.getElementById('process-guide');
        if(!isLocked) { guide.innerText = "等待房主开启..."; return; }
        const users = players.filter(p=>!p.isComp);
        const targetNick = users[turnIdx] ? users[turnIdx].nick : '---';
        guide.innerText = `轮到 [ ${targetNick} ] 开启档案...`;
    }

    function renderUI() {
        const pA = document.getElementById('player-area'); const cA = document.getElementById('companion-area');
        pA.innerHTML = ""; cA.innerHTML = "";
        const users = players.filter(p=>!p.isComp);
        const targetNick = users[turnIdx] ? users[turnIdx].nick : null;
        players.forEach(p => {
            const isTurn = (!p.isComp && p.nick === targetNick);
            const h = `<div class="p-item online ${isTurn?'active-turn':''}">
                <div class="p-avatar ${p.isComp?'is-companion':''}">🃏</div>
                <div style="font-size:0.55rem;margin-top:5px;color:#aaa;text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.nick}</div>
            </div>`;
            if(p.isComp) cA.innerHTML = h; else pA.innerHTML += h;
        });
    }

    function renderDeck() {
        if(document.getElementById('deck').innerHTML !== "") return;
        let h=""; for(let i=0; i<40; i++) h+=`<div id="card-${i}" onclick="handleDraw(${i})" style="flex:0 0 100px; height:178px; background:#2a104a; border:2px solid #555; border-radius:10px; background-image:repeating-linear-gradient(45deg, #3d1563, #3d1563 8px, #2a104a 8px, #2a104a 16px); cursor:pointer;"></div>`;
        document.getElementById('deck').innerHTML = h;
        updateDeckVisibility();
    }

    function updateDeckVisibility() { for(let i=0; i<40; i++) { const c = document.getElementById(`card-${i}`); if(c) c.style.visibility = drawnCards.includes(i) ? 'hidden' : 'visible'; } }
    function handleDraw(i) { const users = players.filter(p=>!p.isComp); const targetNick = users[turnIdx] ? users[turnIdx].nick : null; if(isComp || targetNick !== myNick || cardIndex !== null || drawnCards.includes(i)) return; sendAll({type:'DRAW', idx:i, nick:myNick}); showArchive(i, myNick); }
    
    function showArchive(idx, nick) {
        document.getElementById('q-text').innerText = CUSTOM_QS[idx % CUSTOM_QS.length];
        document.getElementById('card-podium').style.display='block';
        const b = document.getElementById('focus-board'); b.style.display='flex'; setTimeout(()=>b.classList.add('show'), 50);
        document.getElementById('btn-like').disabled = (myNick === nick); document.getElementById('btn-dis').disabled = (myNick === nick); document.getElementById('btn-trans').disabled = (myNick !== nick);
        
        // 核心修复：档案卡的收回权限依然保留给发言者本人，但陪伴师塔罗卡有更高的优先级
        const btnClose = document.getElementById('btn-close');
        btnClose.style.display = 'block'; 
        if(myNick === nick) { btnClose.disabled = false; btnClose.innerText = "完成回答"; btnClose.style.color = "var(--gold)"; btnClose.style.borderColor = "var(--gold)"; btnClose.style.background = "#000"; } 
        else { btnClose.disabled = true; btnClose.innerText = "等待发言..."; btnClose.style.color = "#666"; btnClose.style.borderColor = "#444"; btnClose.style.background = "#111"; }
    }

    function userCmd(t) { if(t==='CLOSE') { hideArchive(); sendAll({type:'CLOSE'}); } }
    function hideArchive() { document.getElementById('focus-board').classList.remove('show'); setTimeout(()=>{document.getElementById('focus-board').style.display='none';document.getElementById('card-podium').style.display='none';}, 800); }
    function actionReact(e) { appendChat(myNick, e); triggerAnim(e); sendAll({type:'CHAT', nick:myNick, msg:e, isAnim:true}); }
    
    function sendTextChat() { const input = document.getElementById('chat-input'); const msg = input.value.trim(); if(!msg) return; appendChat(myNick, msg); sendAll({type:'CHAT', nick:myNick, msg:msg}); input.value = ''; }
    function triggerAnim(e) { for(let i=0; i<10; i++) { const p=document.createElement('div'); p.className='particle'; p.innerText=e; p.style.left='50%'; p.style.top='40%'; p.style.setProperty('--dx',(Math.random()*600-300)+'px'); p.style.setProperty('--dy',(Math.random()*-600-100)+'px'); document.body.appendChild(p); setTimeout(()=>p.remove(), 800); } }
    function appendChat(n, m) { const b=document.getElementById('chat-flow'); b.innerHTML+=`<div><span style="color:var(--gold)">${n}:</span> ${m}</div>`; b.scrollTop=b.scrollHeight; }
    function toggleMic() { if(!localStream) return; const a = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('mic-btn').classList.toggle('active', a); }
</script>
