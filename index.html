<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>陌语 - 午夜圆桌测试版</title>
    <style>
        :root { --bg: #0d0907; --wood: #2a1810; --gold: #f9a826; --light: #eaddcf; }
        body { background: var(--bg); color: var(--light); font-family: "PingFang SC"; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        /* 圆桌区 */
        .table-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 50%, #1a100a 0%, #0d0907 100%); }
        .wooden-table { width: 340px; height: 340px; background: radial-gradient(circle, #3a2218 0%, #1a100a 100%); border-radius: 50%; border: 4px solid #110804; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        /* 34道灵魂拷问 */
        .card { width: 220px; background: #eaddcf; color: #111; padding: 25px 15px; border-radius: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 5; transition: 0.5s; }
        .c-text { font-size: 1.05rem; font-weight: bold; line-height: 1.6; }

        /* 语音交互状态 */
        .voice-ring { position: absolute; inset: -5px; border-radius: 50%; border: 2px solid var(--gold); opacity: 0; }
        .speaking .voice-ring { animation: pulse 1.5s infinite; opacity: 1; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }

        /* 底部控制台 */
        .console { padding: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; }
        .mic-btn { width: 70px; height: 70px; background: var(--wood); border: 2px solid #4a2b1b; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .mic-btn.active { background: var(--gold); border-color: #fff; }
        .mic-btn span { font-size: 0.6rem; margin-top: 4px; color: #888; }
        .mic-btn.active span { color: #000; }
    </style>
</head>
<body>

<div class="table-area">
    <div class="wooden-table">
        <div class="card" id="mainCard">
            <div class="c-text" id="questionText">点击下方按钮，抽取第一张命运卡</div>
        </div>
        <div id="player-0" class="seat" style="position:absolute; top:-30px; left:50%; transform:translateX(-50%);">
            <div style="width:50px; height:50px; background:#222; border-radius:50%; border:2px solid #444; position:relative;">
                <div class="voice-ring"></div>
                <div style="text-align:center; line-height:50px">我</div>
            </div>
        </div>
    </div>
</div>

<div class="console">
    <div class="mic-btn" id="nextBtn" onclick="drawCard()">
        <div style="font-size:1.5rem">🃏</div>
        <span>翻牌</span>
    </div>

    <div class="mic-btn" id="micBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">
        <div id="micIcon" style="font-size:1.5rem">🎙️</div>
        <span id="micStatus">按住说话</span>
    </div>

    <div class="mic-btn" onclick="location.reload()">
        <div style="font-size:1.5rem">🔄</div>
        <span>重置</span>
    </div>
</div>

<script>
    const questions = [
        "你上一次哭，是因为什么？",
        "你觉得这辈子最对不起的人是谁？为什么？",
        "童年里哪一件看似很小的事情，其实一直负面影响你到现在？",
        "此时此刻，你生活中最大的焦虑源头究竟是什么？",
        "如果你的生命只剩最后 24 小时，你会去见谁？对ta说什么？",
        "谁曾经对你特别好，但后来你们却莫名其妙地断了联系？",
        "你这辈子，最想收到谁的一句“对不起”？",
        "摘下所有的面具，你觉得自己到底有多累？（1-10分）为什么？",
        "你上一次对最亲近的人撒的谎是什么？",
        "哪一个瞬间，你突然觉得这份工作/这个行业真的把你“榨干”了？",
        "谁发来的微信消息或工作群艾特，会让你一看到就瞬间心跳加速、感到生理性不适？",
        "你人生中，哪一天是你打死都不想再经历第二次的？",
        "如果明天公司倒闭了，你的第一反应是恐慌，还是长舒一口气？",
        "如果工资减半但能准时5点下班且没人找你，你会立刻答应还是犹豫？",
        "假如有个按钮能彻底清空关于某一个人的所有记忆，你会按吗？",
        "如果用一年寿命换取一件你曾经极其渴望但没得到的东西，你会换什么？",
        "如果给你一千万代价是立刻和父母、爱人孩子绝交，你换吗？",
        "如果进入一个永远醒不来的美梦，你希望梦里的场景是什么样的？",
        "假设有一瓶吐真剂，你会给谁喝？问他什么问题？",
        "哪一句父母骂过你的话你当时不屑，现在却悲哀地发现自己变成了那样？",
        "如果明天太阳不再升起，你今晚最后一顿饭想吃什么？身边坐着谁？",
        "如果你有一件“隐身衣”，你想利用它去做什么？",
        "分享一个你的“童年阴影”，可以是电影片段或生活打击。",
        "哪一首歌的旋律一响，你的脑子里就会立刻无条件地弹出一个人？",
        "此时此刻，如果有人递给你一张单程机票，你想立刻飞去哪？",
        "哪一个本来跟你毫无血缘关系的人，曾给过你一种“亲人”的感觉？",
        "如果人的寿命可以像微信转账一样给别人，你会把你的一年寿命转给谁？",
        "如果有一个快进键能跳过你现在正在熬的日子，代价是减寿三年，你按吗？",
        "假设你能以上帝视角参加自己的葬礼，谁会在角落里哭得最伤心？",
        "如果现在给你一个“合法报复一次”的额度，你会立刻用在谁身上？",
        "走之前你只想最后去见一个人，你会见谁？",
        "如果你死后手机数据被公开展示，你最怕被谁看到里面的哪一部分？",
        "如果可以用一句话总结你上一段失败的感情，你会说什么？",
        "你现在极度怀念，却再也找不到的一种“感觉”是什么？"
    ];

    function drawCard() {
        const rand = Math.floor(Math.random() * questions.length);
        document.getElementById('questionText').innerText = questions[rand];
        // 这里可以加入翻牌音效
    }

    // --- 语音交互逻辑模拟 ---
    function startVoice() {
        document.getElementById('micBtn').classList.add('active');
        document.getElementById('player-0').classList.add('speaking');
        document.getElementById('micStatus').innerText = "正在倾听...";
        // 此处调用 SDK 的开始录音/推流接口
    }

    function stopVoice() {
        document.getElementById('micBtn').classList.remove('active');
        document.getElementById('player-0').classList.remove('speaking');
        document.getElementById('micStatus').innerText = "按住说话";
        // 此处调用 SDK 的停止录音接口
    }
</script>
</body>
</html>
